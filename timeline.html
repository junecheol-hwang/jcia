<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline — 도반의 여정</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400&family=IM+Fell+English:ital@1&display=swap" rel="stylesheet">
<script type="importmap">
  { "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }}

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gray-light:#C8C5BE; --gray-mid:#A09D96; --gray-dark:#6E6C66;
  --orange-pale:#F2E0C8; --orange-faded:#D9A96E; --orange-worn:#B87D3E;
  --orange-deep:#8C5A20; --orange-dark:#5E3A10;
}
html,body{width:100%;height:100%;overflow:hidden;background:#02050a;user-select:none;}
#three-container{position:fixed;inset:0;z-index:1;}
#ui-layer{position:fixed;inset:0;z-index:10;pointer-events:none;animation:uiFadeIn 2.5s ease forwards;}
@keyframes uiFadeIn{from{opacity:0}to{opacity:1}}

/* 타임라인 헤더 */
#header{
  position:fixed;top:0;left:0;right:0;z-index:20;
  padding:2rem 3rem 1.5rem;
  display:flex;align-items:flex-end;justify-content:space-between;
  background:linear-gradient(to bottom,rgba(2,5,10,0.92) 50%,transparent);
  pointer-events:none;
}
#header-left{display:flex;flex-direction:column;gap:3px;}
#header-subtitle{
  font-family:'Noto Sans KR',sans-serif;font-weight:300;
  font-size:0.7rem;color:rgba(63,61,57,0.9);letter-spacing:0.2em;
}
#header-title{
  font-family:'Noto Serif KR',serif;font-weight:300;
  font-size:1.15rem;color:var(--orange-faded);letter-spacing:0.14em;line-height:1.5;
}
#header-phase{
  font-family:'Noto Sans KR',sans-serif;font-weight:300;
  font-size:0.85rem;color:var(--gray-dark);letter-spacing:0.15em;text-align:right;
}
#header-phase .phase-name{
  display:block;font-size:1.15rem;color:var(--gray-light);
  margin-top:3px;font-family:'Noto Serif KR',serif;font-weight:300;
}

/* 성단 헤더 */
#cluster-header{
  position:fixed;top:0;left:0;right:0;z-index:25;
  padding:2rem 3rem 1.5rem;
  display:flex;align-items:flex-end;justify-content:flex-end;
  background:linear-gradient(to bottom,rgba(2,5,10,0.95) 60%,transparent);
  opacity:0;pointer-events:none;
}
#cluster-header-right{text-align:right;}
#cluster-title{
  font-family:'Noto Serif KR',serif;font-weight:300;
  font-size:1.2rem;color:var(--orange-pale);letter-spacing:0.1em;
}
#cluster-desc-hd{
  font-family:'Noto Sans KR',sans-serif;font-weight:300;
  font-size:0.75rem;color:var(--gray-dark);letter-spacing:0.1em;margin-top:4px;
}

#tl-canvas{position:fixed;inset:0;z-index:15;pointer-events:all;}

/* 성간이동 네비 */
#nav{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);
  z-index:30;display:flex;gap:10px;align-items:center;pointer-events:all;
}
.nav-dot{
  width:9px;height:9px;border-radius:50%;
  background:rgba(110,108,102,0.35);cursor:pointer;
  transition:all 0.35s ease;border:0.5px solid rgba(110,108,102,0.5);
}
.nav-dot.active{
  background:var(--orange-worn);border-color:var(--orange-faded);
  box-shadow:0 0 10px rgba(184,125,62,0.6);width:11px;height:11px;
}
.nav-dot:hover{background:var(--orange-faded);transform:scale(1.3);}

/* back to the timeline */
#back-btn{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);
  z-index:30;pointer-events:all;
  font-family:'IM Fell English',serif;font-style:italic;
  font-size:0.88rem;color:var(--gray-dark);letter-spacing:0.18em;
  cursor:pointer;opacity:0;white-space:nowrap;transition:color 0.25s;
}
#back-btn:hover{color:var(--orange-faded);}

/* 스크롤 힌트 */
#scroll-hint{
  position:fixed;bottom:4.5rem;left:50%;transform:translateX(-50%);
  font-family:'Noto Sans KR',sans-serif;font-weight:300;
  font-size:0.7rem;color:var(--gray-dark);letter-spacing:0.25em;
  z-index:20;pointer-events:none;
  animation:fadeHint 4s ease 2.5s forwards;
}
@keyframes fadeHint{0%{opacity:0.7}100%{opacity:0}}

/* 호버 아포리즘 패널 */
#hover-panel{
  position:fixed;bottom:6rem;left:50%;transform:translateX(-50%);
  z-index:50;text-align:center;pointer-events:none;
  opacity:0;transition:opacity 0.35s ease;max-width:560px;width:88%;
  background:rgba(2,5,10,0.72);backdrop-filter:blur(8px);
  border:0.5px solid rgba(110,108,102,0.2);
  padding:1.2rem 1.8rem;border-radius:2px;
}
#hover-panel.visible{opacity:1;}
#hover-book-title{
  font-family:'Noto Serif KR',serif;font-weight:400;
  font-size:1.08rem;color:var(--orange-pale);letter-spacing:0.06em;
  margin-bottom:0.4rem;
}
#hover-book-author{
  font-family:'Noto Sans KR',sans-serif;font-weight:300;
  font-size:0.78rem;color:var(--gray-dark);letter-spacing:0.08em;
  margin-bottom:0;
}
#hover-divider{display:none;}
#hover-aphorism{
  font-family:'Noto Serif KR',serif;font-weight:300;
  font-size:0.82rem;color:var(--gray-mid);line-height:1.8;font-style:italic;
  margin-top:0.5rem;
}
</style>

<div id="three-container"></div>

<div id="ui-layer">
  <div id="header">
    <div id="header-left">

<!-- THREE.JS 파티클 배경 — 청백 통일 -->
<script type="module">
import * as THREE from 'three';
const container=document.getElementById('three-container');
const clock=new THREE.Clock();
const N=7000;
const basePos=new Float32Array(N*3);
const sizes  =new Float32Array(N);
const colors =new Float32Array(N*3);
let scene,camera,renderer,pts;
window._bg={targetZ:100,currentZ:100,targetX:0,currentX:0,targetY:27,currentY:27};

function init(){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x02050a);
  scene.fog=new THREE.FogExp2(0x02050a,0.008);
  camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,1000);
  camera.position.set(0,27,100);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  container.appendChild(renderer.domElement);

  const geo=new THREE.BufferGeometry();
  for(let i=0;i<N;i++){
    const i3=i*3;
    const x=(Math.random()-0.5)*300;
    const y=(Math.random()-0.5)*40;
    const z=(Math.random()-0.5)*280;
    basePos[i3]=x; basePos[i3+1]=y; basePos[i3+2]=z;
    const df=1-Math.abs(z)/280*0.6;
    // 배경 별: 청백 통일 — 거리에 따른 밝기 변화만
    const bright=0.35+df*0.65;
    const tint=Math.random();
    // 약간의 청/백 변주만 (분광형 없음)
    colors[i3]  =(0.72+tint*0.18)*bright;
    colors[i3+1]=(0.82+tint*0.12)*bright;
    colors[i3+2]=bright;
    const base=Math.random()>0.92 ? Math.random()*2.5+1.2 : Math.random()*0.7+0.2;
    sizes[i]=base*df;
  }
  geo.setAttribute('position',   new THREE.BufferAttribute(basePos.slice(),3));
  geo.setAttribute('size',       new THREE.BufferAttribute(sizes,1));
  geo.setAttribute('customColor',new THREE.BufferAttribute(colors,3));

  const cv=document.createElement('canvas'); cv.width=64; cv.height=64;
  const c2=cv.getContext('2d');
  const g=c2.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(0.25,'rgba(210,228,255,0.7)');
  g.addColorStop(0.6,'rgba(170,200,255,0.15)');
  g.addColorStop(1,'transparent');
  c2.fillStyle=g; c2.fillRect(0,0,64,64);

  const mat=new THREE.ShaderMaterial({
    uniforms:{pointTexture:{value:new THREE.CanvasTexture(cv)}},
    vertexShader:`
      attribute float size; attribute vec3 customColor; varying vec3 vColor;
      void main(){vColor=customColor;
        vec4 mvPos=modelViewMatrix*vec4(position,1.0);
        gl_PointSize=size*(380.0/-mvPos.z);
        gl_Position=projectionMatrix*mvPos;}`,
    fragmentShader:`
      uniform sampler2D pointTexture; varying vec3 vColor;
      void main(){gl_FragColor=vec4(vColor,0.85)*texture2D(pointTexture,gl_PointCoord);}`,
    blending:THREE.AdditiveBlending,depthTest:false,transparent:true
  });
  pts=new THREE.Points(geo,mat);
  scene.add(pts);
  window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  });
  animate();
}

function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  const bg=window._bg;
  bg.currentZ+=(bg.targetZ-bg.currentZ)*0.028;
  bg.currentX+=(bg.targetX-bg.currentX)*0.028;
  bg.currentY+=(bg.targetY-bg.currentY)*0.028;
  camera.position.z=bg.currentZ;
  camera.position.x=bg.currentX+Math.sin(t*0.035)*5;
  camera.position.y=bg.currentY+Math.sin(t*0.022)*2.5;
  camera.lookAt(bg.currentX*0.2,0,0);
  const pos=pts.geometry.attributes.position.array;
  for(let i=0;i<N;i++){
    const i3=i*3;
    pos[i3]  =basePos[i3]  +Math.sin(t*0.28+i*0.71)*0.55;
    pos[i3+1]=basePos[i3+1]+Math.sin(t*0.19+i*0.53)*0.95;
    pos[i3+2]=basePos[i3+2]+Math.cos(t*0.23+i*0.41)*0.45;
  }
  pts.geometry.attributes.position.needsUpdate=true;
  renderer.render(scene,camera);
}
init();
</script>

<!-- TIMELINE UI -->
<script>
// ── 책 별 분광형 색상 — 책마다 랜덤 고정 ─────────────
const BOOK_STAR_TYPES=[
  {r:0.75,g:0.85,b:1.00},  // O 청백
  {r:0.70,g:0.80,b:1.00},  // B 청
  {r:0.95,g:0.97,b:1.00},  // A 흰
  {r:1.00,g:1.00,b:0.82},  // F 황백
  {r:1.00,g:0.93,b:0.55},  // G 황
  {r:1.00,g:0.75,b:0.32},  // K 주황
  {r:1.00,g:0.48,b:0.20},  // M 적
];

// ── 데이터 ────────────────────────────────────────────
const PHASES=[
  {id:1,name:'우주론',              desc:'태극은 양의를 생하고'},
  {id:2,name:'우주를 기술하는 언어', desc:'컵속에 담긴 우주'},
  {id:3,name:'생명의 진화',          desc:'관계론적 세계관'},
  {id:4,name:'인류의 역사',          desc:'오래된 미래'},
  {id:5,name:'뇌과학',              desc:'프로메테우스의 저주'},
  {id:6,name:'철학',                desc:'세계인식의 틀'},
  {id:7,name:'시·소설',             desc:'구체에서 추상으로'},
  {id:8,name:'여백',                desc:'Potentiality | 무한한 가능태'},
];

// ── 데이터 — books.json에서 fetch ────────────────────
let BOOKS = [];
let dataReady = false;

function assignStarColors(){
  BOOKS.forEach(book=>{
    const t=BOOK_STAR_TYPES[Math.floor((Math.sin(book.id*73.1)*0.5+0.5)*BOOK_STAR_TYPES.length)];
    book._starColor=t;
  });
}

fetch('books.json')
  .then(r=>r.json())
  .then(data=>{
    BOOKS = data.books;
    assignStarColors();
    dataReady = true;
  })
  .catch(err=>console.error('books.json 로드 실패:', err));

// ── 상태 ──────────────────────────────────────────────
const tlCanvas=document.getElementById('tl-canvas');
const ctx=tlCanvas.getContext('2d');
let W,H;

let viewMode='timeline';
let activeIdx=null;
let zoomT=0;
let clusterBooks=[];
let currentOffset=0,targetOffset=0,currentPhaseIndex=0;
const PHASE_SPACING=340;
let phaseHitAreas=[];

// 호버 상태
let hoveredBook=null;
let hoverPanelAlpha=0;

// 마우스 위치 (성단 줌 레벨용)
let mouseX=W/2||0, mouseY=H/2||0;

// ── DOM 참조 ──────────────────────────────────────────
const elHeader  =document.getElementById('header');
const elCluster =document.getElementById('cluster-header');
const elNav     =document.getElementById('nav');
const elBack    =document.getElementById('back-btn');
const elHoverPanel=document.getElementById('hover-panel');

function resize(){W=tlCanvas.width=innerWidth;H=tlCanvas.height=innerHeight;}

// ── Easing ────────────────────────────────────────────
function eio(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}
function eout(t){return 1-(1-t)*(1-t);}

// ── 헤더 통합 제어 ────────────────────────────────────
function setHeaders(tlA,cluA){
  elHeader.style.opacity =tlA.toFixed(3);
  elCluster.style.opacity=cluA.toFixed(3);
  elNav.style.opacity    =tlA.toFixed(3);
  elBack.style.opacity   =cluA.toFixed(3);
  elNav.style.pointerEvents =tlA>0.3?'all':'none';
  elBack.style.pointerEvents=cluA>0.3?'all':'none';
}

// ── 좌표 변환 ─────────────────────────────────────────
function tlToScreen(tPos){
  const relX=tPos-currentOffset;
  const normX=relX/(W*0.72);
  return{
    x:W/2+relX, y:H*0.50+normX*normX*70,
    opacity:Math.max(0,1-Math.abs(normX)*1.5),
    scale:Math.max(0.25,1-Math.abs(normX)*0.75)
  };
}

// ── 성단 배치 계산 — 황금각 나선형 ──────────────────
function computeCluster(phaseIdx,cx,cy){
  const books=BOOKS.filter(b=>b.phase===phaseIdx+1);
  const n=books.length;

  // 화면 활용 가능한 최대 반경 (화면의 42% — 중심에서 가장자리까지)
  const maxR=Math.min(W,H)*0.42;

  // 황금각 나선 (해바라기 씨앗 패턴)
  const GOLDEN_ANGLE=137.508*(Math.PI/180);

  return books.map((book,i)=>{
    // 반경: 안쪽에서 바깥쪽으로 고르게 분포
    const r=maxR*Math.sqrt((i+0.5)/n);
    const angle=i*GOLDEN_ANGLE;
    return{
      book,
      x:cx+Math.cos(angle)*r,
      y:cy+Math.sin(angle)*r
    };
  });
}

// ── 배경 카메라 ───────────────────────────────────────
function bgZoomIn(phaseIdx){
  if(!window._bg) return;
  window._bg.targetZ=24; window._bg.targetX=(phaseIdx-3.5)*5; window._bg.targetY=18;
}
function bgZoomOut(){
  if(!window._bg) return;
  window._bg.targetZ=100; window._bg.targetX=0; window._bg.targetY=27;
}

// ── 타임라인 그리기 ───────────────────────────────────
function drawTimeline(alpha){
  if(alpha<=0.01) return;

  // 데이터 로딩 중 표시
  if(!dataReady){
    ctx.save();ctx.globalAlpha=alpha*0.5;ctx.textAlign='center';
    ctx.font=`300 13px 'Noto Sans KR'`;
    ctx.fillStyle='#6E6C66';
    ctx.fillText('책 목록을 불러오는 중…', W/2, H/2);
    ctx.restore();
  }

  // 호 라인
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.beginPath();
  for(let t=-1.5;t<=1.5;t+=0.015){
    const px=W/2+t*W*0.55,py=H*0.50+t*t*70;
    t===-1.5?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.strokeStyle='rgba(110,108,102,0.18)';ctx.lineWidth=0.5;ctx.stroke();
  ctx.restore();

  phaseHitAreas=[];

  PHASES.forEach((phase,i)=>{
    const tPos=i*PHASE_SPACING;
    const{x,y,opacity,scale}=tlToScreen(tPos);
    if(opacity<0.02) return;
    const eff=opacity*alpha;

    // 클릭 힌트 링
    ctx.save();ctx.globalAlpha=eff*0.12;
    ctx.beginPath();ctx.arc(x,y,24*scale,0,Math.PI*2);
    ctx.strokeStyle='#B87D3E';ctx.lineWidth=0.5;ctx.stroke();ctx.restore();

    // 마커
    ctx.save();ctx.globalAlpha=eff;
    ctx.beginPath();ctx.arc(x,y,6*scale,0,Math.PI*2);
    ctx.fillStyle='#B87D3E';
    ctx.shadowColor='rgba(184,125,62,0.8)';ctx.shadowBlur=16;
    ctx.fill();ctx.restore();

    phaseHitAreas.push({x,y,r:26*scale,phaseIdx:i});

    // 레이블 (호 위)
    ctx.save();ctx.globalAlpha=eff;ctx.textAlign='center';
    ctx.font=`300 ${Math.round(11.5*scale)}px 'IM Fell English'`;
    ctx.fillStyle='#8C5A20';
    ctx.fillText(`Phase ${phase.id}`,x,y-58*scale);
    ctx.font=`300 ${Math.round(16*scale)}px 'Noto Serif KR'`;
    ctx.fillStyle='#C8C5BE';
    ctx.fillText(phase.name,x,y-38*scale);
    ctx.font=`300 ${Math.round(11*scale)}px 'Noto Sans KR'`;
    ctx.fillStyle='#6E6C66';
    ctx.fillText(phase.desc,x,y-18*scale);
    ctx.restore();
  });

  // 책 별 — Phase 마커 중심으로 원형 산포
  BOOKS.forEach(book=>{
    const pIdx=book.phase-1;
    // id 기반 고정 랜덤 — 매번 같은 위치 유지
    const s1=Math.sin(book.id*137.508);
    const s2=Math.cos(book.id*97.312);
    const s3=Math.sin(book.id*53.7);
    // 극좌표로 원형 배치
    const angle=s1*Math.PI*2;
    const radius=Math.abs(s2)*PHASE_SPACING*0.38 + Math.abs(s3)*PHASE_SPACING*0.08;
    const tPos=pIdx*PHASE_SPACING + Math.cos(angle)*radius*0.55;
    const yOff=Math.sin(angle)*radius*0.75;

    const{x,y,opacity,scale}=tlToScreen(tPos);
    if(opacity<0.04) return;
    const c=book._starColor;
    const bx=x, by=y+yOff*scale, r=2.5*scale;
    ctx.save();ctx.globalAlpha=opacity*alpha*0.28;
    ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);
    ctx.fillStyle=`rgb(${Math.round(c.r*255)},${Math.round(c.g*255)},${Math.round(c.b*255)})`;
    ctx.shadowColor=`rgba(${Math.round(c.r*255)},${Math.round(c.g*255)},${Math.round(c.b*255)},0.25)`;
    ctx.shadowBlur=3;ctx.fill();ctx.restore();
  });
}

// ── 성단 그리기 ───────────────────────────────────────
function drawCluster(layout,alpha,phaseIdx){
  if(alpha<=0.01||!layout.length) return;
  const cx=W/2,cy=H/2;
  const phase=PHASES[phaseIdx];

  // 중심 레이블
  ctx.save();ctx.globalAlpha=alpha;ctx.textAlign='center';
  ctx.font=`300 24px 'Noto Serif KR'`;
  ctx.fillStyle='rgba(242,224,200,0.9)';
  ctx.shadowColor='rgba(184,125,62,0.3)';ctx.shadowBlur=20;
  ctx.fillText(phase.name,cx,cy-12);
  ctx.font=`300 12px 'Noto Sans KR'`;
  ctx.fillStyle='rgba(110,108,102,0.65)';ctx.shadowBlur=0;
  ctx.fillText(phase.desc,cx,cy+12);
  ctx.restore();

  layout.forEach(({book,x,y})=>{
    const isHovered=(hoveredBook===book);
    const c=book._starColor;
    const colStr=`rgb(${Math.round(c.r*255)},${Math.round(c.g*255)},${Math.round(c.b*255)})`;
    const glowStr=`rgba(${Math.round(c.r*255)},${Math.round(c.g*255)},${Math.round(c.b*255)},0.9)`;

    // 마우스 거리 기반 proximity
    const dx=mouseX-x, dy=mouseY-y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const proximity=Math.max(0,1-dist/320);
    const baseAlpha=0.25+proximity*0.75;

    // 별 크기 — proximity 기반
    const pulse=1+Math.sin(Date.now()*0.002+book.id)*0.1;
    const r=isHovered ? 10 : (2.5+proximity*5)*pulse;
    const glow=isHovered ? 32 : 4+proximity*24;

    ctx.save();ctx.globalAlpha=alpha*(isHovered?1:baseAlpha);
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=colStr;
    ctx.shadowColor=glowStr;ctx.shadowBlur=glow;
    ctx.fill();ctx.restore();

    // 호버 시에만 별 위에 제목 — 짧게, 별 바로 위
    if(isHovered){
      ctx.save();ctx.globalAlpha=alpha;
      ctx.font=`400 13px 'Noto Serif KR'`;
      ctx.fillStyle='rgba(242,224,200,0.95)';
      ctx.shadowColor='rgba(0,0,0,0.8)';ctx.shadowBlur=8;
      ctx.textAlign='center';
      ctx.fillText(book.title, x, y-r-8);
      ctx.restore();
    }

    book._csx=x;book._csy=y;book._cr=r+12;
  });
}

// ── 호버 패널 제어 ────────────────────────────────────
function showHoverPanel(book){
  document.getElementById('hover-book-title').textContent=book.title;
  document.getElementById('hover-book-author').textContent=
    book.author + (book.publisher && book.publisher!=='(알 수 없음)' ? '  ·  '+book.publisher : '');
  document.getElementById('hover-aphorism').textContent=
    book.subtitle ? `— ${book.subtitle}` : '';
  elHoverPanel.classList.add('visible');
}
function hideHoverPanel(){
  elHoverPanel.classList.remove('visible');
}

// ── 메인 루프 ─────────────────────────────────────────
const SPEED=0.013; // 느리게 — 천천히 빨려드는 느낌

function loop(){
  ctx.clearRect(0,0,W,H);

  if(viewMode==='timeline'){
    currentOffset+=(targetOffset-currentOffset)*0.055;
    const newPI=Math.max(0,Math.min(PHASES.length-1,Math.round(currentOffset/PHASE_SPACING)));
    if(newPI!==currentPhaseIndex){currentPhaseIndex=newPI;updatePhaseUI();}

    // 타임라인 스크롤에 비례한 배경 시차(parallax)
    if(window._bg){
      const totalRange=(PHASES.length-1)*PHASE_SPACING;
      const normalized=currentOffset/totalRange;
      window._bg.targetX=(normalized-0.5)*28;
    }

    drawTimeline(1);
    setHeaders(1,0);
  }

  else if(viewMode==='zoom-in'){
    zoomT=Math.min(1,zoomT+SPEED);
    const e=eio(zoomT);
    const tlA=Math.max(0,1-e*1.4);
    const cA =Math.max(0,e*1.4-0.4);
    drawTimeline(tlA);
    drawCluster(clusterBooks,cA,activeIdx);
    setHeaders(tlA,cA);
    if(zoomT>=1){viewMode='cluster';setClusterHeaderText(activeIdx);}
  }

  else if(viewMode==='cluster'){
    drawCluster(clusterBooks,1,activeIdx);
    setHeaders(0,1);
  }

  else if(viewMode==='zoom-out'){
    zoomT=Math.min(1,zoomT+SPEED);
    const e=eio(zoomT);
    const cA=Math.max(0,1-e*1.4);
    const tlA=Math.max(0,e*1.4-0.4);
    drawCluster(clusterBooks,cA,activeIdx);
    drawTimeline(tlA);
    setHeaders(tlA,cA);
    if(zoomT>=1){
      viewMode='timeline';
      activeIdx=null;clusterBooks=[];
      hoveredBook=null;hideHoverPanel();
    }
  }

  requestAnimationFrame(loop);
}

// ── 전환 진입점 ───────────────────────────────────────
function enterCluster(phaseIdx){
  if(viewMode!=='timeline') return;
  activeIdx=phaseIdx;
  clusterBooks=computeCluster(phaseIdx,W/2,H/2);
  setClusterHeaderText(phaseIdx);
  viewMode='zoom-in';zoomT=0;
  bgZoomIn(phaseIdx);
}

window.exitCluster=function(){
  if(viewMode!=='cluster') return;
  hoveredBook=null;hideHoverPanel();
  viewMode='zoom-out';zoomT=0;
  bgZoomOut();
};

function setClusterHeaderText(idx){
  const p=PHASES[idx];
  document.getElementById('cluster-title').textContent=`Phase ${p.id} — ${p.name}`;
  document.getElementById('cluster-desc-hd').textContent=p.desc;
}

// ── UI 업데이트 ───────────────────────────────────────
function updatePhaseUI(){
  const p=PHASES[currentPhaseIndex];
  document.getElementById('current-phase-num').textContent=`Phase ${p.id}`;
  document.getElementById('current-phase-name').textContent=p.name;
  document.querySelectorAll('.nav-dot').forEach((d,i)=>
    d.classList.toggle('active',i===currentPhaseIndex));
}
function updateNavActive(idx){
  document.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
}

// ── 네비 점 ───────────────────────────────────────────
const nav=document.getElementById('nav');
PHASES.forEach((phase,i)=>{
  const dot=document.createElement('div');
  dot.className='nav-dot'+(i===0?' active':'');
  dot.title=`Phase ${phase.id} — ${phase.name}`;
  dot.addEventListener('click',()=>{
    if(viewMode==='timeline'||viewMode==='zoom-out')
      targetOffset=i*PHASE_SPACING;
  });
  nav.appendChild(dot);
});

// ── 입력 이벤트 ───────────────────────────────────────
let isDragging=false,dragSX=0,dragSO=0,mdX=0,mdY=0,mdT=0;

tlCanvas.addEventListener('mousedown',e=>{
  if(viewMode!=='timeline'&&viewMode!=='cluster') return;
  isDragging=true;dragSX=e.clientX;dragSO=targetOffset;
  mdX=e.clientX;mdY=e.clientY;mdT=Date.now();
  tlCanvas.style.cursor='grabbing';
});
window.addEventListener('mousemove',e=>{
  mouseX=e.clientX; mouseY=e.clientY;
  if(!isDragging){checkHover(e.clientX,e.clientY);return;}
  if(viewMode==='timeline'){targetOffset=dragSO+(dragSX-e.clientX)*1.15;clamp();}
});
window.addEventListener('mouseup',e=>{
  if(!isDragging) return;
  isDragging=false;tlCanvas.style.cursor='default';
  const dx=e.clientX-mdX,dy=e.clientY-mdY;
  if(Math.sqrt(dx*dx+dy*dy)<6&&Date.now()-mdT<300) handleClick(e.clientX,e.clientY);
});
tlCanvas.addEventListener('wheel',e=>{
  e.preventDefault();
  if(viewMode!=='timeline') return;
  targetOffset+=(e.deltaY+e.deltaX)*0.75;clamp();
},{passive:false});

let tSX=0,tSO=0,tDX=0,tDY=0,tDT=0;
tlCanvas.addEventListener('touchstart',e=>{
  tSX=e.touches[0].clientX;tSO=targetOffset;
  tDX=tSX;tDY=e.touches[0].clientY;tDT=Date.now();
},{passive:true});
tlCanvas.addEventListener('touchmove',e=>{
  if(viewMode!=='timeline') return;
  targetOffset=tSO+(tSX-e.touches[0].clientX)*1.4;clamp();
},{passive:true});
tlCanvas.addEventListener('touchend',e=>{
  const ch=e.changedTouches[0];
  const dx=ch.clientX-tDX,dy=ch.clientY-tDY;
  if(Math.sqrt(dx*dx+dy*dy)<8&&Date.now()-tDT<300) handleClick(ch.clientX,ch.clientY);
});

function clamp(){targetOffset=Math.max(0,Math.min((PHASES.length-1)*PHASE_SPACING,targetOffset));}

function handleClick(mx,my){
  if(viewMode==='timeline'){
    for(const h of phaseHitAreas){
      const dx=mx-h.x,dy=my-h.y;
      if(Math.sqrt(dx*dx+dy*dy)<h.r){enterCluster(h.phaseIdx);return;}
    }
  }
  // 성단 뷰에서는 클릭 없음 — 호버만
}

function checkHover(mx,my){
  let found=false;
  if(viewMode==='timeline'){
    for(const h of phaseHitAreas){
      const dx=mx-h.x,dy=my-h.y;
      if(Math.sqrt(dx*dx+dy*dy)<h.r){found=true;break;}
    }
    tlCanvas.style.cursor=found?'pointer':'default';
  } else if(viewMode==='cluster'){
    let newHovered=null;
    for(const cb of clusterBooks){
      if(!cb.book._csx) continue;
      const dx=mx-cb.book._csx,dy=my-cb.book._csy;
      if(Math.sqrt(dx*dx+dy*dy)<cb.book._cr){newHovered=cb.book;break;}
    }
    if(newHovered!==hoveredBook){
      hoveredBook=newHovered;
      if(hoveredBook) showHoverPanel(hoveredBook);
      else hideHoverPanel();
    }
    tlCanvas.style.cursor=hoveredBook?'default':'default';
  }
}

// ── 키보드 ────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(viewMode==='cluster') window.exitCluster();
    return;
  }
  if(viewMode!=='timeline') return;
  if(e.key==='ArrowRight'){targetOffset+=PHASE_SPACING;clamp();}
  if(e.key==='ArrowLeft') {targetOffset-=PHASE_SPACING;clamp();}
});

window.addEventListener('resize',resize);
resize();
loop();
</script>
