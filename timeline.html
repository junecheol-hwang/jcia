<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline — 도반의 여정</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400&family=IM+Fell+English:ital@1&display=swap" rel="stylesheet">
<script type="importmap">
  { "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }}

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gray-light:#C8C5BE; --gray-mid:#A09D96; --gray-dark:#6E6C66;
  --orange-pale:#F2E0C8; --orange-faded:#D9A96E; --orange-worn:#B87D3E;
  --orange-deep:#8C5A20; --orange-dark:#5E3A10;
}
html,body{width:100%;height:100%;overflow:hidden;background:#02050a;user-select:none;}
#three-container{position:fixed;inset:0;z-index:1;}
#ui-layer{position:fixed;inset:0;z-index:10;pointer-events:none;animation:uiFadeIn 2.5s ease forwards;}
@keyframes uiFadeIn{from{opacity:0}to{opacity:1}}

/* 타임라인 헤더 */
#header{
  position:fixed;top:0;left:0;right:0;z-index:20;
  padding:2rem calc(3rem + 320px) 1.5rem 3rem;
  display:flex;align-items:flex-end;justify-content:space-between;
  background:linear-gradient(to bottom,rgba(2,5,10,0.92) 50%,transparent);
  pointer-events:none;
}
#header-left{display:flex;flex-direction:column;gap:3px;}
#header-subtitle{
  font-family:'Noto Sans KR',sans-serif;font-weight:300;
  font-size:0.7rem;color:rgba(63,61,57,0.9);letter-spacing:0.2em;
}
#header-title{
  font-family:'Noto Serif KR',serif;font-weight:300;
  font-size:1.15rem;color:var(--orange-faded);letter-spacing:0.14em;line-height:1.5;
}
#header-phase{
  font-family:'Noto Sans KR',sans-serif;font-weight:300;
  font-size:0.85rem;color:var(--gray-dark);letter-spacing:0.15em;text-align:right;
}
#header-phase .phase-name{
  display:block;font-size:1.15rem;color:var(--gray-light);
  margin-top:3px;font-family:'Noto Serif KR',serif;font-weight:300;
}

/* 성단 헤더 */
#cluster-header{
  position:fixed;top:0;right:0;z-index:25;
  padding:4.3rem 3rem 1.5rem;
  display:flex;flex-direction:column;align-items:flex-end;
  background:linear-gradient(to bottom,rgba(2,5,10,0.95) 60%,transparent);
  opacity:0;pointer-events:none;max-width:420px;
}
#cluster-header-right{text-align:right;}
#cluster-title{
  font-family:'Noto Serif KR',serif;font-weight:400;
  font-size:1.35rem;color:var(--orange-pale);letter-spacing:0.1em;
  text-shadow:0 2px 12px rgba(0,0,0,0.8);
  white-space:nowrap;
}
#cluster-desc-hd{
  font-family:'Noto Sans KR',sans-serif;font-weight:300;
  font-size:0.8rem;color:var(--orange-worn);letter-spacing:0.12em;margin-top:5px;
  text-shadow:0 1px 8px rgba(0,0,0,0.8);
  white-space:nowrap;
}

/* 성단 책 정보 패널 */
#cluster-book-info{
  margin-top:1.4rem;text-align:right;width:100%;
  opacity:0;transition:opacity 0.3s ease;
  border-top:0.5px solid rgba(110,108,102,0.25);
  padding-top:1rem;
}
#cluster-book-info.visible{opacity:1;}
#cluster-book-info-title{
  font-family:'Noto Serif KR',serif;font-weight:400;
  font-size:1rem;color:var(--orange-pale);letter-spacing:0.05em;
  margin-bottom:0.3rem;
}
#cluster-book-info-author{
  font-family:'Noto Sans KR',sans-serif;font-weight:300;
  font-size:0.72rem;color:var(--gray-dark);letter-spacing:0.06em;
  margin-bottom:0.6rem;
}
#cluster-book-info-subtitle{
  font-family:'Noto Serif KR',serif;font-weight:300;
  font-size:0.78rem;color:var(--gray-mid);line-height:1.8;font-style:italic;
}

#tl-canvas{position:fixed;inset:0;z-index:15;pointer-events:all;}

/* 성간이동 네비 */
#nav{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);
  z-index:30;display:flex;gap:10px;align-items:center;pointer-events:all;
}
.nav-dot{
  width:9px;height:9px;border-radius:50%;
  background:rgba(110,108,102,0.35);cursor:pointer;
  transition:all 0.35s ease;border:0.5px solid rgba(110,108,102,0.5);
}
.nav-dot.active{
  background:var(--orange-worn);border-color:var(--orange-faded);
  box-shadow:0 0 10px rgba(184,125,62,0.6);width:11px;height:11px;
}
.nav-dot:hover{background:var(--orange-faded);transform:scale(1.3);}

/* BGM 컨트롤 */
#bgm-ctrl{
  position:fixed;bottom:2rem;left:2.5rem;
  z-index:30;display:flex;align-items:center;gap:10px;
  pointer-events:all;
}
#bgm-btn{
  width:28px;height:28px;border-radius:50%;
  background:transparent;border:0.5px solid rgba(110,108,102,0.4);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.25s;
}
#bgm-btn:hover{ border-color:var(--orange-faded); }
#bgm-btn svg{ width:12px;height:12px; }
#bgm-vol{
  -webkit-appearance:none;appearance:none;
  width:60px;height:2px;
  background:rgba(110,108,102,0.3);border-radius:2px;outline:none;cursor:pointer;
}
#bgm-vol::-webkit-slider-thumb{
  -webkit-appearance:none;width:10px;height:10px;border-radius:50%;
  background:var(--orange-worn);cursor:pointer;
}

/* back to the timeline */
#back-btn{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);
  z-index:30;pointer-events:all;
  font-family:'IM Fell English',serif;font-style:italic;
  font-size:0.88rem;color:var(--gray-dark);letter-spacing:0.18em;
  cursor:pointer;opacity:0;white-space:nowrap;transition:color 0.25s;
}
#back-btn:hover{color:var(--orange-faded);}

/* 스크롤 힌트 */
#scroll-hint{
  position:fixed;bottom:4.5rem;left:50%;transform:translateX(-50%);
  font-family:'Noto Sans KR',sans-serif;font-weight:300;
  font-size:0.7rem;color:var(--gray-dark);letter-spacing:0.25em;
  z-index:20;pointer-events:none;
  animation:fadeHint 4s ease 2.5s forwards;
}
@keyframes fadeHint{0%{opacity:0.7}100%{opacity:0}}

/* 호버 패널 — 성단 뷰에서는 숨김 */
#hover-panel{
  display:none;
}

/* 책 검색창 — 우측 상단, 타임라인·성단 공통 */
#book-search{
  position:fixed;top:1.5rem;right:3rem;z-index:45;
  width:clamp(220px,24vw,300px);pointer-events:all;
  font-family:'Noto Sans KR',sans-serif;
}
#book-search-box{
  display:flex;align-items:center;gap:9px;
  background:rgba(2,5,10,0.7);
  border:0.5px solid rgba(110,108,102,0.45);
  border-radius:2px;padding:0.55rem 0.85rem;
  backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);
  transition:border-color 0.25s;
}
#book-search-box:focus-within{border-color:rgba(217,169,110,0.7);}
#book-search-icon{width:13px;height:13px;flex:none;opacity:0.55;}
#book-search-input{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--gray-light);font-size:0.8rem;font-weight:300;letter-spacing:0.04em;
}
#book-search-input::placeholder{color:rgba(110,108,102,0.85);}
#book-search-results{
  margin-top:6px;background:rgba(2,5,10,0.93);
  border:0.5px solid rgba(110,108,102,0.3);border-radius:2px;
  backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);
  max-height:62vh;overflow-y:auto;display:none;
}
#book-search-results.open{display:block;}
#book-search-results::-webkit-scrollbar{width:5px;}
#book-search-results::-webkit-scrollbar-thumb{background:rgba(110,108,102,0.35);border-radius:3px;}
.bs-hint{
  padding:0.55rem 0.9rem;font-size:0.62rem;color:var(--gray-dark);
  letter-spacing:0.14em;border-bottom:0.5px solid rgba(110,108,102,0.18);
}
.bs-item{
  padding:0.55rem 0.9rem;cursor:pointer;
  border-bottom:0.5px solid rgba(110,108,102,0.1);
  transition:background 0.15s;
}
.bs-item:last-child{border-bottom:none;}
.bs-item:hover,.bs-item.active{background:rgba(217,169,110,0.1);}
.bs-item-title{
  font-family:'Noto Serif KR',serif;font-weight:400;
  font-size:0.82rem;color:var(--orange-pale);letter-spacing:0.02em;
}
.bs-item-meta{
  font-size:0.66rem;color:var(--gray-dark);margin-top:2px;letter-spacing:0.05em;
}
.bs-empty{padding:0.75rem 0.9rem;font-size:0.72rem;color:var(--gray-dark);}
</style>
</head>

<!-- THREE.JS 파티클 배경 — 청백 통일 -->
<script type="module">
import * as THREE from 'three';
const container=document.getElementById('three-container');
const clock=new THREE.Clock();
const N=7000;
const basePos=new Float32Array(N*3);
const sizes  =new Float32Array(N);
const colors =new Float32Array(N*3);
let scene,camera,renderer,pts;
window._bg={targetZ:100,currentZ:100,targetX:0,currentX:0,targetY:27,currentY:27};

function init(){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x02050a);
  scene.fog=new THREE.FogExp2(0x02050a,0.008);
  camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,1000);
  camera.position.set(0,27,100);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  container.appendChild(renderer.domElement);

  const geo=new THREE.BufferGeometry();
  for(let i=0;i<N;i++){
    const i3=i*3;
    const x=(Math.random()-0.5)*300;
    const y=(Math.random()-0.5)*40;
    const z=(Math.random()-0.5)*280;
    basePos[i3]=x; basePos[i3+1]=y; basePos[i3+2]=z;
    const df=1-Math.abs(z)/280*0.6;
    // 배경 별: 청백 통일 — 거리에 따른 밝기 변화만
    const bright=0.35+df*0.65;
    const tint=Math.random();
    // 약간의 청/백 변주만 (분광형 없음)
    colors[i3]  =(0.72+tint*0.18)*bright;
    colors[i3+1]=(0.82+tint*0.12)*bright;
    colors[i3+2]=bright;
    const base=Math.random()>0.92 ? Math.random()*2.5+1.2 : Math.random()*0.7+0.2;
    sizes[i]=base*df;
  }
  geo.setAttribute('position',   new THREE.BufferAttribute(basePos.slice(),3));
  geo.setAttribute('size',       new THREE.BufferAttribute(sizes,1));
  geo.setAttribute('customColor',new THREE.BufferAttribute(colors,3));

  const cv=document.createElement('canvas'); cv.width=64; cv.height=64;
  const c2=cv.getContext('2d');
  const g=c2.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(0.25,'rgba(210,228,255,0.7)');
  g.addColorStop(0.6,'rgba(170,200,255,0.15)');
  g.addColorStop(1,'transparent');
  c2.fillStyle=g; c2.fillRect(0,0,64,64);

  const mat=new THREE.ShaderMaterial({
    uniforms:{pointTexture:{value:new THREE.CanvasTexture(cv)}},
    vertexShader:`
      attribute float size; attribute vec3 customColor; varying vec3 vColor;
      void main(){vColor=customColor;
        vec4 mvPos=modelViewMatrix*vec4(position,1.0);
        gl_PointSize=size*(380.0/-mvPos.z);
        gl_Position=projectionMatrix*mvPos;}`,
    fragmentShader:`
      uniform sampler2D pointTexture; varying vec3 vColor;
      void main(){gl_FragColor=vec4(vColor,0.85)*texture2D(pointTexture,gl_PointCoord);}`,
    blending:THREE.AdditiveBlending,depthTest:false,transparent:true
  });
  pts=new THREE.Points(geo,mat);
  scene.add(pts);
  window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  });
  animate();
}

function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  const bg=window._bg;
  bg.currentZ+=(bg.targetZ-bg.currentZ)*0.028;
  bg.currentX+=(bg.targetX-bg.currentX)*0.028;
  bg.currentY+=(bg.targetY-bg.currentY)*0.028;
  camera.position.z=bg.currentZ;
  camera.position.x=bg.currentX+Math.sin(t*0.035)*5;
  camera.position.y=bg.currentY+Math.sin(t*0.022)*2.5;
  camera.lookAt(bg.currentX*0.2,0,0);
  const pos=pts.geometry.attributes.position.array;
  for(let i=0;i<N;i++){
    const i3=i*3;
    pos[i3]  =basePos[i3]  +Math.sin(t*0.28+i*0.71)*0.55;
    pos[i3+1]=basePos[i3+1]+Math.sin(t*0.19+i*0.53)*0.95;
    pos[i3+2]=basePos[i3+2]+Math.cos(t*0.23+i*0.41)*0.45;
  }
  pts.geometry.attributes.position.needsUpdate=true;
  renderer.render(scene,camera);
}
init();
</script>

<!-- TIMELINE UI -->
<script>
// ── 책 별 분광형 색상 — 책마다 랜덤 고정 ─────────────
// ── 책 별 색상 — 배경 청백 파티클과 조화로운 좁은 팔레트 ──
const BOOK_STAR_TYPES=[
  {r:0.74,g:0.84,b:1.00},  // 청
  {r:0.82,g:0.89,b:1.00},  // 옅은 청
  {r:0.92,g:0.95,b:1.00},  // 청백
  {r:0.98,g:0.99,b:1.00},  // 흰
  {r:1.00,g:0.98,b:0.91},  // 따뜻한 흰 (미묘)
];

// ── 결정론적 시드 난수 (mulberry32) — 책마다 고정된 위치/특성 ──
function seededRand(seed){
  let t=seed>>>0;
  return function(){
    t+=0x6D2B79F5;
    let x=Math.imul(t^t>>>15,1|t);
    x^=x+Math.imul(x^x>>>7,61|x);
    return ((x^x>>>14)>>>0)/4294967296;
  };
}

// ── 데이터 ────────────────────────────────────────────
const PHASES=[
  {id:1,name:'우주론',              desc:'태극은 양의를 생하고'},
  {id:2,name:'우주를 기술하는 언어', desc:'컵속에 담긴 우주'},
  {id:3,name:'생명의 진화',          desc:'관계론적 세계관'},
  {id:4,name:'인류의 역사',          desc:'오래된 미래'},
  {id:5,name:'뇌과학',              desc:'프로메테우스의 저주'},
  {id:6,name:'철학',                desc:'세계인식의 틀'},
  {id:7,name:'시·소설',             desc:'구체에서 추상으로'},
  {id:8,name:'여백',                desc:'Potentiality | 무한한 가능태'},
];

// ── 데이터 — books.json에서 fetch ────────────────────
let BOOKS = [];
let dataReady = false;

function assignStarColors(){
  BOOKS.forEach(book=>{
    const t=BOOK_STAR_TYPES[Math.floor((Math.sin(book.id*73.1)*0.5+0.5)*BOOK_STAR_TYPES.length)];
    book._starColor=t;
  });
}

fetch('books.json')
  .then(r=>r.json())
  .then(data=>{
    BOOKS = data.books;
    assignStarColors();
    dataReady = true;
  })
  .catch(err=>console.error('books.json 로드 실패:', err));

// ── 상태 ──────────────────────────────────────────────
const tlCanvas=document.getElementById('tl-canvas');
const ctx=tlCanvas.getContext('2d');
let W,H;

let viewMode='timeline';
let activeIdx=null;
let zoomT=0;
let clusterBooks=[];
let currentOffset=0,targetOffset=0,currentPhaseIndex=0;
const PHASE_SPACING=340;
let phaseHitAreas=[];

// 호버 상태
let hoveredBook=null;
let hoverPanelAlpha=0;

// 마우스 위치 (성단 줌 레벨용)
let mouseX=W/2||0, mouseY=H/2||0;

// ── DOM 참조 ──────────────────────────────────────────
const elHeader  =document.getElementById('header');
const elCluster =document.getElementById('cluster-header');
const elNav     =document.getElementById('nav');
const elBack    =document.getElementById('back-btn');
const elHoverPanel=document.getElementById('hover-panel');

function resize(){W=tlCanvas.width=innerWidth;H=tlCanvas.height=innerHeight;}

// ── 성단 모션 상태 ────────────────────────────────────
let clusterEntryTime = 0;
let floatClock = 0;
const ENTRY_DURATION = 1.4;

// 별자리 선 상태
let constellationAlpha = 0;  // 현재 선 투명도 (0→1 페이드인, 1→0 페이드아웃)
let constellationDir   = 0;  // 1=나타남, -1=사라짐, 0=정지
let constellationLines = []; // (구) 연결선 목록 — 미사용
let constellation = {members:[], edges:[]}; // 호버 별자리: 별 5~12개 + 연결
let pendingEnter = null;     // 검색 선택 후 진입 예약 phaseIdx

// ── 별자리 생성 — 호버한 별 둘레에서 5~12개를 골라 자연스럽게 연결 ──
function buildConstellation(rootBook){
  const all=clusterBooks
    .map(cb=>cb.book)
    .filter(b=>b!==rootBook && b._csx!=null && b._csy!=null);
  if(rootBook._csx==null || all.length<4) return {members:[rootBook], edges:[]};

  const rnd=seededRand(rootBook.id*40503+777);
  const count=5+Math.floor(rnd()*8); // 5~12 (root 포함)
  const rx=rootBook._csx, ry=rootBook._csy;

  // root에서 가까운 후보 풀
  const sorted=all.sort((a,b)=>{
    const da=(a._csx-rx)**2+(a._csy-ry)**2;
    const db=(b._csx-rx)**2+(b._csy-ry)**2;
    return da-db;
  });
  const pool=sorted.slice(0, Math.min(sorted.length, (count-1)*2+4));
  // 시드 셔플 후 추출 — 가깝되 매번 다른 조합
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  const members=[rootBook, ...pool.slice(0, count-1)];

  // 최소신장트리(Prim) — 가까운 것끼리 나뭇가지처럼
  const edges=primMST(members);
  // 곁가지 1~2개 — 너무 트리스럽지 않게
  const extra=1+Math.floor(rnd()*2);
  for(let e=0;e<extra;e++){
    const i=Math.floor(rnd()*members.length);
    let bj=-1,bd=Infinity;
    for(let j=0;j<members.length;j++){
      if(j===i) continue;
      if(edges.some(([a,b])=>(a===i&&b===j)||(a===j&&b===i))) continue;
      const dx=members[i]._csx-members[j]._csx, dy=members[i]._csy-members[j]._csy;
      const d=dx*dx+dy*dy;
      if(d<bd){bd=d;bj=j;}
    }
    if(bj>=0) edges.push([i,bj]);
  }
  return {members, edges};
}

function primMST(nodes){
  const n=nodes.length; if(n<2) return [];
  const used=new Array(n).fill(false); used[0]=true;
  const inTree=[0]; const edges=[];
  for(let k=1;k<n;k++){
    let best=Infinity,bi=-1,bj=-1;
    for(const i of inTree){
      for(let j=0;j<n;j++){
        if(used[j]) continue;
        const dx=nodes[i]._csx-nodes[j]._csx, dy=nodes[i]._csy-nodes[j]._csy;
        const d=dx*dx+dy*dy;
        if(d<best){best=d;bi=i;bj=j;}
      }
    }
    if(bj<0) break;
    used[bj]=true; inTree.push(bj); edges.push([bi,bj]);
  }
  return edges;
}

// ── Easing ────────────────────────────────────────────
function eio(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}
function eout(t){return 1-(1-t)*(1-t);}

// ── 헤더 통합 제어 ────────────────────────────────────
function setHeaders(tlA,cluA){
  elHeader.style.opacity =tlA.toFixed(3);
  elCluster.style.opacity=cluA.toFixed(3);
  elNav.style.opacity    =tlA.toFixed(3);
  elBack.style.opacity   =cluA.toFixed(3);
  elNav.style.pointerEvents =tlA>0.3?'all':'none';
  elBack.style.pointerEvents=cluA>0.3?'all':'none';
}

// ── 좌표 변환 ─────────────────────────────────────────
function tlToScreen(tPos){
  const relX=tPos-currentOffset;
  const normX=relX/(W*0.72);
  return{
    x:W/2+relX, y:H*0.50+normX*normX*70,
    opacity:Math.max(0,1-Math.abs(normX)*1.5),
    scale:Math.max(0.25,1-Math.abs(normX)*0.75)
  };
}

// ── 성단 배치 계산 — 시드 난수로 원판 전체에 자연 산개 ──
function computeCluster(phaseIdx,cx,cy){
  const books=BOOKS.filter(b=>b.phase===phaseIdx+1);

  // 화면 활용 가능한 최대 반경 (화면의 42%)
  const maxR=Math.min(W,H)*0.42;

  return books.map((book)=>{
    // 책 id로 고정된 난수 — 매번 같은 자리, 매번 같은 별자리
    const rnd=seededRand(book.id*2654435761+12345);
    const a=rnd()*Math.PI*2;
    // sqrt(random) → 면적 균일 분포 (중심에 뭉치지 않고 고르게)
    const rr=Math.sqrt(rnd())*maxR;
    return{
      book,
      x:cx+Math.cos(a)*rr,
      y:cy+Math.sin(a)*rr
    };
  });
}

// ── 배경 카메라 ───────────────────────────────────────
function bgZoomIn(phaseIdx){
  if(!window._bg) return;
  window._bg.targetZ=24; window._bg.targetX=(phaseIdx-3.5)*5; window._bg.targetY=18;
}
function bgZoomOut(){
  if(!window._bg) return;
  window._bg.targetZ=100; window._bg.targetX=0; window._bg.targetY=27;
}

// ── 타임라인 그리기 ───────────────────────────────────
function drawTimeline(alpha){
  if(alpha<=0.01) return;

  // 데이터 로딩 중 표시
  if(!dataReady){
    ctx.save();ctx.globalAlpha=alpha*0.5;ctx.textAlign='center';
    ctx.font=`300 13px 'Noto Sans KR'`;
    ctx.fillStyle='#6E6C66';
    ctx.fillText('책 목록을 불러오는 중…', W/2, H/2);
    ctx.restore();
  }

  // 호 라인
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.beginPath();
  for(let t=-1.5;t<=1.5;t+=0.015){
    const px=W/2+t*W*0.55,py=H*0.50+t*t*70;
    t===-1.5?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.strokeStyle='rgba(110,108,102,0.18)';ctx.lineWidth=0.5;ctx.stroke();
  ctx.restore();

  phaseHitAreas=[];

  PHASES.forEach((phase,i)=>{
    const tPos=i*PHASE_SPACING;
    const{x,y,opacity,scale}=tlToScreen(tPos);
    if(opacity<0.02) return;
    const eff=opacity*alpha;

    // 중심 정렬 정도 (0~1) — 강조 강도를 부드럽게 보간
    const cness=centernessOf(i);
    const pulse=1+Math.sin(performance.now()/600)*0.06*cness;

    // 클릭 힌트 링 — 중심일수록 선명, 가장자리는 거의 사라짐
    ctx.save();ctx.globalAlpha=eff*(0.06+cness*0.5);
    ctx.beginPath();ctx.arc(x,y,24*scale*pulse,0,Math.PI*2);
    ctx.strokeStyle='#D9A96E';ctx.lineWidth=0.5+cness*0.5;ctx.stroke();ctx.restore();

    // 중심 정렬 시 바깥 펄스 링 하나 더
    if(cness>0.5){
      ctx.save();ctx.globalAlpha=eff*(cness-0.5)*0.5;
      ctx.beginPath();ctx.arc(x,y,34*scale*pulse,0,Math.PI*2);
      ctx.strokeStyle='#D9A96E';ctx.lineWidth=0.5;ctx.stroke();ctx.restore();
    }

    // 마커 — 중심일수록 밝고 큼
    const mr=(5+cness*2)*scale;
    ctx.save();ctx.globalAlpha=eff*(0.55+cness*0.45);
    ctx.beginPath();ctx.arc(x,y,mr,0,Math.PI*2);
    ctx.fillStyle=cness>0.5?'#D9A96E':'#B87D3E';
    ctx.shadowColor='rgba(184,125,62,0.85)';ctx.shadowBlur=10+cness*12;
    ctx.fill();ctx.restore();

    phaseHitAreas.push({x,y,r:26*scale,phaseIdx:i});

    // 진입 신호 — 충분히 중심에 왔을 때만 페이드인
    if(cness>0.85){
      ctx.save();ctx.globalAlpha=eff*((cness-0.85)/0.15)*0.85;
      ctx.textAlign='center';
      ctx.font=`italic 300 ${Math.round(11*scale)}px 'IM Fell English'`;
      ctx.fillStyle='#D9A96E';
      ctx.fillText('click to enter', x, y+34*scale);
      ctx.restore();
    }

    // 레이블 (호 위)
    ctx.save();ctx.globalAlpha=eff;ctx.textAlign='center';
    ctx.font=`300 ${Math.round(11.5*scale)}px 'IM Fell English'`;
    ctx.fillStyle='#8C5A20';
    ctx.fillText(`Phase ${phase.id}`,x,y-58*scale);
    ctx.font=`300 ${Math.round(16*scale)}px 'Noto Serif KR'`;
    ctx.fillStyle='#C8C5BE';
    ctx.fillText(phase.name,x,y-38*scale);
    ctx.font=`300 ${Math.round(11*scale)}px 'Noto Sans KR'`;
    ctx.fillStyle='#6E6C66';
    ctx.fillText(phase.desc,x,y-18*scale);
    ctx.restore();
  });

  // 책 별 — Phase 마커 중심으로 원형 산포
  BOOKS.forEach(book=>{
    const pIdx=book.phase-1;
    // id 기반 고정 랜덤 — 매번 같은 위치 유지
    const s1=Math.sin(book.id*137.508);
    const s2=Math.cos(book.id*97.312);
    const s3=Math.sin(book.id*53.7);
    // 극좌표로 원형 배치
    const angle=s1*Math.PI*2;
    const radius=Math.abs(s2)*PHASE_SPACING*0.38 + Math.abs(s3)*PHASE_SPACING*0.08;
    const tPos=pIdx*PHASE_SPACING + Math.cos(angle)*radius*0.55;
    const yOff=Math.sin(angle)*radius*0.75;

    const{x,y,opacity,scale}=tlToScreen(tPos);
    if(opacity<0.04) return;
    const c=book._starColor;
    const bx=x, by=y+yOff*scale, r=2.5*scale;
    ctx.save();ctx.globalAlpha=opacity*alpha*0.28;
    ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);
    ctx.fillStyle=`rgb(${Math.round(c.r*255)},${Math.round(c.g*255)},${Math.round(c.b*255)})`;
    ctx.shadowColor=`rgba(${Math.round(c.r*255)},${Math.round(c.g*255)},${Math.round(c.b*255)},0.25)`;
    ctx.shadowBlur=3;ctx.fill();ctx.restore();
  });
}

// ── 성단 그리기 ───────────────────────────────────────
function drawCluster(layout,alpha,phaseIdx){
  if(alpha<=0.01||!layout.length) return;
  const cx=W/2,cy=H/2;
  const phase=PHASES[phaseIdx];
  const now=performance.now()/1000;

  // C: 진입 애니 진행도 (0→1, ENTRY_DURATION 초 동안)
  const entryElapsed=now-clusterEntryTime;
  const entryT=Math.min(1, entryElapsed/ENTRY_DURATION);
  // easeOutCubic — 빠르게 퍼졌다 부드럽게 안착
  const entryE=1-Math.pow(1-entryT,3);

  // ── 별자리 — 호버한 별 둘레의 5~12개를 자연스럽게 연결 ──
  if(constellation.members.length>1 && constellationAlpha>0.01){
    const m=constellation.members;
    ctx.save();
    ctx.strokeStyle='rgba(217,169,110,0.85)';
    ctx.lineWidth=0.6;
    ctx.lineCap='round';
    for(const [i,j] of constellation.edges){
      const a=m[i], b=m[j];
      if(a._csx==null||b._csx==null) continue;
      ctx.globalAlpha=alpha*constellationAlpha*0.55;
      ctx.beginPath();
      ctx.moveTo(a._csx,a._csy);
      ctx.lineTo(b._csx,b._csy);
      ctx.stroke();
    }
    ctx.restore();
  }

  // 별자리 알파 애니메이션
  if(constellationDir===1){
    constellationAlpha=Math.min(1, constellationAlpha+0.04);
  } else if(constellationDir===-1){
    constellationAlpha=Math.max(0, constellationAlpha-0.03);
    if(constellationAlpha<=0){ constellationDir=0; constellation={members:[],edges:[]}; }
  }

  layout.forEach(({book,x,y},i)=>{
    const isHovered=(hoveredBook===book);
    const c=book._starColor;
    const colStr=`rgb(${Math.round(c.r*255)},${Math.round(c.g*255)},${Math.round(c.b*255)})`;
    const glowStr=`rgba(${Math.round(c.r*255)},${Math.round(c.g*255)},${Math.round(c.b*255)},0.9)`;

    // C: 진입 — 별마다 약간 다른 딜레이로 중앙에서 퍼져나옴
    const delay=Math.min(i/layout.length*0.4, 0.38); // 0~0.38초 딜레이
    const starT=Math.min(1, Math.max(0, (entryT-delay)/(1-delay)));
    const starE=1-Math.pow(1-starT,3);

    // 진입 위치: 중앙(cx,cy) → 최종 위치(x,y)
    const rx=cx+(x-cx)*starE;
    const ry=cy+(y-cy)*starE;

    // A: 미세 부유 — 각 별마다 고유 주기·방향
    const floatAmp=3+Math.abs(Math.sin(book.id*7.3))*4; // 3~7px
    const floatSpeedX=0.4+Math.abs(Math.sin(book.id*3.1))*0.5;
    const floatSpeedY=0.35+Math.abs(Math.cos(book.id*5.7))*0.4;
    const floatX=Math.sin(now*floatSpeedX+book.id*2.1)*floatAmp;
    const floatY=Math.cos(now*floatSpeedY+book.id*1.7)*floatAmp*0.7;

    // 진입 완료 후 부유 적용 (진입 중엔 부유 억제)
    const floatMix=Math.max(0, (starE-0.7)/0.3); // 70% 이후부터 부유 시작
    const fx=rx+floatX*floatMix;
    const fy=ry+floatY*floatMix;

    // 마우스 거리 기반 proximity
    const dx=mouseX-fx, dy=mouseY-fy;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const proximity=Math.max(0,1-dist/320);
    const baseAlpha=(0.2+proximity*0.8)*starE; // 진입 중 페이드인

    // 검색 반짝임 — selectBook이 book._sparkleUntil 설정
    const sparkling = book._sparkleUntil && now < book._sparkleUntil;
    const sparkP = sparkling ? (Math.sin(now*13)*0.5+0.5) : 0; // 0~1 빠른 명멸
    const hot = isHovered || sparkling;

    // 별 크기
    const pulse=1+Math.sin(now*2+book.id)*0.1;
    let r = isHovered ? 12 : (3+proximity*6)*pulse;
    if(sparkling) r = Math.max(r, 7+sparkP*8);

    const cr=Math.round(c.r*255), cg=Math.round(c.g*255), cb2=Math.round(c.b*255);

    // 반짝임 후광 링 — "여기 있어요"
    if(sparkling){
      ctx.save();
      ctx.globalAlpha=alpha*(0.25+sparkP*0.5);
      ctx.beginPath();
      ctx.arc(fx,fy,(r*2.2)+8+sparkP*6,0,Math.PI*2);
      ctx.strokeStyle='rgba(242,224,200,0.9)';
      ctx.lineWidth=0.8;
      ctx.stroke();
      ctx.restore();
    }

    // 방사형 그라디언트 — 중심 밝고 바깥으로 흐려지는 별 느낌
    const starAlpha=alpha*(hot?1:baseAlpha);
    const grad=ctx.createRadialGradient(fx,fy,0,fx,fy,r*2.2);

    if(hot){
      grad.addColorStop(0,   `rgba(255,255,255,0.95)`);
      grad.addColorStop(0.2, `rgba(${cr},${cg},${cb2},0.85)`);
      grad.addColorStop(0.5, `rgba(${cr},${cg},${cb2},0.35)`);
      grad.addColorStop(1,   `rgba(${cr},${cg},${cb2},0)`);
    } else {
      const brightness=0.5+proximity*0.4;
      grad.addColorStop(0,   `rgba(255,255,255,${0.8*brightness})`);
      grad.addColorStop(0.25,`rgba(${cr},${cg},${cb2},${0.65*brightness})`);
      grad.addColorStop(0.6, `rgba(${cr},${cg},${cb2},${0.2*brightness})`);
      grad.addColorStop(1,   `rgba(${cr},${cg},${cb2},0)`);
    }

    ctx.save();
    ctx.globalAlpha=starAlpha;
    ctx.beginPath();
    ctx.arc(fx,fy,r*2.2,0,Math.PI*2);
    ctx.fillStyle=grad;
    ctx.fill();
    ctx.restore();

    // 호버·검색 시 제목 — 별 바로 위
    if(hot){
      ctx.save();ctx.globalAlpha=alpha*(sparkling?0.7+sparkP*0.3:1);
      ctx.font=`400 13px 'Noto Serif KR'`;
      ctx.fillStyle='rgba(242,224,200,0.95)';
      ctx.shadowColor='rgba(0,0,0,0.9)';ctx.shadowBlur=10;
      ctx.textAlign='center';
      ctx.fillText(book.title, fx, fy-r*2.2-8);
      ctx.restore();
    }

    book._csx=fx;book._csy=fy;book._cr=r+10;
  });
}

// ── 메인 루프 ─────────────────────────────────────────
const SPEED=0.013; // 느리게 — 천천히 빨려드는 느낌

function loop(){
  ctx.clearRect(0,0,W,H);

  if(viewMode==='timeline'){
    currentOffset+=(targetOffset-currentOffset)*0.055;
    const newPI=Math.max(0,Math.min(PHASES.length-1,Math.round(currentOffset/PHASE_SPACING)));
    if(newPI!==currentPhaseIndex){currentPhaseIndex=newPI;updatePhaseUI();}

    // 타임라인 스크롤에 비례한 배경 시차(parallax)
    if(window._bg){
      const totalRange=(PHASES.length-1)*PHASE_SPACING;
      const normalized=currentOffset/totalRange;
      window._bg.targetX=(normalized-0.5)*28;
    }

    drawTimeline(1);
    setHeaders(1,0);
  }

  else if(viewMode==='zoom-in'){
    zoomT=Math.min(1,zoomT+SPEED);
    const e=eio(zoomT);
    const tlA=Math.max(0,1-e*1.4);
    const cA =Math.max(0,e*1.4-0.4);
    drawTimeline(tlA);
    drawCluster(clusterBooks,cA,activeIdx);
    setHeaders(tlA,cA);
    if(zoomT>=1){
      viewMode='cluster';setClusterHeaderText(activeIdx);
      if(pendingEnter!=null){
        if(pendingEnter===activeIdx){ pendingEnter=null; }
        else { const pe=pendingEnter; window.exitCluster(); pendingEnter=pe; }
      }
    }
  }

  else if(viewMode==='cluster'){
    drawCluster(clusterBooks,1,activeIdx);
    setHeaders(0,1);
  }

  else if(viewMode==='zoom-out'){
    zoomT=Math.min(1,zoomT+SPEED);
    const e=eio(zoomT);
    const cA=Math.max(0,1-e*1.4);
    const tlA=Math.max(0,e*1.4-0.4);
    drawCluster(clusterBooks,cA,activeIdx);
    drawTimeline(tlA);
    setHeaders(tlA,cA);
    if(zoomT>=1){
      viewMode='timeline';
      activeIdx=null;clusterBooks=[];
      hoveredBook=null;hideHoverPanel();
      if(pendingEnter!=null){
        const pe=pendingEnter; pendingEnter=null;
        targetOffset=pe*PHASE_SPACING; clamp();
        currentOffset=targetOffset; // 즉시 정렬 후 바로 진입
        enterCluster(pe);
      }
    }
  }

  requestAnimationFrame(loop);
}

// ── 전환 진입점 ───────────────────────────────────────

  if(viewMode!=='timeline') return;
  activeIdx=phaseIdx;

}

  if(viewMode!=='cluster') return;

});
window.addEventListener('mousemove',e=>{
  mouseX=e.clientX; mouseY=e.clientY;
  if(!isDragging){checkHover(e.clientX,e.clientY);return;}
  if(viewMode==='timeline'){targetOffset=dragSO+(dragSX-e.clientX)*1.15;clamp();}
});
window.addEventListener('mouseup',e=>{
  if(!isDragging) return;
  isDragging=false;tlCanvas.style.cursor='default';
  const dx=e.clientX-mdX,dy=e.clientY-mdY;
  if(Math.sqrt(dx*dx+dy*dy)<6&&Date.now()-mdT<300) handleClick(e.clientX,e.clientY);
  else if(viewMode==='timeline') snapNow();
});
tlCanvas.addEventListener('wheel',e=>{
  e.preventDefault();
  if(viewMode!=='timeline') return;
  targetOffset+=(e.deltaY+e.deltaX)*0.75;clamp();
  scheduleSnap();
},{passive:false});

let tSX=0,tSO=0,tDX=0,tDY=0,tDT=0;
tlCanvas.addEventListener('touchstart',e=>{
  tSX=e.touches[0].clientX;tSO=targetOffset;
  tDX=tSX;tDY=e.touches[0].clientY;tDT=Date.now();
},{passive:true});
tlCanvas.addEventListener('touchmove',e=>{
  if(viewMode!=='timeline') return;
  targetOffset=tSO+(tSX-e.touches[0].clientX)*1.4;clamp();
},{passive:true});
tlCanvas.addEventListener('touchend',e=>{
  const ch=e.changedTouches[0];
  const dx=ch.clientX-tDX,dy=ch.clientY-tDY;
  if(Math.sqrt(dx*dx+dy*dy)<8&&Date.now()-tDT<300) handleClick(ch.clientX,ch.clientY);
  else if(viewMode==='timeline') snapNow();
});

function clamp(){targetOffset=Math.max(0,Math.min((PHASES.length-1)*PHASE_SPACING,targetOffset));}

// ── 중심 정렬(snap-to-center) ─────────────────────────
// 각 Phase가 화면 중심에 얼마나 가까운지: 정확히 중심=1, 반 칸 벗어나면 0
function centernessOf(i){
  return Math.max(0, 1 - Math.abs(currentOffset - i*PHASE_SPACING)/(PHASE_SPACING*0.5));
}
// 현재 중심 Phase가 충분히 정렬되었는가 (진입 허용 임계)
function isCentered(){
  return centernessOf(currentPhaseIndex) > 0.72;
}
// 가장 가까운 Phase로 즉시 스냅
function snapNow(){
  if(snapTimer){clearTimeout(snapTimer);snapTimer=null;}
  if(viewMode!=='timeline') return;
  targetOffset=Math.round(targetOffset/PHASE_SPACING)*PHASE_SPACING;
  clamp();
}
// 입력이 멈춘 뒤 디바운스로 스냅 (자유 스크롤 감각 유지)
let snapTimer=null;
function scheduleSnap(delay=140){
  if(snapTimer) clearTimeout(snapTimer);
  snapTimer=setTimeout(()=>{ snapTimer=null; snapNow(); },delay);
}

function handleClick(mx,my){
  if(viewMode==='timeline'){
    for(const h of phaseHitAreas){
      const dx=mx-h.x,dy=my-h.y;
      if(Math.sqrt(dx*dx+dy*dy)<h.r){
        if(h.phaseIdx===currentPhaseIndex && isCentered()){
          enterCluster(h.phaseIdx);          // 중심에 정렬된 Phase → 성단 진입
        } else {
          targetOffset=h.phaseIdx*PHASE_SPACING; clamp();  // 양옆 Phase → 중심으로 이동
        }
        return;
      }
    }
  }
  // 성단 뷰에서는 클릭 없음 — 호버만
}

function checkHover(mx,my){
  let found=false;
  if(viewMode==='timeline'){
    for(const h of phaseHitAreas){
      const dx=mx-h.x,dy=my-h.y;
      if(Math.sqrt(dx*dx+dy*dy)<h.r){found=true;break;}
    }
    tlCanvas.style.cursor=found?'pointer':'default';
  } else if(viewMode==='cluster'){
    let newHovered=null;
    for(const cb of clusterBooks){
      if(!cb.book._csx) continue;
      const dx=mx-cb.book._csx,dy=my-cb.book._csy;
      if(Math.sqrt(dx*dx+dy*dy)<cb.book._cr){newHovered=cb.book;break;}
    }
    if(newHovered!==hoveredBook){
      hoveredBook=newHovered;
      if(hoveredBook){
        showHoverPanel(hoveredBook);
        constellation=buildConstellation(hoveredBook); // 별 5~12개 연결
        constellationDir=1; // 페이드인
      } else {
        hideHoverPanel();
        constellationDir=-1; // 페이드아웃
      }
    }
    tlCanvas.style.cursor='default';
  }
}

// ── 키보드 ────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  const si=document.getElementById('book-search-input');
  if(si && document.activeElement===si) return; // 검색 입력 중엔 성단 조작 안 함
  if(e.key==='Escape'){
    if(viewMode==='cluster') window.exitCluster();
    return;
  }
  if(viewMode!=='timeline') return;
  if(e.key==='Enter' && isCentered()){ enterCluster(currentPhaseIndex); return; }
  if(e.key==='ArrowRight'){targetOffset=(Math.round(targetOffset/PHASE_SPACING)+1)*PHASE_SPACING;clamp();}
  if(e.key==='ArrowLeft') {targetOffset=(Math.round(targetOffset/PHASE_SPACING)-1)*PHASE_SPACING;clamp();}
});

// ── BGM 제어 ─────────────────────────────────────────
const bgm = document.getElementById('bgm');
let bgmPlaying = false;

bgm.volume = 0.35;

// 첫 번째 사용자 인터랙션 시 자동 재생 시도
function tryAutoPlay(){
  bgm.play().then(()=>{
    bgmPlaying = true;
    updateBgmIcon();
  }).catch(()=>{}); // 자동재생 차단 시 무시
  document.removeEventListener('click', tryAutoPlay);
  document.removeEventListener('keydown', tryAutoPlay);
}
document.addEventListener('click', tryAutoPlay);
document.addEventListener('keydown', tryAutoPlay);

window.toggleBgm = function(){
  if(bgmPlaying){
    bgm.pause();
    bgmPlaying = false;
  } else {
    bgm.play();
    bgmPlaying = true;
  }
  updateBgmIcon();
};

window.setBgmVol = function(v){
  bgm.volume = parseFloat(v);
};

function updateBgmIcon(){
  const icon = document.getElementById('bgm-icon');
  if(bgmPlaying){
    // 일시정지 아이콘
    icon.innerHTML = `
      <rect x="6" y="4" width="4" height="16" fill="rgba(184,125,62,0.8)"/>
      <rect x="14" y="4" width="4" height="16" fill="rgba(184,125,62,0.8)"/>`;
  } else {
    // 재생 아이콘
    icon.innerHTML = `
      <polygon points="5,3 19,12 5,21" fill="rgba(110,108,102,0.8)" stroke="none"/>`;
  }
}

// ── 책 검색 — 자동완성 · 초성 · 제안 · 별 반짝임 ──────
(function(){
  const CHO=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  function toCho(str){
    let out='';
    for(const ch of str){
      const code=ch.charCodeAt(0)-0xAC00;
      if(code>=0 && code<11172) out+=CHO[Math.floor(code/588)];
      else out+=ch;
    }
    return out;
  }
  const isCho=q=>/^[ㄱ-ㅎ\s]+$/.test(q) && q.trim().length>0;
  function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

  const box=document.getElementById('book-search');
  const input=document.getElementById('book-search-input');
  const results=document.getElementById('book-search-results');
  let activeIndex=-1, current=[];

  function filterBooks(q){
    q=q.trim();
    if(!q) return [];
    const lower=q.toLowerCase();
    const cho=isCho(q);
    const qc=q.replace(/\s/g,'');
    const res=[];
    for(const b of BOOKS){
      let hit=false;
      if(cho){
        if(toCho(b.title||'').replace(/\s/g,'').includes(qc)) hit=true;
      } else {
        if((b.title||'').toLowerCase().includes(lower) ||
           (b.author||'').toLowerCase().includes(lower) ||
           (b.subtitle||'').toLowerCase().includes(lower)) hit=true;
      }
      if(hit){ res.push(b); if(res.length>=8) break; }
    }
    return res;
  }
  function suggestBooks(){
    const pool=BOOKS.slice();
    for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
    return pool.slice(0,6);
  }

  function render(list,isSuggest){
    current=list; activeIndex=-1;
    if(!list.length && !isSuggest){
      results.innerHTML='<div class="bs-empty">그 이름의 별은 아직 없어요</div>';
      results.classList.add('open'); return;
    }
    let html = isSuggest ? '<div class="bs-hint">이런 별은 어때요</div>' : '';
    html += list.map((b,i)=>{
      const meta=(b.author||'')+(b.phase_name?'   ·   '+b.phase_name:'');
      return '<div class="bs-item" data-i="'+i+'">'
        +'<div class="bs-item-title">'+esc(b.title)+'</div>'
        +'<div class="bs-item-meta">'+esc(meta)+'</div></div>';
    }).join('');
    results.innerHTML=html;
    results.classList.add('open');
    results.querySelectorAll('.bs-item').forEach(el=>{
      el.addEventListener('click',()=>selectBook(current[+el.dataset.i]));
    });
  }
  function close(){ results.classList.remove('open'); results.innerHTML=''; activeIndex=-1; }
  window.closeSearch=close;

  function selectBook(book){
    if(!book) return;
    const phaseIdx=book.phase-1;
    book._sparkleUntil=performance.now()/1000+5; // 5초 반짝
    input.value=''; close(); input.blur();
    if(viewMode==='cluster' && activeIdx===phaseIdx) return; // 이미 그 성단 안
    if(viewMode==='timeline'){
      targetOffset=phaseIdx*PHASE_SPACING; clamp();
      currentOffset=targetOffset;
      enterCluster(phaseIdx);
    } else {
      if(viewMode==='cluster') window.exitCluster();
      pendingEnter=phaseIdx; // 전환 끝나면 loop가 진입시킴
    }
  }
  window.selectBook=selectBook;

  function upd(items){
    items.forEach((el,i)=>el.classList.toggle('active',i===activeIndex));
    if(activeIndex>=0 && items[activeIndex]) items[activeIndex].scrollIntoView({block:'nearest'});
  }

  input.addEventListener('input',()=>{
    const q=input.value;
    if(!q.trim()){ render(suggestBooks(),true); return; }
    render(filterBooks(q),false);
  });
  input.addEventListener('focus',()=>{ if(!input.value.trim()) render(suggestBooks(),true); });
  input.addEventListener('keydown',e=>{
    const items=results.querySelectorAll('.bs-item');
    if(e.key==='ArrowDown'){ e.preventDefault(); activeIndex=Math.min(items.length-1,activeIndex+1); upd(items); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); activeIndex=Math.max(0,activeIndex-1); upd(items); }
    else if(e.key==='Enter'){ e.preventDefault();
      if(activeIndex>=0 && current[activeIndex]) selectBook(current[activeIndex]);
      else if(current.length) selectBook(current[0]);
    }
    else if(e.key==='Escape'){ input.value=''; close(); input.blur(); }
  });
  // 바깥 클릭 시 결과 닫기 (검색창 내부 클릭은 유지)
  document.addEventListener('mousedown',e=>{ if(!box.contains(e.target)) close(); });
})();

window.addEventListener('resize',resize);
resize();
loop();
</script>
</body>
