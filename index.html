<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1A1815">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="談藏齋">
<title>談藏齋 — 초당</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1A1815;        /* 먹빛 — 서고의 밤 */
    --ink-soft: #242019;   /* 서가의 그늘 */
    --clay: #C25E3F;       /* 주황 — 등불 */
    --paper: #F5F2EC;      /* 종이 */
    --paper-line: #E7E2D6; /* 종이 위 괘선 */
    --mist: #8a877f;       /* 흐린 글씨 */
    --paper-ink: #2A2721;  /* 종이 위의 먹 글씨 */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'Noto Sans KR', sans-serif;
    display: flex;
    flex-direction: column;
    overscroll-behavior: none;
  }

  /* ── 공통 ── */
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  .hidden { display: none !important; }

  /* ── 문(로그인) — 문 전체가 한 장의 탁본 ── */
  #gate {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 32px;
    background: var(--ink) url("takbon-bg.jpg") center / cover no-repeat;
  }
  #gate .hyeonpan {
    max-height: 42vh;
    max-width: 62vw;
    width: auto;
    filter: drop-shadow(0 2px 18px rgba(0,0,0,0.35));
  }
  #gate form {
    display: flex; flex-direction: column; gap: 12px;
    width: 100%; max-width: 320px;
    background: rgba(26, 24, 21, 0.45);
    border-radius: 16px;
    padding: 18px;
    backdrop-filter: blur(2px);
  }
  #gate input {
    background: rgba(36, 32, 25, 0.92);
    border: 1px solid #3a3630;
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--paper);
    font-size: 16px;
    font-family: inherit;
  }
  #gate input:focus { outline: 2px solid var(--clay); outline-offset: 1px; border-color: transparent; }
  #gate input:-webkit-autofill,
  #gate input:-webkit-autofill:hover,
  #gate input:-webkit-autofill:focus {
    -webkit-box-shadow: 0 0 0 1000px #24201A inset;
    -webkit-text-fill-color: var(--paper);
    caret-color: var(--paper);
  }
  #gate .enter {
    background: var(--clay);
    color: var(--ink);
    font-weight: 500;
    border-radius: 10px;
    padding: 14px;
    font-size: 16px;
    margin-top: 6px;
  }
  #gate .gate-msg { color: var(--mist); font-size: 13px; min-height: 20px; text-align: center; }

  /* ── 초당 본채 ── */
  #hall { flex: 1; display: flex; flex-direction: column; min-height: 0; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: calc(env(safe-area-inset-top) + 14px) 20px 14px;
  }
  header .brand { display: flex; align-items: center; gap: 10px; }
  header .brand svg { width: 30px; height: 30px; }
  header .brand span {
    font-family: 'Noto Serif KR', serif;
    font-weight: 600;
    font-size: 17px;
    letter-spacing: 3px;
    color: var(--clay);
  }
  header .leave { color: var(--mist); font-size: 13px; padding: 6px; }

  /* 날짜 — 일어난 날 */
  .when {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 22px 12px;
    color: var(--mist);
    font-size: 14px;
  }
  .when input[type="date"] {
    background: none;
    border: none;
    color: var(--paper);
    font-family: inherit;
    font-size: 14px;
    padding: 4px 2px;
  }
  .when input[type="date"]:focus { outline: 1px solid var(--clay); border-radius: 6px; }

  /* 흰 종이 한 장 — 서고의 등불이자 이 집의 서명 */
  .paper {
    flex: 1;
    min-height: 0;
    margin: 0 14px;
    /* 한지의 결 — 세 겹:
       ① 닥섬유 입자(미세 노이즈)  ② 가로로 흐르는 긴 섬유  ③ 스민 얼룩과 가장자리 바램 */
    background-color: var(--paper);
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='g'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' seed='11' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.47 0 0 0 0 0.39 0 0 0 0 0.27 0 0 0 0.55 0'/></filter><rect width='220' height='220' filter='url(%23g)'/></svg>"),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='340' height='170'><filter id='f'><feTurbulence type='fractalNoise' baseFrequency='0.012 0.16' numOctaves='3' seed='7' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.42 0 0 0 0 0.34 0 0 0 0 0.22 0 0 0 0.30 0'/></filter><rect width='340' height='170' filter='url(%23f)'/></svg>"),
      radial-gradient(circle at 18% 22%, rgba(190,168,132,0.20) 0%, transparent 45%),
      radial-gradient(circle at 82% 30%, rgba(174,150,116,0.16) 0%, transparent 42%),
      radial-gradient(circle at 55% 78%, rgba(196,176,140,0.18) 0%, transparent 48%),
      radial-gradient(ellipse at center, transparent 55%, rgba(146,118,82,0.14) 100%);
    border-radius: 16px 16px 0 0;
    box-shadow: 0 0 60px rgba(194, 94, 63, 0.07), inset 0 0 46px rgba(158, 130, 92, 0.10);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .paper textarea {
    flex: 1;
    width: 100%;
    border: none;
    resize: none;
    background: transparent;   /* 괘선 없이 — 한지의 결이 그대로 비친다 */
    padding: 22px 22px 12px;
    font-family: 'Noto Serif KR', serif;
    font-size: 17px;
    line-height: 36px;
    color: var(--paper-ink);
  }
  .paper textarea:focus { outline: none; }
  .paper textarea::placeholder { color: #b9b3a5; }

  /* 종이에 붙은 것들 (사진·곡 미리보기) */
  .attached { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 18px; }
  .attached:empty { display: none; }
  .thumb { position: relative; width: 56px; height: 56px; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
  .thumb .off, .songchip .off {
    position: absolute; top: -6px; right: -6px;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--ink); color: var(--paper);
    font-size: 12px; line-height: 20px; text-align: center;
  }
  .songchip {
    position: relative;
    display: flex; align-items: center; gap: 8px;
    background: #EDE8DC; border-radius: 999px;
    padding: 6px 14px 6px 8px;
    font-size: 13px; color: var(--paper-ink);
    max-width: 100%;
  }
  .songchip img { width: 32px; height: 32px; border-radius: 50%; }
  .songchip .t { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* 문방구 — 하단 도구줄 */
  .desk {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px calc(env(safe-area-inset-bottom) + 12px);
    background: var(--ink);
  }
  .tool {
    display: flex; align-items: center; justify-content: center;
    width: 46px; height: 46px;
    border-radius: 12px;
    background: var(--ink-soft);
    color: var(--clay);
    font-size: 20px;
  }
  .tool svg { width: 22px; height: 22px; display: block; }
  .keep {
    flex: 1;
    background: var(--clay);
    color: var(--ink);
    font-weight: 500;
    font-size: 16px;
    border-radius: 12px;
    height: 46px;
  }
  .keep:disabled { opacity: 0.45; }

  /* 위치 표찰 — 갈무리 곁에서 '적은 곳'을 조용히 증언한다 */
  /* 할 일 서랍 */
  .modal-title { flex: 1; color: var(--mist); font-size: 14px; letter-spacing: .06em; }
  .todo-row { align-items: flex-start; }
  .todo-check {
    flex-shrink: 0;
    width: 26px; height: 26px; margin-top: 2px;
    border: 1.6px solid var(--clay); border-radius: 50%;
    background: transparent; color: transparent;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; line-height: 1;
    transition: background .15s, color .15s;
  }
  .todo-check:active { background: var(--clay); color: var(--paper); }
  .songrow.todo-row .meta b { font-weight: 500; white-space: normal; overflow: visible; text-overflow: clip; word-break: break-word; line-height: 1.65; }
  .todo-row .meta span { display: block; color: var(--mist); font-size: 12px; margin-top: 2px; }
  /* 열람실의 완료된 동그라미 — 원본 위에 얹힌 표시 층 */
  .todo-done { color: var(--clay); }

  /* 위치 아이콘 — 자리가 정해지면 핀이 깨어난다 */
  .loc-chip {
    display: flex; align-items: center; justify-content: center;
    width: 46px; height: 46px;
    border-radius: 12px;
    background: var(--ink-soft);
    color: var(--clay);
    transition: opacity .2s, background .2s;
  }
  .loc-chip svg { width: 22px; height: 22px; display: block; }
  .loc-chip.is-empty { opacity: .45; }
  .loc-chip:not(.is-empty) { background: rgba(194, 94, 63, .22); opacity: 1; }

  /* 갈무리 확인 */
  #toast {
    position: fixed;
    z-index: 20;
    left: 50%; bottom: calc(env(safe-area-inset-bottom) + 84px);
    transform: translateX(-50%) translateY(8px);
    background: var(--paper); color: var(--ink);
    font-size: 14px;
    padding: 10px 20px;
    border-radius: 999px;
    opacity: 0;
    transition: opacity .25s, transform .25s;
    pointer-events: none;
    display: flex; align-items: center; gap: 8px;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast svg { width: 18px; height: 18px; }

  /* 열람실 — 먹 속의 종이 카드들 */
  #strata {
    position: fixed; inset: 0;
    background: var(--ink) url("takbon-bg.jpg") center / cover no-repeat;
    display: flex; flex-direction: column;
    z-index: 9;
  }
  .strata-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: calc(env(safe-area-inset-top) + 14px) 20px 12px;
    color: var(--clay);
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
  }
  .strata-bar .close { color: var(--mist); font-size: 14px; }
  #strataList {
    flex: 1; overflow-y: auto;
    padding: 4px 2px calc(env(safe-area-inset-bottom) + 24px);
    -webkit-overflow-scrolling: touch;
  }
  .day-line {
    display: flex; align-items: center; gap: 10px;
    color: var(--mist); font-size: 13px;
    margin: 22px 2px 10px;
  }
  .day-line::after { content: ""; flex: 1; height: 1px; background: #3a3630; }
  .sacho-wrap { position: relative; overflow: hidden; border-radius: 12px; margin-bottom: 10px; }
  .sacho-cull {
    position: absolute; top: 0; right: 0; bottom: 0; width: 92px;
    border: none; background: #7A2E1C; color: var(--paper);
    font-family: 'Noto Serif KR', serif; font-size: 14.5px; cursor: pointer;
  }
  .sacho-card {
    background: var(--paper);
    color: var(--paper-ink);
    border-radius: 12px;
    padding: 14px 16px;
    position: relative;
    transition: transform .18s ease;
    touch-action: pan-y;
  }
  .sacho-wrap .sacho-card { margin-bottom: 0; }
  .sacho-card .txt {
    font-family: 'Noto Serif KR', serif;
    font-size: 15.5px;
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .sacho-card .meta {
    margin-top: 10px;
    font-size: 12px;
    color: #9a948a;
    display: flex; justify-content: space-between; gap: 8px;
  }
  .sacho-card .pics { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 6px; margin-top: 12px; }
  .sacho-card .pics img { width: 84px; height: 84px; object-fit: cover; border-radius: 8px; cursor: pointer; transition: opacity .2s; }
  .sacho-card .songline {
    margin-top: 10px; font-size: 13px; color: var(--clay);
  }
  .strata-msg { text-align: center; color: var(--mist); font-size: 14px; padding: 48px 20px; }

  /* 갈래 — 밑줄 글자. 등불 한 획이 고른 갈래 아래로 미끄러진다 */
  .galae { position: relative; display: flex; gap: 22px; padding: 12px 18px 2px; }
  .galae .gbtn {
    background: none; border: none; padding: 0 0 7px;
    font-size: 14px; color: var(--mist);
    font-family: 'Noto Serif KR', serif; cursor: pointer;
    transition: color .2s;
  }
  .galae .gbtn.is-on { color: var(--paper); }
  .galae .g-ink {
    position: absolute; bottom: 0; height: 2px;
    background: var(--clay); border-radius: 1px;
    transition: left .25s ease, width .25s ease;
  }
  .card-galae { gap: 16px; padding: 12px 0 0; }
  .card-galae .gbtn.is-on { color: var(--paper-ink); }
  .card-galae .gbtn { font-size: 12.5px; padding-bottom: 6px; }
  .card-galae .tc-film { color: var(--clay); margin-left: auto; }

  /* time coring — 검색과 코어 지도 */
  .tc-search { padding: 0 16px 10px; }
  .tc-search input {
    width: 100%; padding: 11px 14px;
    background: var(--ink-soft); border: 1px solid #3a3630;
    border-radius: 12px; color: var(--paper);
    font-family: 'Noto Serif KR', serif; font-size: 15px;
  }
  .tc-search input:focus { outline: 2px solid var(--clay); border-color: transparent; }
  .tc-body { flex: 1; min-height: 0; display: flex; gap: 10px; padding: 0 14px 0 12px; }
  .tc-core { position: relative; width: 20px; flex-shrink: 0; margin: 2px 0 calc(env(safe-area-inset-bottom) + 16px); }
  .tc-rail {
    position: relative; width: 14px; height: 100%;
    border-radius: 7px; background: #201D19;
    box-shadow: inset 0 0 0 1px rgba(194,94,63,.15);
    overflow: hidden; cursor: pointer;
  }
  .tc-band { position: absolute; left: 0; width: 100%; }
  .tc-lens {
    position: absolute; left: 0; width: 100%;
    border: 1px solid var(--clay); border-radius: 4px;
    background: rgba(194,94,63,.15);
    box-shadow: 0 0 10px rgba(194,94,63,.55), inset 0 0 4px rgba(194,94,63,.35);
    pointer-events: none; transition: top .1s linear, height .1s linear;
  }
  #posaeModal {
    position: fixed; inset: 0; z-index: 30;
    background: rgba(20,17,14,.72);
    display: flex; align-items: center; justify-content: center; padding: 28px;
  }
  #posaeModal.hidden { display: none; }
  .posae-box {
    background: var(--ink-soft); color: var(--paper);
    border: 1px solid rgba(194,94,63,.45); border-radius: 14px;
    padding: 22px 22px 18px; max-width: 340px;
    font-family: 'Noto Serif KR', serif;
  }
  .posae-box h3 { margin: 0 0 12px; font-size: 16px; color: var(--clay); font-weight: 600; }
  .posae-box p { margin: 0 0 10px; font-size: 13.5px; line-height: 1.7; color: var(--paper); }
  .posae-box b { color: var(--clay); font-weight: 600; }
  .posae-row { display: flex; gap: 10px; margin-top: 16px; }
  .posae-row button {
    flex: 1; padding: 10px 0; border-radius: 10px; font-size: 14.5px;
    font-family: 'Noto Serif KR', serif; cursor: pointer;
  }
  #posaeNo { background: none; border: 1px solid #3a3630; color: var(--mist); }
  #posaeGo { background: var(--clay); border: 1px solid var(--clay); color: var(--paper); }

  .tc-float {
    position: absolute; left: calc(100% + 8px); transform: translateY(-50%);
    background: var(--ink-soft); color: var(--paper);
    font-size: 11.5px; white-space: nowrap;
    padding: 3px 9px; border-radius: 6px; border: 1px solid rgba(194,94,63,.45);
    pointer-events: none; opacity: 0; transition: opacity .2s; z-index: 3;
  }
  .tc-float.show { opacity: 1; }
  mark.hit { background: rgba(194,94,63,.30); color: inherit; border-radius: 3px; padding: 0 1px; }

  /* 곡 찾기 · 자리 찾기 */
  #songModal, #placeModal, #todoModal, #movieModal {
    position: fixed; inset: 0;
    background: rgba(26, 24, 21, 0.92);
    display: flex; flex-direction: column;
    padding: calc(env(safe-area-inset-top) + 20px) 18px calc(env(safe-area-inset-bottom) + 18px);
    gap: 14px;
    z-index: 10;
  }
  #songModal .bar, #placeModal .bar, #todoModal .bar, #movieModal .bar { display: flex; gap: 10px; align-items: center; }
  #songModal input, #placeModal input, #movieModal input {
    flex: 1;
    background: var(--ink-soft);
    border: 1px solid #3a3630;
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--paper);
    font-size: 16px;
    font-family: inherit;
  }
  #songModal input:focus, #placeModal input:focus, #movieModal input:focus { outline: 2px solid var(--clay); border-color: transparent; }
  #songModal .close, #placeModal .close, #todoModal .close, #movieModal .close { color: var(--mist); font-size: 14px; padding: 0 6px; }
  #songResults, #placeResults, #todoList, #movieResults { overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .songrow {
    display: flex; align-items: center; gap: 12px;
    padding: 10px; border-radius: 12px;
    background: var(--ink-soft);
    text-align: left; width: 100%;
  }
  .songrow img { width: 44px; height: 44px; border-radius: 8px; }
  .songrow .meta { min-width: 0; }
  .songrow .meta b { display: block; font-weight: 500; font-size: 14.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .songrow .meta span { font-size: 12.5px; color: var(--mist); }
  #songMsg, #placeMsg, #todoMsg, #movieMsg { color: var(--mist); font-size: 13px; text-align: center; padding: 8px; }
</style>
</head>
<body>

<!-- ════════════════════════════════════════════
     서고 연결 — 값이 이미 박혀 있다. 채울 칸 없음.
     ════════════════════════════════════════════ -->
<script>
  window.addEventListener("error", function (e) {
    var d = document.createElement("div");
    d.style.cssText = "position:fixed;top:0;left:0;right:0;background:#8c2f1b;color:#fff;font-size:12px;padding:8px 12px;z-index:99;font-family:monospace;";
    d.textContent = "스크립트 오류: " + e.message;
    document.body.appendChild(d);
  });
</script>

<!-- ── 문 — 서고에 드는 자를 묻는다 ── -->
<div id="gate">
  <img class="hyeonpan" src="hyeonpan-paper.png" alt="談藏齋 — 준철의 육필 현판">
  <form id="gateForm">
    <input type="email" id="email" placeholder="이메일" autocomplete="username" required>
    <input type="password" id="password" placeholder="비밀번호" autocomplete="current-password" required>
    <button class="enter" type="submit">서고에 들다</button>
    <div class="gate-msg" id="gateMsg"></div>
  </form>
</div>

<!-- ── 초당 본채 ── -->
<div id="hall" class="hidden">
  <header>
    <div class="brand">
      <svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect width="150" height="150" rx="34" fill="#1A1815"/>
        <circle cx="75" cy="75" r="50" fill="none" stroke="#C25E3F" stroke-width="5"/>
        <circle cx="39.6" cy="39.6" r="14" fill="#C25E3F"/>
        <circle cx="110.4" cy="110.4" r="14" fill="#C25E3F"/>
        <circle cx="75" cy="75" r="20" fill="#C25E3F"/>
        <circle cx="75" cy="75" r="8.5" fill="#1A1815"/>
      </svg>
      <span>초당</span>
    </div>
    <div style="display:flex; gap:4px; align-items:center;">
      <button class="leave" id="strataBtn" style="color:var(--clay);">time coring</button>
      <button class="leave" id="leaveBtn">나가기</button>
    </div>
  </header>

  <div class="when">
    <span>일어난 날</span>
    <input type="date" id="occurredOn">
  </div>

  <div class="paper">
    <div class="attached" id="attached"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
  // ── 서고 연결: 값 직접 기입, 라이브러리 로드 검문 포함 ──
  if (typeof supabase === "undefined") {
    document.body.insertAdjacentHTML("afterbegin",
      '<div style="position:fixed;top:0;left:0;right:0;background:#8c2f1b;color:#fff;font-size:12px;padding:8px 12px;z-index:99;">연결 도구(supabase-js)를 불러오지 못했다 — 네트워크나 콘텐츠 차단기를 확인.</div>');
    throw new Error("supabase-js not loaded");
  }
  const sb = supabase.createClient(
    "https://plwljyoouxyzsnyszcxw.supabase.co",
    "sb_publishable_m5k-ycq86oX7MEtUq_fFHA_03lEbuSa"
  );

  const $ = (id) => document.getElementById(id);
  const gate = $("gate"), hall = $("hall");
  let photos = [];   // 붙인 사진 File 목록
  let song = null;   // 고른 곡의 신원
  let movie = null;  // 고른 영화의 신원
  let pendingMovieEntry = null; // 열람실에서 영화를 얹을 사초의 번호
  let pendingSongEntry = null;  // 열람실에서 곡을 얹을 사초의 번호
  let sachoPlace = null; // 적은 곳 — { lat, lng, label, place_id, captured_at } 또는 null
  let hauntList = [];    // places 표에서 읽어온 단골 자리들

  // ── 문지기: 세션이 살아 있으면 바로 본채로 ──
  async function checkDoor() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) { openHall(); } else { gate.classList.remove("hidden"); hall.classList.add("hidden"); }
  }

  function openHall() {
    gate.classList.add("hidden");
    hall.classList.remove("hidden");
    $("occurredOn").value = todayStr();
    $("body").focus();
    loadHaunts();      // 단골 자리만 미리 읽어둔다 — 위치는 자동으로 잡지 않는다
    renderLocChip();
  }

  function todayStr() {
    const d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  }

  $("gateForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    $("gateMsg").textContent = "문을 여는 중…";
    const { error } = await sb.auth.signInWithPassword({
      email: $("email").value.trim(),
      password: $("password").value
    });
    if (error) { $("gateMsg").textContent = "문이 열리지 않는다 — " + (error.message || "이메일과 비밀번호를 확인."); return; }
    $("gateMsg").textContent = "";
    openHall();
  });

  $("leaveBtn").addEventListener("click", async () => {
    await sb.auth.signOut();
    location.reload();
  });

  // ── 위치 기둥: 자리는 준철씨가 지정한다 — 자동으로 잡지 않는다 ──
  //    표찰을 누르면 자리 찾기 창이 열린다. 단골 자리(places)면 place_id를 실로 걸고,
  //    지도 검색·지금 여기·이름만 적기 중에서 고른다. 좌표가 원본, 지명은 덧댄 층.

  async function loadHaunts() {
    try {
      const { data } = await sb.from("places").select("id, name, lat, lng");
      hauntList = data || [];
    } catch { hauntList = []; }
  }

  function distanceMeters(aLat, aLng, bLat, bLng) {
    // 하버사인 — 두 좌표 사이의 거리(미터)
    const R = 6371000, toRad = (d) => d * Math.PI / 180;
    const dLat = toRad(bLat - aLat), dLng = toRad(bLng - aLng);
    const s = Math.sin(dLat / 2) ** 2 +
              Math.cos(toRad(aLat)) * Math.cos(toRad(bLat)) * Math.sin(dLng / 2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(s));
  }

  function renderLocChip() {
    const chip = $("locChip");
    if (!chip) return;
    if (sachoPlace) {
      chip.classList.remove("is-empty");
      chip.title = sachoPlace.label ? "자리: " + sachoPlace.label : "좌표 기록됨";
    } else {
      chip.classList.add("is-empty");
      chip.title = "자리 고르기";
    }
  }

  function pickPlace(p) {
    // p: { lat, lng, label, place_id } — 없는 값은 null로 눕는다
    sachoPlace = {
      lat: (p.lat != null ? p.lat : null),
      lng: (p.lng != null ? p.lng : null),
      label: p.label || null,
      place_id: (p.place_id != null ? p.place_id : null),
      captured_at: new Date().toISOString()   // 자리를 지정한 시각
    };
    $("placeModal").classList.add("hidden");
    renderLocChip();
  }

  function placeRow(title, subtitle, onclick) {
    const b = document.createElement("button");
    b.className = "songrow";
    b.innerHTML = '<div class="meta"><b></b><span></span></div>';
    b.querySelector("b").textContent = title;
    b.querySelector("span").textContent = subtitle || "";
    b.onclick = onclick;
    return b;
  }

  async function renderPlaceResults(q) {
    const box = $("placeResults");
    box.innerHTML = "";
    $("placeMsg").textContent = "";

    // 1) 지금 여기 — 누를 때만 좌표를 잡는다 (자동 아님)
    box.appendChild(placeRow("지금 여기", "이 순간의 좌표를 잡는다", useCurrentLocation));

    // 2) 자리 떼기 — 이미 달려 있을 때만
    if (sachoPlace) {
      box.appendChild(placeRow("자리 떼기", "이 사초에서 위치를 지운다", () => {
        sachoPlace = null;
        $("placeModal").classList.add("hidden");
        renderLocChip();
      }));
    }

    // 3) 단골 자리 — places 표에서
    const haunts = q ? hauntList.filter((h) => (h.name || "").includes(q)) : hauntList;
    haunts.forEach((h) => box.appendChild(placeRow(h.name, "단골 자리", () =>
      pickPlace({ lat: h.lat, lng: h.lng, label: h.name, place_id: h.id }))));

    // 4) 지도에서 찾기 — 지오 중계소 경유
    if (q.length >= 2) {
      $("placeMsg").textContent = "지도를 뒤지는 중…";
      try {
        const r = await fetch(`/api/geo?q=${encodeURIComponent(q)}`);
        const d = await r.json();
        if ($("placeQuery").value.trim() !== q) return;   // 그새 질의가 바뀌었으면 버린다
        (d.results || []).forEach((p) => box.appendChild(placeRow(p.label, p.detail || "지도에서", () =>
          pickPlace({ lat: p.lat, lng: p.lng, label: p.label }))));
        $("placeMsg").textContent = "";
      } catch {
        $("placeMsg").textContent = "지도 창고에 닿지 않는다 — 이름만 적을 수도 있다.";
      }
      // 5) 그대로 적기 — 지도에 없는 자리(옛집, 마음속 장소)도 사초에는 눕는다
      box.appendChild(placeRow('"' + q + '" 그대로 적기', "좌표 없이 이름만 남긴다", () =>
        pickPlace({ label: q })));
    }
  }

  function useCurrentLocation() {
    $("placeMsg").textContent = "좌표를 잡는 중…";
    if (!("geolocation" in navigator)) {
      $("placeMsg").textContent = "이 기기에서는 위치를 잡을 수 없다."; return;
    }
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const lat = pos.coords.latitude, lng = pos.coords.longitude;
        // 단골 반경(300m) 안이면 그 이름과 place_id로
        const haunt = hauntList.find((h) =>
          h.lat != null && h.lng != null &&
          distanceMeters(lat, lng, h.lat, h.lng) <= 300);
        if (haunt) { pickPlace({ lat, lng, label: haunt.name, place_id: haunt.id }); return; }
        // 낯선 자리 — 지명을 부탁하되, 실패해도 좌표는 남긴다
        let label = null;
        try {
          const r = await fetch(`/api/geo?lat=${lat}&lng=${lng}`);
          const d = await r.json();
          label = d.label || null;
        } catch { /* 지명 없이 좌표만 */ }
        pickPlace({ lat, lng, label });
      },
      () => { $("placeMsg").textContent = "위치를 잡지 못했다 — 브라우저의 위치 허락을 확인."; },
      { enableHighAccuracy: false, timeout: 8000, maximumAge: 300000 }
    );
  }

  // 자리 찾기 창 여닫기와 검색
  $("locChip").addEventListener("click", () => {
    $("placeModal").classList.remove("hidden");
    $("placeQuery").value = "";
    renderPlaceResults("");
    $("placeQuery").focus();
  });
  $("placeClose").addEventListener("click", () => $("placeModal").classList.add("hidden"));

  let placeTimer = null;
  $("placeQuery").addEventListener("input", (e) => {
    clearTimeout(placeTimer);
    placeTimer = setTimeout(() => renderPlaceResults(e.target.value.trim()), 450);
  });

  // ── 사진 붙이기 ──
  $("photoInput").addEventListener("change", (e) => {
    for (const f of e.target.files) photos.push(f);
    e.target.value = "";
    renderAttached();
  });

  function renderAttached() {
    const box = $("attached");
    box.innerHTML = "";
    photos.forEach((f, i) => {
      const d = document.createElement("div");
      d.className = "thumb";
      const img = document.createElement("img");
      img.src = URL.createObjectURL(f);
      const x = document.createElement("button");
      x.className = "off"; x.textContent = "×"; x.setAttribute("aria-label","사진 떼기");
      x.onclick = () => { photos.splice(i,1); renderAttached(); };
      d.append(img, x);
      box.appendChild(d);
    });
    if (song) {
      const c = document.createElement("div");
      c.className = "songchip";
      c.innerHTML = (song.art ? `<img src="${song.art}" alt="">` : "&#9834;") +
                    `<span class="t">${song.title} — ${song.artist}</span>`;
      const x = document.createElement("button");
      x.className = "off"; x.textContent = "×"; x.setAttribute("aria-label","곡 떼기");
      x.onclick = () => { song = null; renderAttached(); };
      c.appendChild(x);
      box.appendChild(c);
    }
    if (movie) {
      const c = document.createElement("div");
      c.className = "songchip";
      c.innerHTML = (movie.poster ? `<img src="${movie.poster}" alt="">` : "&#9635;") +
                    `<span class="t">${movie.title}${movie.year ? " (" + movie.year + ")" : ""}${movie.director ? " — " + movie.director : ""}</span>`;
      const x = document.createElement("button");
      x.className = "off"; x.textContent = "×"; x.setAttribute("aria-label","영화 떼기");
      x.onclick = () => { movie = null; renderAttached(); };
      c.appendChild(x);
      box.appendChild(c);
    }
  }

  // ── 곡의 신원 찾기 (iTunes Search) ──
  $("songBtn").addEventListener("click", () => {
    $("songModal").classList.remove("hidden");
    $("songQuery").focus();
  });
  $("songClose").addEventListener("click", () => { pendingSongEntry = null; $("songModal").classList.add("hidden"); });

  let songTimer = null;
  $("songQuery").addEventListener("input", (e) => {
    clearTimeout(songTimer);
    const q = e.target.value.trim();
    if (!q) { $("songResults").innerHTML = ""; $("songMsg").textContent = ""; return; }
    songTimer = setTimeout(() => searchSong(q), 400);
  });

  async function searchSong(q) {
    $("songMsg").textContent = "찾는 중…";
    try {
      // 중계소 경유 — 폰의 공유 문패 문제를 피해, 우리 심부름꾼이 대신 다녀온다
      const r = await fetch(`/api/itunes?term=${encodeURIComponent(q)}`);
      const j = await r.json();
      $("songMsg").textContent = j.resultCount ? "" : "찾지 못했다 — 다른 이름으로.";
      $("songResults").innerHTML = "";
      j.results.forEach((t) => {
        const b = document.createElement("button");
        b.className = "songrow";
        b.innerHTML = `<img src="${t.artworkUrl60 || ""}" alt="">
          <div class="meta"><b>${t.trackName}</b><span>${t.artistName}</span></div>`;
        b.onclick = async () => {
          if (pendingSongEntry) {
            const eid = pendingSongEntry; pendingSongEntry = null;
            $("songModal").classList.add("hidden");
            $("songQuery").value = ""; $("songResults").innerHTML = "";
            const { error } = await sb.from("media").insert({
              entry_id: eid, kind: "song",
              song_title: t.trackName, song_artist: t.artistName, itunes_id: String(t.trackId)
            });
            showToast(error ? "곡을 얹지 못했다 — " + (error.message || error)
                            : "곡이 눕었다 — " + t.trackName);
            if (!error) openStrata($("tcQuery").value.trim());
            return;
          }
          song = { title: t.trackName, artist: t.artistName, itunes_id: String(t.trackId), art: t.artworkUrl60 || "" };
          $("songModal").classList.add("hidden");
          $("songQuery").value = ""; $("songResults").innerHTML = "";
          renderAttached();
        };
        $("songResults").appendChild(b);
      });
    } catch {
      $("songMsg").textContent = "지금은 곡 창고에 닿지 않는다 — 나중에 다시.";
    }
  }

  // ── 영화의 신원 찾기 (TMDB — 중계소 경유) ──
  $("movieBtn").addEventListener("click", () => {
    $("movieModal").classList.remove("hidden");
    $("movieQuery").focus();
  });
  $("movieClose").addEventListener("click", () => { pendingMovieEntry = null; $("movieModal").classList.add("hidden"); });

  let movieTimer = null;
  $("movieQuery").addEventListener("input", (e) => {
    clearTimeout(movieTimer);
    const q = e.target.value.trim();
    if (!q) { $("movieResults").innerHTML = ""; $("movieMsg").textContent = ""; return; }
    movieTimer = setTimeout(() => searchMovie(q), 400);
  });

  // ── 사진 인화: 원판을 긴 변 2000px의 JPEG로 압축해 곳간에 올린다 ──
  async function compressPhoto(file) {
    try {
      const bmp = await createImageBitmap(file);
      const MAX = 2000;
      const s = Math.min(1, MAX / Math.max(bmp.width, bmp.height));
      const w = Math.round(bmp.width * s), h = Math.round(bmp.height * s);
      const c = document.createElement("canvas");
      c.width = w; c.height = h;
      c.getContext("2d").drawImage(bmp, 0, 0, w, h);
      const blob = await new Promise((r) => c.toBlob(r, "image/jpeg", 0.82));
      if (!blob) return file;                       // 인화 실패 시 원본 그대로
      return new File([blob], "photo.jpg", { type: "image/jpeg" });
    } catch { return file; }                        // 읽지 못하는 형식이면 원본 그대로
  }

  async function fetchAll(t) {
    const STEP = 1000, all = [];
    for (let from = 0; ; from += STEP) {
      let q = sb.from(t).select("*").range(from, from + STEP - 1);
      let { data, error } = await q.order("id", { ascending: true });
      if (error) {
        // id 기둥이 없는 표는 정렬 없이 한 번에 (작은 표라 안전)
        ({ data, error } = await sb.from(t).select("*"));
        if (error) throw error;
        return data || [];
      }
      all.push(...(data || []));
      if (!data || data.length < STEP) return all;
    }
  }

  function toCSV(rows) {
    if (!rows || rows.length === 0) return "";
    // 모든 행의 열을 합집합으로 모은다 (표마다 열이 다를 수 있으니)
    const cols = [...new Set(rows.flatMap((r) => Object.keys(r)))];
    const esc = (v) => {
      if (v === null || v === undefined) return "";
      if (typeof v === "object") v = JSON.stringify(v);
      v = String(v);
      // 쉼표·따옴표·줄바꿈이 있으면 따옴표로 감싸고 내부 따옴표는 두 번
      return /[",\n\r]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
    };
    const head = cols.join(",");
    const body = rows.map((r) => cols.map((c) => esc(r[c])).join(",")).join("\r\n");
    return head + "\r\n" + body;
  }

  // ── 동그라미의 문법: 할 일은 ○로 적는다 ──
  //    "- " → "○ " 변환 · 줄바꿈 시 이어쓰기 · 빈 줄에서 탈출 · 번호 자동 증가
  //    ○로 적은 줄은 갈무리 때 할 일 서랍(todos)으로 함께 봉안된다
  const ta = $("body");

  ta.addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;
    const pos = ta.selectionStart;
    const before = ta.value.slice(0, pos);
    const lineStart = before.lastIndexOf("\n") + 1;
    const line = before.slice(lineStart);
    const m = line.match(/^(\s*)(?:([\u25CB\u2022\-])|(\d+)([.)]))\s(.*)$/);
    if (!m) return;
    e.preventDefault();
    if (m[5].trim() === "") {
      // 빈 불릿에서 줄바꿈 → 목록 탈출 (마커를 지운다)
      ta.setRangeText("", lineStart, pos, "start");
      return;
    }
    // 방금 마친 불릿 줄에 시분초 도장 (이미 찍혀 있으면 생략)
    let stamp = "";
    if (!/ · \d{2}:\d{2}:\d{2}$/.test(line)) {
      const n = new Date();
      stamp = " · " + [n.getHours(), n.getMinutes(), n.getSeconds()]
        .map((v) => String(v).padStart(2, "0")).join(":");
    }
    const marker = m[2] ? m[2] : (parseInt(m[3], 10) + 1) + m[4]; // 번호면 하나 올린다
    ta.setRangeText(stamp + "\n" + m[1] + marker + " ", pos, ta.selectionEnd, "end");
  });

    const line = before.slice(lineStart);

  const WEEK = ["일","월","화","수","목","금","토"];
  function dayLabel(iso) {
    const [y, mo, d] = iso.split("-").map(Number);
    return `${y}년 ${mo}월 ${d}일 (${WEEK[new Date(y, mo-1, d).getDay()]})`;

  function appendWithHits(el, text, q) {

    if (!q) { el.appendChild(document.createTextNode(text)); return; }
    const lower = text.toLowerCase(), ql = q.toLowerCase();
    let i = 0;
    for (;;) {
      const j = lower.indexOf(ql, i);
      if (j === -1) { el.appendChild(document.createTextNode(text.slice(i))); return; }
      if (j > i) el.appendChild(document.createTextNode(text.slice(i, j)));
      const mk = document.createElement("mark");
      mk.className = "hit";
      mk.textContent = text.slice(j, j + q.length);
      el.appendChild(mk);
      i = j + q.length;
    }
  }

  function renderSachoBody(el, body, doneSet, q) {
    // 원본 불변: body는 그대로 두고, 완료된 ○ 줄만 ✓로 갈아 끼워 "보여준다"
    el.textContent = "";
    const lines = (body || "").split("\n");
    lines.forEach((line, i) => {
      const m = line.match(/^(\s*)\u25CB\s+(.+?)(\s·\s\d{2}:\d{2}:\d{2})?\s*$/);
      if (m && doneSet && doneSet.has(m[2].trim())) {
        const sp = document.createElement("span");
        sp.className = "todo-done";
        appendWithHits(sp, m[1] + "\u2713 " + m[2] + (m[3] || ""), q);
        el.appendChild(sp);
      } else {
        appendWithHits(el, line, q);
      }
      if (i < lines.length - 1) el.appendChild(document.createTextNode("\n"));
    });
  }

  // ── time coring: 시간을 시추한다 — 검색 · 코어 지도 · 지층 읽기 ──
  $("strataBtn").addEventListener("click", () => openStrata($("tcQuery").value.trim()));
  $("strataClose").addEventListener("click", () => $("strata").classList.add("hidden"));

  let tcTimer = null;
  $("tcQuery").addEventListener("input", (e) => {
    clearTimeout(tcTimer);
    tcTimer = setTimeout(() => openStrata(e.target.value.trim()), 420);
  });

  let tcDayEls = [];   // 화면에 선 날짜 경계들 (렌즈·이동용)
  let tcWired = false;

  // 열람실 두레박질 — 서고는 한 번에 1000행까지만 주므로, 바닥이 드러날 때까지 반복해 긷는다
  async function drawAllEntries(shape) {
    const STEP = 1000, all = [];
    for (let from = 0; ; from += STEP) {
      let qy = sb.from("entries").select("*");
      if (shape) qy = shape(qy);
      const { data, error } = await qy
        .order("occurred_on", { ascending: false })
        .order("id", { ascending: false })
        .range(from, from + STEP - 1);
      if (error) throw error;
      all.push(...(data || []));
      if (!data || data.length < STEP) return all;
    }
  }

  // ── 세초(洗草): 카드를 왼쪽으로 밀면 단추가 드러나고, 탭해야 씻겨 나간다 ──
  function wireCull(wrap, card, cull, entryId) {
    let x0 = null, y0 = null, dx = 0, horiz = null;
    card.addEventListener("touchstart", (e) => {
      x0 = e.touches[0].clientX; y0 = e.touches[0].clientY; dx = 0; horiz = null;
      card.style.transition = "none";
    }, { passive: true });
    card.addEventListener("touchmove", (e) => {
      if (x0 === null) return;
      const mx = e.touches[0].clientX - x0, my = e.touches[0].clientY - y0;
      if (horiz === null && (Math.abs(mx) > 8 || Math.abs(my) > 8)) horiz = Math.abs(mx) > Math.abs(my);
      if (!horiz) return;
      dx = Math.min(0, Math.max(mx, -120));
      card.style.transform = "translateX(" + dx + "px)";
    }, { passive: true });
    card.addEventListener("touchend", () => {
      card.style.transition = "";
      const open = dx < -60;
      card.style.transform = open ? "translateX(-92px)" : "";
      x0 = null;
      if (!open) return;
      // 다른 데를 짚으면 도로 닫힌다
      const closeOnce = (ev) => {
        if (!wrap.contains(ev.target)) { card.style.transform = ""; document.removeEventListener("touchstart", closeOnce, true); }
      };
      document.addEventListener("touchstart", closeOnce, true);
    });
    cull.addEventListener("click", async () => {
      cull.disabled = true; cull.textContent = "…";
      try {
        for (const t of ["categories", "media", "todos", "annotations", "entry_tags", "entry_people"]) {
          try { await sb.from(t).delete().eq("entry_id", entryId); } catch { }
        }
        const { error } = await sb.from("entries").delete().eq("id", entryId);
        if (error) throw error;
        wrap.style.transition = "opacity .25s, max-height .3s .1s";
        wrap.style.opacity = "0"; wrap.style.maxHeight = wrap.offsetHeight + "px";
        requestAnimationFrame(() => { wrap.style.maxHeight = "0"; });
        setTimeout(() => wrap.remove(), 450);
        showToast("세초되었다 — 사초 제" + entryId + "호");
      } catch (e) {
        cull.disabled = false; cull.textContent = "세초";
        showToast("세초하지 못했다 — " + (e.message || e));
      }
    });
  }

  // ── 사진 돌리기: 곳간에서 원본을 내려받아 90도 돌려 같은 자리에 다시 눕힌다 ──
  //    (화면의 그림을 베끼지 않으므로 데스크탑·폰 어디서나 막히지 않는다)
  let turning = false;
  const freshBlobs = new Map();   // 방금 돌려 올린 그림 — 곳간의 옛 기억을 지나친다
  async function loadBitmap(blob) {
    if (window.createImageBitmap) { try { return await createImageBitmap(blob); } catch { } }
    const url = URL.createObjectURL(blob);
    try {
      const im = new Image(); im.src = url;
      await new Promise((res, rej) => { im.onload = res; im.onerror = () => rej(new Error("사진을 읽지 못함")); });
      return im;
    } finally { setTimeout(() => URL.revokeObjectURL(url), 5000); }
  }
  async function turnPhoto(img) {
    if (turning || !img.dataset.path) return;
    turning = true;
    const path = img.dataset.path;
    img.style.opacity = ".35";
    try {
      let file = freshBlobs.get(path);
      if (!file) {
        const { data: dl, error: dlErr } = await sb.storage.from("gotgan").download(path);
        if (dlErr) throw dlErr;
        file = dl;
      }
      const src = await loadBitmap(file);
      let w = src.width || src.naturalWidth, h = src.height || src.naturalHeight;
      const MAX = 2000, k = Math.max(w, h) > MAX ? MAX / Math.max(w, h) : 1;
      w = Math.round(w * k); h = Math.round(h * k);
      const c = document.createElement("canvas");
      c.width = h; c.height = w;
      const x = c.getContext("2d");
      x.translate(h, 0); x.rotate(Math.PI / 2);
      x.drawImage(src, 0, 0, w, h);
      const blob = await new Promise((r) => c.toBlob(r, "image/jpeg", 0.82));
      if (!blob) throw new Error("인화 실패");
      const { error } = await sb.storage.from("gotgan")
        .upload(path, blob, { upsert: true, contentType: "image/jpeg", cacheControl: "0" });
      if (error) throw error;
      freshBlobs.set(path, blob);
      // 작은 사본도 같은 각도로 다시 뜬다
      let thumbUrl = null;
      try {
        const M = 400, kk = Math.max(c.width, c.height) > M ? M / Math.max(c.width, c.height) : 1;
        const t = document.createElement("canvas");
        t.width = Math.round(c.width * kk); t.height = Math.round(c.height * kk);
        t.getContext("2d").drawImage(c, 0, 0, t.width, t.height);
        const tb = await new Promise((r) => t.toBlob(r, "image/jpeg", 0.72));
        if (tb) {
          await sb.storage.from("gotgan").upload("thumbs/" + path, tb, { upsert: true, contentType: "image/jpeg", cacheControl: "0" });
          const { data: tg } = await sb.storage.from("gotgan").createSignedUrl("thumbs/" + path, 3600);
          if (tg && tg.signedUrl) thumbUrl = tg.signedUrl;
        }
      } catch { }
      const { data: sg } = thumbUrl ? { data: null } : await sb.storage.from("gotgan").createSignedUrl(path, 3600);
      img.src = (thumbUrl || (sg && sg.signedUrl) || img.src.split("#")[0]) + "#r" + Date.now();
      showToast("돌려 눕혔다 — 책에서도 이 각도다");
    } catch (e) {
      showToast("돌리지 못했다 — " + (e.message || e));
    }
    img.style.opacity = "";
    turning = false;
  }

  const SHALLOW = 10;   // 얕은 시추 — 최근 10편을 먼저 보인다
  let tcRun = 0;        // 시추 회차 — 새 시추가 시작되면 옛 시추는 물러난다
  let lastDay = null;
  // ── 사초를 화면에 눕힌다 — 얕은 시추분을 먼저, 깊은 것은 뒤이어 이어 붙인다 ──
  async function renderRows(rows, list, append) {
      const ids = rows.map((r) => r.id);
      const { data: med } = await sb.from("media").select("*").in("entry_id", ids);
      const media = med || [];
      // 완료된 할 일 — 원본을 고치지 않고, 보여줄 때만 ✓ 층을 얹기 위한 대조표
      let doneMap = {};
      try {
        const { data: dts } = await sb.from("todos")
          .select("entry_id, text").eq("done", true).in("entry_id", ids);
        (dts || []).forEach((t) => { (doneMap[t.entry_id] = doneMap[t.entry_id] || new Set()).add(t.text); });
      } catch { doneMap = {}; }
      // 갈래 대조표 — 가장 최근 층이 이긴다 (행이 없으면 여백으로 읽는다)
      let catMap = {};
      try {
        const { data: cats } = await sb.from("categories")
          .select("entry_id, category, decided_at").in("entry_id", ids)
          .order("decided_at", { ascending: true });
        (cats || []).forEach((c) => { catMap[c.entry_id] = c.category; });
      } catch { catMap = {}; }
      // 사진의 임시 열람증(서명 URL) 발급 — 곳간은 비공개이므로
      const photoPaths = media.filter((m) => m.kind === "photo" && m.storage_path).map((m) => m.storage_path);
      const signedMap = {};
      if (photoPaths.length) {
        // 작은 사본을 먼저 청한다 — 오가는 무게를 여덟 자리 덜기 위해
        const { data: th } = await sb.storage.from("gotgan")
          .createSignedUrls(photoPaths.map((p) => "thumbs/" + p), 3600);
        (th || []).forEach((sg) => {
          if (sg.signedUrl && sg.path) signedMap[String(sg.path).replace(/^thumbs\//, "")] = sg.signedUrl;
        });
        // 사본이 아직 없는 것만 원본으로
        const rest = photoPaths.filter((p) => !signedMap[p]);
        if (rest.length) {
          const { data: signed } = await sb.storage.from("gotgan").createSignedUrls(rest, 3600);
          (signed || []).forEach((sg) => { if (sg.signedUrl) signedMap[sg.path] = sg.signedUrl; });
        }
      }

    if (!append) { list.innerHTML = ""; tcDayEls = []; lastDay = null; }
    let currentDay = lastDay;
    rows.forEach((r) => {
        if (r.occurred_on !== currentDay) {
          currentDay = r.occurred_on;
          const dl = document.createElement("div");
          dl.className = "day-line";
          dl.dataset.ymd = currentDay;
          dl.textContent = dayLabel(currentDay);
          list.appendChild(dl);
          tcDayEls.push(dl);
        }
        const wrap = document.createElement("div");
        wrap.className = "sacho-wrap";
        const cull = document.createElement("button");
        cull.className = "sacho-cull";
        cull.textContent = "세초";
        wrap.appendChild(cull);
        const card = document.createElement("div");
        card.className = "sacho-card";
        wrap.appendChild(card);
        wireCull(wrap, card, cull, r.id);
        const txt = document.createElement("div");
        txt.className = "txt";
        renderSachoBody(txt, r.body, doneMap[r.id], q);
        card.appendChild(txt);

        const mine = media.filter((m) => m.entry_id === r.id);
        const pics = mine.filter((m) => m.kind === "photo" && signedMap[m.storage_path]);
        mine.filter((m) => m.kind === "song").forEach((sg) => {
          const sl = document.createElement("div");
          sl.className = "songline";
          sl.textContent = "\u266A " + (sg.song_title || "") + " \u2014 " + (sg.song_artist || "");
          card.appendChild(sl);
        });
        mine.filter((m) => m.kind === "movie").forEach((mv) => {
          const ml = document.createElement("div");
          ml.className = "songline";
          ml.textContent = "\u25A3 " + (mv.movie_title || "") +
            (mv.movie_year ? " (" + mv.movie_year + ")" : "") +
            (mv.movie_director ? " \u2014 " + mv.movie_director : "");
          card.appendChild(ml);
        });

        // 사진은 카드의 왼쪽 아래에 — 탭하면 90도씩 돌아 곳간에 바로 눕는다
        if (pics.length) {
          const box = document.createElement("div");
          box.className = "pics";
          pics.forEach((p) => {
            const img = document.createElement("img");
            img.loading = "lazy";
            img.crossOrigin = "anonymous";
            img.dataset.path = p.storage_path;
            img.title = "탭하면 90도 돌아 눕는다";
            img.src = signedMap[p.storage_path];
            img.addEventListener("click", () => turnPhoto(img));
            box.appendChild(img);
          });
          card.appendChild(box);
        }

        const meta = document.createElement("div");
        meta.className = "meta";
        const w = new Date(r.written_at);
        const locTag = r.loc_label ? " \u00B7 " + r.loc_label : "";
        meta.innerHTML = `<span>사초 제${r.id}호${locTag}</span><span>적음 ${String(w.getHours()).padStart(2,"0")}:${String(w.getMinutes()).padStart(2,"0")}</span>`;
        card.appendChild(meta);

        // 갈래 단추 — 지난 사초에도 갈래를 층으로 얹는다
        const g = document.createElement("div");
        g.className = "galae card-galae";
        const gi = document.createElement("span");
        gi.className = "g-ink";
        g.appendChild(gi);
        ["업무","가족","책","영화","여백"].forEach((name) => {
          const gb = document.createElement("button");
          gb.className = "gbtn" + ((catMap[r.id] || "여백") === name ? " is-on" : "");
          gb.textContent = name;
          gb.onclick = async () => {
            const { error } = await sb.from("categories")
              .insert({ entry_id: r.id, category: name });
            if (error) { showToast("갈래를 얹지 못했다 — " + (error.message || error)); return; }
            catMap[r.id] = name;
            [...g.querySelectorAll(".gbtn")].forEach((x) => x.classList.toggle("is-on", x.textContent === name));
            positionInk(g);
          };
          g.appendChild(gb);
        });
        const fb = document.createElement("button");
        fb.className = "gbtn tc-film";
        fb.textContent = "\u266A";
        fb.title = "곡 달기 — 이 사초에 그날의 곡을 얹는다";
        fb.onclick = () => {
          pendingSongEntry = r.id;
          $("songModal").classList.remove("hidden");
          $("songQuery").focus();
        };
        g.appendChild(fb);
        card.appendChild(g);
        requestAnimationFrame(() => positionInk(g));
        list.appendChild(wrap);
      });

    lastDay = currentDay;
  }

  async function openStrata(q) {
    q = (q || "").trim();
    $("strata").classList.remove("hidden");
    const list = $("strataList");
    list.innerHTML = '<div class="strata-msg">시추 중…</div>';
    try {
      let rows = [];
      if (q) {
        const safe = q.replace(/[,()%]/g, " ").trim();
        // 본문과 자리 이름에서 찾는다
        rows = await drawAllEntries((qy) =>
          qy.or(`body.ilike.%${safe}%,loc_label.ilike.%${safe}%`));
        // 곡의 제목과 아티스트에서도 찾는다
        const { data: sm } = await sb.from("media").select("entry_id")
          .or(`song_title.ilike.%${safe}%,song_artist.ilike.%${safe}%`);
        const have = new Set(rows.map((r) => r.id));
        const extra = [...new Set((sm || []).map((m) => m.entry_id))].filter((id) => id != null && !have.has(id));
        if (extra.length) {
          const { data: r2 } = await sb.from("entries").select("*").in("id", extra);
          rows = rows.concat(r2 || []);
        }
        rows.sort((a, b) => String(b.occurred_on).localeCompare(String(a.occurred_on)) || b.id - a.id);
      } else {
        // 얕은 시추 — 최근 층부터 먼저 올린다
        const { data: top, error: e0 } = await sb.from("entries").select("*")
          .order("occurred_on", { ascending: false })
          .order("id", { ascending: false })
          .range(0, SHALLOW - 1);
        if (e0) throw e0;
        rows = top || [];
      }

      drawCore(rows);

      if (!rows.length) {
        list.innerHTML = '<div class="strata-msg">' +
          (q ? '\u300C' + q + '\u300D \u2014 이 낱말의 지층은 아직 없다.'
             : '아직 지층이 없다 \u2014 첫 사초가 첫 층이 된다.') + '</div>';
        return;
      }

      await renderRows(rows, list, false);

      // 깊은 시추 — 나머지 층은 등 뒤에서 계속 올라온다
      if (!q && rows.length === SHALLOW) {
        const mine = ++tcRun;
        const deeper = document.createElement("div");
        deeper.className = "strata-msg";
        deeper.textContent = "더 깊이 시추하는 중\u2026";
        list.appendChild(deeper);
        (async () => {
          await new Promise((r) => setTimeout(r, 250));   // 첫 그림이 앉은 뒤에 출발
          const STEP = 60;
          let all = rows.slice();
          for (let from = SHALLOW; ; from += STEP) {
            if (mine !== tcRun) return;                 // 새 시추가 시작되면 조용히 물러난다
            const { data, error } = await sb.from("entries").select("*")
              .order("occurred_on", { ascending: false })
              .order("id", { ascending: false })
              .range(from, from + STEP - 1);
            if (error || !data || !data.length) break;
            if (mine !== tcRun) return;
            deeper.remove();
            await renderRows(data, list, true);
            list.appendChild(deeper);
            all = all.concat(data);
            drawCore(all);
            if (data.length < STEP) break;
            await new Promise((r) => setTimeout(r, 40));   // 화면에 숨을 돌려준다
          }
          if (mine === tcRun) { deeper.remove(); requestAnimationFrame(paintLens); }
        })();
      }

      if (!tcWired) {
        tcWired = true;
        list.addEventListener("scroll", paintLens, { passive: true });
        $("tcRail").addEventListener("click", railJump);
        $("tcRail").addEventListener("mousemove", railScrub);
        $("tcRail").addEventListener("touchstart", railScrub, { passive: false });
        $("tcRail").addEventListener("touchmove", railScrub, { passive: false });
      }
      requestAnimationFrame(paintLens);
    } catch (err) {
      list.innerHTML = '<div class="strata-msg">지층에 닿지 못했다 — ' + (err.message || err) + '</div>';
    }
  }

  // ── 코어 지도: 화면의 지층 전체를 왼쪽 기둥 하나에 압축한다 ──
  //    검색 중이면 그 낱말이 흐른 시절의 분포가 그대로 지도가 된다.
  let tcSpan = null; // { max, days }
  function ymdToDate(t) { const [y, m, d] = String(t).split("-").map(Number); return new Date(y, m - 1, d); }

  function drawCore(rows) {
    const rail = $("tcRail");
    [...rail.querySelectorAll(".tc-band")].forEach((b) => b.remove());
    if (!rows.length) { tcSpan = null; $("tcLens").style.height = "0"; return; }
    const dates = rows.map((r) => r.occurred_on).sort();
    const min = ymdToDate(dates[0]), max = ymdToDate(dates[dates.length - 1]);
    const days = Math.max(Math.round((max - min) / 86400000) + 1, 1);
    tcSpan = { max, days };
    const perDay = {};
    rows.forEach((r) => { perDay[r.occurred_on] = (perDay[r.occurred_on] || 0) + 1; });
    Object.entries(perDay).forEach(([ymd, n]) => {
      const i = Math.round((max - ymdToDate(ymd)) / 86400000); // 위가 최근
      const b = document.createElement("div");
      b.className = "tc-band";
      b.style.top = (i / days * 100) + "%";
      b.style.height = Math.max(100 / days, 0.35) + "%";
      b.style.background = "rgba(194,94,63," + Math.min(0.25 + n * 0.18, 0.95) + ")";
      rail.appendChild(b);
    });
  }

  function paintLens() {
    if (!tcSpan || !tcDayEls.length) return;
    const list = $("strataList");
    const top = list.getBoundingClientRect().top;
    let first = null, last = null;
    tcDayEls.forEach((el) => {
      const t = el.getBoundingClientRect().top - top;
      if (t < list.clientHeight && t > -320) { if (!first) first = el; last = el; }
    });
    if (!first) return;
    const i1 = Math.round((tcSpan.max - ymdToDate(first.dataset.ymd)) / 86400000);
    const i2 = Math.round((tcSpan.max - ymdToDate(last.dataset.ymd)) / 86400000);
    const lens = $("tcLens");
    lens.style.top = (i1 / tcSpan.days * 100) + "%";
    lens.style.height = Math.max((i2 - i1 + 1) / tcSpan.days * 100, 2) + "%";
    const rr = $("tcRail").getBoundingClientRect();
    const d1 = ymdToDate(first.dataset.ymd);
    showFloat(rr.top + (i1 / tcSpan.days) * rr.height,
              d1.getFullYear() + ". " + (d1.getMonth() + 1) + "\uC6D4");
  }

  // 떠다니는 연월 — 레일 곁에서 그 깊이의 시절을 말해준다
  let floatHide = null;
  function showFloat(clientY, label) {
    const f = $("tcFloat"), r = $("tcRail").getBoundingClientRect();
    f.textContent = label;
    f.style.top = Math.min(Math.max(clientY - r.top, 0), r.height) + "px";
    f.classList.add("show");
    clearTimeout(floatHide);
    floatHide = setTimeout(() => f.classList.remove("show"), 1100);
  }
  function railLabelAt(clientY) {
    const r = $("tcRail").getBoundingClientRect();
    const ratio = Math.min(Math.max((clientY - r.top) / r.height, 0), 1);
    const d = new Date(tcSpan.max.getTime() - ratio * tcSpan.days * 86400000);
    return d.getFullYear() + ". " + (d.getMonth() + 1) + "\uC6D4";
  }
  // 문지르면(hover·drag) 연월이 떠오르고, 글이 그 시절로 따라 내려간다
  let scrubY = null, scrubRaf = null;
  function railScrub(e) {
    if (!tcSpan || !tcDayEls.length) return;
    scrubY = e.touches ? e.touches[0].clientY : e.clientY;
    showFloat(scrubY, railLabelAt(scrubY));
    if (e.touches && e.cancelable) e.preventDefault();
    if (scrubRaf) return;
    scrubRaf = requestAnimationFrame(() => {
      scrubRaf = null;
      railSeek(scrubY, false);
    });
  }
  function railJump(e) {
    // 기둥을 짚으면 그 깊이의 시절로 내려간다
    if (!tcSpan) return;
    showFloat(e.clientY, railLabelAt(e.clientY));
    railSeek(e.clientY, true);
  }
  function railSeek(clientY, smooth) {
    if (!tcSpan || !tcDayEls.length) return;
    const r = $("tcRail").getBoundingClientRect();
    const ratio = Math.min(Math.max((clientY - r.top) / r.height, 0), 1);
    const targetIdx = ratio * tcSpan.days;
    let best = tcDayEls[tcDayEls.length - 1];
    for (const el of tcDayEls) {
      const i = Math.round((tcSpan.max - ymdToDate(el.dataset.ymd)) / 86400000);
      if (i >= targetIdx) { best = el; break; }
    }
    const list = $("strataList");
    const delta = best.getBoundingClientRect().top - list.getBoundingClientRect().top;
    list.scrollTo({ top: list.scrollTop + delta - 10, behavior: smooth ? "smooth" : "auto" });
  }

  // ── PWA 등록 ──
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");

  checkDoor();
</script>
