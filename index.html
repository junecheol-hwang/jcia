<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1A1815">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="談藏齋">
<title>談藏齋 — 초당</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1A1815;        /* 먹빛 — 서고의 밤 */
    --ink-soft: #242019;   /* 서가의 그늘 */
    --clay: #C25E3F;       /* 주황 — 등불 */
    --paper: #F5F2EC;      /* 종이 */
    --paper-line: #E7E2D6; /* 종이 위 괘선 */
    --mist: #8a877f;       /* 흐린 글씨 */
    --paper-ink: #2A2721;  /* 종이 위의 먹 글씨 */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'Noto Sans KR', sans-serif;
    display: flex;
    flex-direction: column;
    overscroll-behavior: none;
  }

  /* ── 공통 ── */
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  .hidden { display: none !important; }

  /* ── 문(로그인) — 문 전체가 한 장의 탁본 ── */
  #gate {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 32px;
    background: var(--ink) url("takbon-bg.jpg") center / cover no-repeat;
  }
  #gate .hyeonpan {
    max-height: 42vh;
    max-width: 62vw;
    width: auto;
    filter: drop-shadow(0 2px 18px rgba(0,0,0,0.35));
  }
  #gate form {
    display: flex; flex-direction: column; gap: 12px;
    width: 100%; max-width: 320px;
    background: rgba(26, 24, 21, 0.45);
    border-radius: 16px;
    padding: 18px;
    backdrop-filter: blur(2px);
  }
  #gate input {
    background: rgba(36, 32, 25, 0.92);
    border: 1px solid #3a3630;
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--paper);
    font-size: 16px;
    font-family: inherit;
  }
  #gate input:focus { outline: 2px solid var(--clay); outline-offset: 1px; border-color: transparent; }
  #gate input:-webkit-autofill,
  #gate input:-webkit-autofill:hover,
  #gate input:-webkit-autofill:focus {
    -webkit-box-shadow: 0 0 0 1000px #24201A inset;
    -webkit-text-fill-color: var(--paper);
    caret-color: var(--paper);
  }
  #gate .enter {
    background: var(--clay);
    color: var(--ink);
    font-weight: 500;
    border-radius: 10px;
    padding: 14px;
    font-size: 16px;
    margin-top: 6px;
  }
  #gate .gate-msg { color: var(--mist); font-size: 13px; min-height: 20px; text-align: center; }

  /* ── 초당 본채 ── */
  #hall { flex: 1; display: flex; flex-direction: column; min-height: 0; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: calc(env(safe-area-inset-top) + 14px) 20px 14px;
  }
  header .brand { display: flex; align-items: center; gap: 10px; }
  header .brand svg { width: 30px; height: 30px; }
  header .brand span {
    font-family: 'Noto Serif KR', serif;
    font-weight: 600;
    font-size: 17px;
    letter-spacing: 3px;
    color: var(--clay);
  }
  header .leave { color: var(--mist); font-size: 13px; padding: 6px; }

  /* 날짜 — 일어난 날 */
  .when {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 22px 12px;
    color: var(--mist);
    font-size: 14px;
  }
  .when input[type="date"] {
    background: none;
    border: none;
    color: var(--paper);
    font-family: inherit;
    font-size: 14px;
    padding: 4px 2px;
  }
  .when input[type="date"]:focus { outline: 1px solid var(--clay); border-radius: 6px; }

  /* 흰 종이 한 장 — 서고의 등불이자 이 집의 서명 */
  .paper {
    flex: 1;
    min-height: 0;
    margin: 0 14px;
    /* 한지의 결: 바탕에 스민 얼룩 몇 점 (닥나무가 만드는 은은한 반점) */
    background-color: var(--paper);
    background-image:
      radial-gradient(circle at 18% 22%, rgba(198,180,150,0.12) 0%, transparent 42%),
      radial-gradient(circle at 82% 30%, rgba(180,158,128,0.09) 0%, transparent 40%),
      radial-gradient(circle at 55% 78%, rgba(200,184,152,0.10) 0%, transparent 45%),
      radial-gradient(circle at 33% 88%, rgba(172,150,120,0.07) 0%, transparent 38%);
    border-radius: 16px 16px 0 0;
    box-shadow: 0 0 60px rgba(194, 94, 63, 0.07);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .paper textarea {
    flex: 1;
    width: 100%;
    border: none;
    resize: none;
    /* 괘선 위에 한지의 결을 겹친다:
       ① 가로 괘선(글 줄)  ② 닥섬유 세로결(아주 옅게)  ③ 발(簾)의 미세한 가로 발자국 */
    background:
      repeating-linear-gradient(var(--paper-ink-line, transparent) 0 35px, var(--paper-line) 35px 36px),
      repeating-linear-gradient(90deg, transparent 0 2px, rgba(150,130,100,0.025) 2px 3px),
      repeating-linear-gradient(0deg, transparent 0 4px, rgba(160,140,110,0.02) 4px 5px);
    background-color: transparent;
    background-attachment: local, local, local;
    padding: 22px 22px 12px;
    font-family: 'Noto Serif KR', serif;
    font-size: 17px;
    line-height: 36px;
    color: var(--paper-ink);
  }
  .paper textarea:focus { outline: none; }
  .paper textarea::placeholder { color: #b9b3a5; }

  /* 종이에 붙은 것들 (사진·곡 미리보기) */
  .attached { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 18px; }
  .attached:empty { display: none; }
  .thumb { position: relative; width: 56px; height: 56px; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
  .thumb .off, .songchip .off {
    position: absolute; top: -6px; right: -6px;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--ink); color: var(--paper);
    font-size: 12px; line-height: 20px; text-align: center;
  }
  .songchip {
    position: relative;
    display: flex; align-items: center; gap: 8px;
    background: #EDE8DC; border-radius: 999px;
    padding: 6px 14px 6px 8px;
    font-size: 13px; color: var(--paper-ink);
    max-width: 100%;
  }
  .songchip img { width: 32px; height: 32px; border-radius: 50%; }
  .songchip .t { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* 문방구 — 하단 도구줄 */
  .desk {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px calc(env(safe-area-inset-bottom) + 12px);
    background: var(--ink);
  }
  .tool {
    display: flex; align-items: center; justify-content: center;
    width: 46px; height: 46px;
    border-radius: 12px;
    background: var(--ink-soft);
    color: var(--clay);
    font-size: 20px;
  }
  .keep {
    flex: 1;
    background: var(--clay);
    color: var(--ink);
    font-weight: 500;
    font-size: 16px;
    border-radius: 12px;
    height: 46px;
  }
  .keep:disabled { opacity: 0.45; }

  /* 위치 표찰 — 갈무리 곁에서 '적은 곳'을 조용히 증언한다 */
  .loc-chip {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 4px;
    height: 46px;
    max-width: 104px;
    padding: 0 12px;
    border-radius: 12px;
    background: var(--ink-soft);
    color: var(--clay);
    font-size: 12px;
    transition: opacity .2s;
  }
  .loc-chip::before { content: '\25E6'; flex-shrink: 0; }
  .loc-chip span {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .loc-chip.is-empty { opacity: .45; }

  /* 갈무리 확인 */
  #toast {
    position: fixed;
    left: 50%; bottom: calc(env(safe-area-inset-bottom) + 84px);
    transform: translateX(-50%) translateY(8px);
    background: var(--paper); color: var(--ink);
    font-size: 14px;
    padding: 10px 20px;
    border-radius: 999px;
    opacity: 0;
    transition: opacity .25s, transform .25s;
    pointer-events: none;
    display: flex; align-items: center; gap: 8px;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast svg { width: 18px; height: 18px; }

  /* 열람실 — 먹 속의 종이 카드들 */
  #strata {
    position: fixed; inset: 0;
    background: var(--ink) url("takbon-bg.jpg") center / cover no-repeat;
    display: flex; flex-direction: column;
    z-index: 9;
  }
  .strata-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: calc(env(safe-area-inset-top) + 14px) 20px 12px;
    color: var(--clay);
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
  }
  .strata-bar .close { color: var(--mist); font-size: 14px; }
  #strataList {
    flex: 1; overflow-y: auto;
    padding: 4px 16px calc(env(safe-area-inset-bottom) + 24px);
    -webkit-overflow-scrolling: touch;
  }
  .day-line {
    display: flex; align-items: center; gap: 10px;
    color: var(--mist); font-size: 13px;
    margin: 22px 2px 10px;
  }
  .day-line::after { content: ""; flex: 1; height: 1px; background: #3a3630; }
  .sacho-card {
    background: var(--paper);
    color: var(--paper-ink);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .sacho-card .txt {
    font-family: 'Noto Serif KR', serif;
    font-size: 15.5px;
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .sacho-card .meta {
    margin-top: 10px;
    font-size: 12px;
    color: #9a948a;
    display: flex; justify-content: space-between; gap: 8px;
  }
  .sacho-card .pics { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .sacho-card .pics img { width: 84px; height: 84px; object-fit: cover; border-radius: 8px; }
  .sacho-card .songline {
    margin-top: 10px; font-size: 13px; color: var(--clay);
  }
  .strata-msg { text-align: center; color: var(--mist); font-size: 14px; padding: 48px 20px; }

  /* 곡 찾기 · 자리 찾기 */
  #songModal, #placeModal {
    position: fixed; inset: 0;
    background: rgba(26, 24, 21, 0.92);
    display: flex; flex-direction: column;
    padding: calc(env(safe-area-inset-top) + 20px) 18px calc(env(safe-area-inset-bottom) + 18px);
    gap: 14px;
    z-index: 10;
  }
  #songModal .bar, #placeModal .bar { display: flex; gap: 10px; }
  #songModal input, #placeModal input {
    flex: 1;
    background: var(--ink-soft);
    border: 1px solid #3a3630;
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--paper);
    font-size: 16px;
    font-family: inherit;
  }
  #songModal input:focus, #placeModal input:focus { outline: 2px solid var(--clay); border-color: transparent; }
  #songModal .close, #placeModal .close { color: var(--mist); font-size: 14px; padding: 0 6px; }
  #songResults, #placeResults { overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .songrow {
    display: flex; align-items: center; gap: 12px;
    padding: 10px; border-radius: 12px;
    background: var(--ink-soft);
    text-align: left; width: 100%;
  }
  .songrow img { width: 44px; height: 44px; border-radius: 8px; }
  .songrow .meta { min-width: 0; }
  .songrow .meta b { display: block; font-weight: 500; font-size: 14.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .songrow .meta span { font-size: 12.5px; color: var(--mist); }
  #songMsg, #placeMsg { color: var(--mist); font-size: 13px; text-align: center; padding: 8px; }
</style>
</head>
<body>

<!-- ════════════════════════════════════════════
     서고 연결 — 값이 이미 박혀 있다. 채울 칸 없음.
     ════════════════════════════════════════════ -->
<script>
  window.addEventListener("error", function (e) {
    var d = document.createElement("div");
    d.style.cssText = "position:fixed;top:0;left:0;right:0;background:#8c2f1b;color:#fff;font-size:12px;padding:8px 12px;z-index:99;font-family:monospace;";
    d.textContent = "스크립트 오류: " + e.message;
    document.body.appendChild(d);
  });
</script>

<!-- ── 문 — 서고에 드는 자를 묻는다 ── -->
<div id="gate">
  <img class="hyeonpan" src="hyeonpan-paper.png" alt="談藏齋 — 준철의 육필 현판">
  <form id="gateForm">
    <input type="email" id="email" placeholder="이메일" autocomplete="username" required>
    <input type="password" id="password" placeholder="비밀번호" autocomplete="current-password" required>
    <button class="enter" type="submit">서고에 들다</button>
    <div class="gate-msg" id="gateMsg"></div>
  </form>
</div>

<!-- ── 초당 본채 ── -->
<div id="hall" class="hidden">
  <header>
    <div class="brand">
      <svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect width="150" height="150" rx="34" fill="#1A1815"/>
        <circle cx="75" cy="75" r="50" fill="none" stroke="#C25E3F" stroke-width="5"/>
        <circle cx="39.6" cy="39.6" r="14" fill="#C25E3F"/>
        <circle cx="110.4" cy="110.4" r="14" fill="#C25E3F"/>
        <circle cx="75" cy="75" r="20" fill="#C25E3F"/>
        <circle cx="75" cy="75" r="8.5" fill="#1A1815"/>
      </svg>
      <span>초당</span>
    </div>
    <div style="display:flex; gap:4px; align-items:center;">
      <button class="leave" id="strataBtn" style="color:var(--clay);">열람</button>
      <button class="leave" id="leaveBtn">나가기</button>
    </div>
  </header>

  <div class="when">
    <span>일어난 날</span>
    <input type="date" id="occurredOn">
  </div>

  <div class="paper">
    <div class="attached" id="attached"></div>
    <textarea id="body" placeholder="오늘의 한 장을 던져 넣는다. 분류는 나중 일이다." autocomplete="off"></textarea>
  </div>

  <div class="desk">
    <button class="tool" id="bulletBtn" title="불릿 목록" aria-label="불릿 목록">&#8226;</button>
    <label class="tool" title="사진 붙이기" aria-label="사진 붙이기">
      &#128247;
      <input type="file" id="photoInput" accept="image/*" multiple class="hidden">
    </label>
    <button class="tool" id="songBtn" title="곡 달기" aria-label="곡 달기">&#9834;</button>
    <button type="button" class="loc-chip is-empty" id="locChip" title="자리 고르기" aria-label="자리 고르기">
      <span id="locChipText">위치</span>
    </button>
    <button class="tool" id="exportBtn" title="포쇄 — 담장재를 통째로 내보내 봉안한다" aria-label="포쇄">&#9788;</button>
    <button class="keep" id="keepBtn">갈무리</button>
  </div>
</div>

<!-- 갈무리 확인 -->
<div id="toast">
  <svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <rect x="5" y="5" width="140" height="140" rx="14" fill="none" stroke="#C25E3F" stroke-width="10"/>
    <circle cx="75" cy="75" r="32" fill="#C25E3F"/>
    <circle cx="75" cy="75" r="14" fill="#F5F2EC"/>
  </svg>
  <span id="toastText"></span>
</div>

<!-- 열람실 — 읽기 전용 지층 -->
<div id="strata" class="hidden">
  <div class="strata-bar">
    <span>열람 — 쌓인 지층</span>
    <button class="close" id="strataClose">닫기</button>
  </div>
  <div id="strataList"></div>
</div>

<!-- 곡 찾기 -->
<div id="songModal" class="hidden">
  <div class="bar">
    <input type="search" id="songQuery" placeholder="곡이나 아티스트 이름" autocomplete="off">
    <button class="close" id="songClose">닫기</button>
  </div>
  <div id="songMsg"></div>
  <div id="songResults"></div>
</div>

<!-- 자리 찾기 -->
<div id="placeModal" class="hidden">
  <div class="bar">
    <input type="search" id="placeQuery" placeholder="자리 이름 (예: 집, 회사, 카페 이름)" autocomplete="off">
    <button class="close" id="placeClose">닫기</button>
  </div>
  <div id="placeMsg"></div>
  <div id="placeResults"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
  // ── 서고 연결: 값 직접 기입, 라이브러리 로드 검문 포함 ──
  if (typeof supabase === "undefined") {
    document.body.insertAdjacentHTML("afterbegin",
      '<div style="position:fixed;top:0;left:0;right:0;background:#8c2f1b;color:#fff;font-size:12px;padding:8px 12px;z-index:99;">연결 도구(supabase-js)를 불러오지 못했다 — 네트워크나 콘텐츠 차단기를 확인.</div>');
    throw new Error("supabase-js not loaded");
  }
  const sb = supabase.createClient(
    "https://plwljyoouxyzsnyszcxw.supabase.co",
    "sb_publishable_m5k-ycq86oX7MEtUq_fFHA_03lEbuSa"
  );

  const $ = (id) => document.getElementById(id);
  const gate = $("gate"), hall = $("hall");
  let photos = [];   // 붙인 사진 File 목록
  let song = null;   // 고른 곡의 신원
  let sachoPlace = null; // 적은 곳 — { lat, lng, label, place_id, captured_at } 또는 null
  let hauntList = [];    // places 표에서 읽어온 단골 자리들

  // ── 문지기: 세션이 살아 있으면 바로 본채로 ──
  async function checkDoor() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) { openHall(); } else { gate.classList.remove("hidden"); hall.classList.add("hidden"); }
  }

  function openHall() {
    gate.classList.add("hidden");
    hall.classList.remove("hidden");
    $("occurredOn").value = todayStr();
    $("body").focus();
    loadHaunts();      // 단골 자리만 미리 읽어둔다 — 위치는 자동으로 잡지 않는다
    renderLocChip();
  }

  function todayStr() {
    const d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  }

  $("gateForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    $("gateMsg").textContent = "문을 여는 중…";
    const { error } = await sb.auth.signInWithPassword({
      email: $("email").value.trim(),
      password: $("password").value
    });
    if (error) { $("gateMsg").textContent = "문이 열리지 않는다 — " + (error.message || "이메일과 비밀번호를 확인."); return; }
    $("gateMsg").textContent = "";
    openHall();
  });

  $("leaveBtn").addEventListener("click", async () => {
    await sb.auth.signOut();
    location.reload();
  });

  // ── 위치 기둥: 자리는 준철씨가 지정한다 — 자동으로 잡지 않는다 ──
  //    표찰을 누르면 자리 찾기 창이 열린다. 단골 자리(places)면 place_id를 실로 걸고,
  //    지도 검색·지금 여기·이름만 적기 중에서 고른다. 좌표가 원본, 지명은 덧댄 층.

  async function loadHaunts() {
    try {
      const { data } = await sb.from("places").select("id, name, lat, lng");
      hauntList = data || [];
    } catch { hauntList = []; }
  }

  function distanceMeters(aLat, aLng, bLat, bLng) {
    // 하버사인 — 두 좌표 사이의 거리(미터)
    const R = 6371000, toRad = (d) => d * Math.PI / 180;
    const dLat = toRad(bLat - aLat), dLng = toRad(bLng - aLng);
    const s = Math.sin(dLat / 2) ** 2 +
              Math.cos(toRad(aLat)) * Math.cos(toRad(bLat)) * Math.sin(dLng / 2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(s));
  }

        // 단골 반경(300m) 안이면 그 이름과 place_id로
        const haunt = hauntList.find((h) =>
          h.lat != null && h.lng != null &&

        // 낯선 자리 — 지명을 부탁하되, 실패해도 좌표는 남긴다
        let label = null;
        try {

  // ── 사진 인화: 원판을 긴 변 2000px의 JPEG로 압축해 곳간에 올린다 ──
  async function compressPhoto(file) {
    try {
      const bmp = await createImageBitmap(file);
      const MAX = 2000;
      const s = Math.min(1, MAX / Math.max(bmp.width, bmp.height));
      const w = Math.round(bmp.width * s), h = Math.round(bmp.height * s);
      const c = document.createElement("canvas");
      c.width = w; c.height = h;
      c.getContext("2d").drawImage(bmp, 0, 0, w, h);
      const blob = await new Promise((r) => c.toBlob(r, "image/jpeg", 0.82));
      if (!blob) return file;                       // 인화 실패 시 원본 그대로
      return new File([blob], "photo.jpg", { type: "image/jpeg" });
    } catch { return file; }                        // 읽지 못하는 형식이면 원본 그대로
  }

  // ── 포쇄(曝曬): 담장재를 통째로 꺼내 볕에 말려 한 궤짝으로 봉안한다 ──
  //    모든 표를 CSV로, 곳간(gotgan)의 사진을 원본으로, 복구 안내문과 함께
  //    날짜가 찍힌 zip 한 덩이로 내려받는다. 이 덩이를 춘추관·정족산·태백산에 나눠 봉안.

  const EXPORT_TABLES = ["entries", "media", "people", "entry_people",
                         "tags", "entry_tags", "places", "annotations", "secho_log"];

  function toCSV(rows) {
    if (!rows || rows.length === 0) return "";
    // 모든 행의 열을 합집합으로 모은다 (표마다 열이 다를 수 있으니)
    const cols = [...new Set(rows.flatMap((r) => Object.keys(r)))];
    const esc = (v) => {
      if (v === null || v === undefined) return "";
      if (typeof v === "object") v = JSON.stringify(v);
      v = String(v);
      // 쉼표·따옴표·줄바꿈이 있으면 따옴표로 감싸고 내부 따옴표는 두 번
      return /[",\n\r]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
    };
    const head = cols.join(",");
    const body = rows.map((r) => cols.map((c) => esc(r[c])).join(",")).join("\r\n");
    return head + "\r\n" + body;
  }

  function stampStr() {
    const n = new Date(), p = (v) => String(v).padStart(2, "0");
    return `${n.getFullYear()}${p(n.getMonth() + 1)}${p(n.getDate())}_${p(n.getHours())}${p(n.getMinutes())}`;
  }

  // ── 불릿의 문법: 애플 메모장의 손맛 ──
  //    "- " → "• " 변환 · 줄바꿈 시 불릿 이어쓰기 · 빈 불릿에서 탈출 · 번호 자동 증가
  const ta = $("body");

  ta.addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;
    const pos = ta.selectionStart;
    const before = ta.value.slice(0, pos);
    const lineStart = before.lastIndexOf("\n") + 1;
    const line = before.slice(lineStart);
    const m = line.match(/^(\s*)(?:([•\-])|(\d+)([.)]))\s(.*)$/);
    if (!m) return;
    e.preventDefault();
    if (m[5].trim() === "") {
      // 빈 불릿에서 줄바꿈 → 목록 탈출 (마커를 지운다)
      ta.setRangeText("", lineStart, pos, "start");
      return;
    }
    // 방금 마친 불릿 줄에 시분초 도장 (이미 찍혀 있으면 생략)
    let stamp = "";
    if (!/ · \d{2}:\d{2}:\d{2}$/.test(line)) {
      const n = new Date();
      stamp = " · " + [n.getHours(), n.getMinutes(), n.getSeconds()]
        .map((v) => String(v).padStart(2, "0")).join(":");
    }
    const marker = m[2] ? m[2] : (parseInt(m[3], 10) + 1) + m[4]; // 번호면 하나 올린다
    ta.setRangeText(stamp + "\n" + m[1] + marker + " ", pos, ta.selectionEnd, "end");
  });

  ta.addEventListener("input", () => {
    // 줄 첫머리의 "- " 또는 "* " 를 "• " 로
    const pos = ta.selectionStart;
    const before = ta.value.slice(0, pos);
    const lineStart = before.lastIndexOf("\n") + 1;
    const line = before.slice(lineStart);
    const m = line.match(/^(\s*)[\-\*] $/);
    if (m) ta.setRangeText(m[1] + "\u2022 ", lineStart, pos, "end");
  });

  $("bulletBtn").addEventListener("click", () => {
    // 현재 줄의 불릿을 켜고 끈다
    const pos = ta.selectionStart;
    const before = ta.value.slice(0, pos);
    const lineStart = before.lastIndexOf("\n") + 1;
    const lineEndRel = ta.value.indexOf("\n", lineStart);
    const lineEnd = lineEndRel === -1 ? ta.value.length : lineEndRel;
    const line = ta.value.slice(lineStart, lineEnd);
    const m = line.match(/^(\s*)\u2022 /);
    if (m) ta.setRangeText(line.replace(/^(\s*)\u2022 /, "$1"), lineStart, lineEnd, "end");
    else ta.setRangeText("\u2022 " + line, lineStart, lineEnd, "end");
    ta.focus();
  });

  // ── 열람실: 쌓인 지층을 읽기 전용으로 ──
  const WEEK = ["일","월","화","수","목","금","토"];
  function dayLabel(iso) {
    const [y, mo, d] = iso.split("-").map(Number);
    return `${y}년 ${mo}월 ${d}일 (${WEEK[new Date(y, mo-1, d).getDay()]})`;
  }

  $("strataBtn").addEventListener("click", openStrata);
  $("strataClose").addEventListener("click", () => $("strata").classList.add("hidden"));

  async function openStrata() {
    $("strata").classList.remove("hidden");
    const list = $("strataList");
    list.innerHTML = '<div class="strata-msg">지층을 여는 중…</div>';
    try {
      const { data: rows, error: e1 } = await sb.from("entries")
        .select("*").order("occurred_on", { ascending: false })
        .order("id", { ascending: false }).limit(300);
      if (e1) throw e1;
      if (!rows || rows.length === 0) {
        list.innerHTML = '<div class="strata-msg">아직 지층이 없다 — 첫 사초가 첫 층이 된다.</div>';
        return;
      }
      const ids = rows.map((r) => r.id);
      const { data: med } = await sb.from("media").select("*").in("entry_id", ids);
      const media = med || [];
      // 사진의 임시 열람증(서명 URL) 발급 — 곳간은 비공개이므로
      const photoPaths = media.filter((m) => m.kind === "photo" && m.storage_path).map((m) => m.storage_path);
      const signedMap = {};
      if (photoPaths.length) {
        const { data: signed } = await sb.storage.from("gotgan").createSignedUrls(photoPaths, 3600);
        (signed || []).forEach((s) => { if (s.signedUrl) signedMap[s.path] = s.signedUrl; });
      }

      list.innerHTML = "";
      let currentDay = null;
      rows.forEach((r) => {
        if (r.occurred_on !== currentDay) {
          currentDay = r.occurred_on;
          const dl = document.createElement("div");
          dl.className = "day-line";
          dl.textContent = dayLabel(currentDay);
          list.appendChild(dl);
        }
        const card = document.createElement("div");
        card.className = "sacho-card";
        const txt = document.createElement("div");
        txt.className = "txt"; txt.textContent = r.body;
        card.appendChild(txt);

        const mine = media.filter((m) => m.entry_id === r.id);
        const pics = mine.filter((m) => m.kind === "photo" && signedMap[m.storage_path]);
        if (pics.length) {
          const box = document.createElement("div");
          box.className = "pics";
          pics.forEach((p) => {
            const img = document.createElement("img");
            img.loading = "lazy"; img.src = signedMap[p.storage_path];
            box.appendChild(img);
          });
          card.appendChild(box);
        }
        mine.filter((m) => m.kind === "song").forEach((s) => {
          const sl = document.createElement("div");
          sl.className = "songline";
          sl.textContent = "\u266A " + (s.song_title || "") + " — " + (s.song_artist || "");
          card.appendChild(sl);
        });

        const meta = document.createElement("div");
        meta.className = "meta";
        const w = new Date(r.written_at);
        const locTag = r.loc_label ? " \u00B7 " + r.loc_label : "";
        meta.innerHTML = `<span>사초 제${r.id}호${locTag}</span><span>적음 ${String(w.getHours()).padStart(2,"0")}:${String(w.getMinutes()).padStart(2,"0")}</span>`;
        card.appendChild(meta);
        list.appendChild(card);
      });
    } catch (err) {
      list.innerHTML = '<div class="strata-msg">지층에 닿지 못했다 — ' + (err.message || err) + '</div>';
    }
  }

  // ── PWA 등록 ──
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");

  checkDoor();
</script>
</body>
</html>
