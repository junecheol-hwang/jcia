<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>談藏齋 — 사본소</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { --ink:#1A1815; --ink-soft:#242019; --clay:#C25E3F; --paper:#F5F2EC; --mist:#8a877f; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--ink); color:var(--paper); font-family:'Noto Serif KR',serif;
    min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:40px 20px; }
  h1 { font-size:22px; color:var(--clay); font-weight:600; margin:0 0 6px; }
  .sub { color:var(--mist); font-size:13.5px; margin:0 0 24px; text-align:center; line-height:1.7; }
  .box { width:100%; max-width:560px; background:var(--ink-soft);
    border:1px solid rgba(194,94,63,.35); border-radius:14px; padding:24px; }
  input { width:100%; padding:11px 12px; margin-bottom:10px; font-size:15px;
    background:var(--ink); color:var(--paper); border:1px solid #3a3630; border-radius:9px; font-family:inherit; }
  button.primary { width:100%; padding:12px 0; font-size:15.5px; border-radius:10px;
    background:var(--clay); color:var(--paper); border:none; cursor:pointer; font-family:inherit; }
  button.primary:disabled { opacity:.5; cursor:default; }
  .hidden { display:none; }
  #bar { height:8px; background:var(--ink); border-radius:4px; overflow:hidden; margin:16px 0 8px; }
  #fill { height:100%; width:0%; background:var(--clay); transition:width .2s; }
  #stat { font-size:13.5px; color:var(--mist); text-align:center; line-height:1.7; }
  #log { margin-top:16px; max-height:300px; overflow-y:auto; font-size:12.5px; line-height:1.8;
    color:var(--mist); white-space:pre-wrap; word-break:break-all; border-top:1px solid #3a3630; padding-top:12px; }
  #log .bad { color:var(--clay); }
  .note { font-size:12.5px; color:var(--mist); line-height:1.8; margin-top:14px; }
</style>
</head>
<body>
<h1>사본소</h1>
<p class="sub">곳간의 사진마다 <b>작은 사본</b>을 하나씩 떠 둔다.<br>
열람실과 조판소는 앞으로 이 사본만 본다 — 오가는 무게가 여덟 자리 가벼워진다.<br>
이미 사본이 있는 사진은 건너뛴다. 끊기면 다시 눌러 이어서 하면 된다.</p>

<div class="box" id="loginBox">
  <input type="email" id="email" placeholder="이메일" autocomplete="username">
  <input type="password" id="pw" placeholder="비밀번호" autocomplete="current-password">
  <button class="primary" id="loginBtn">서고에 들다</button>
</div>

<div class="box hidden" id="workBox">
  <button class="primary" id="goBtn">작은 사본을 뜬다</button>
  <div id="bar"><div id="fill"></div></div>
  <div id="stat">누른 뒤에는 이 탭을 닫지 말 것.</div>
  <div id="log"></div>
  <p class="note">이 공정은 원본을 한 번씩 내려받으므로, 곳간 크기만큼(약 116MB)의 내려받기를 한 번 씁니다.<br>
  그 한 번의 값으로 앞으로의 열람과 조판이 여덟 자리 가벼워집니다.</p>
</div>

<script>
const sb = supabase.createClient(
  "https://plwljyoouxyzsnyszcxw.supabase.co",
  "sb_publishable_m5k-ycq86oX7MEtUq_fFHA_03lEbuSa"
);
const $ = (id) => document.getElementById(id);
const log = (m, c) => { const d = document.createElement("div"); if (c) d.className = c; d.textContent = m; $("log").prepend(d); };

async function checkDoor() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) { $("loginBox").classList.add("hidden"); $("workBox").classList.remove("hidden"); }
}
$("loginBtn").addEventListener("click", async () => {
  const { error } = await sb.auth.signInWithPassword({ email: $("email").value.trim(), password: $("pw").value });
  if (error) { alert("서고가 거절했다 — " + error.message); return; }
  checkDoor();
});
checkDoor();

async function fetchAll(t, cols) {
  const STEP = 1000, all = [];
  for (let from = 0; ; from += STEP) {
    const { data, error } = await sb.from(t).select(cols).order("id", { ascending: true }).range(from, from + STEP - 1);
    if (error) throw error;
    all.push(...(data || []));
    if (!data || data.length < STEP) return all;
  }
}

async function loadBitmap(blob) {
  if (window.createImageBitmap) { try { return await createImageBitmap(blob); } catch { } }
  const url = URL.createObjectURL(blob);
  try {
    const im = new Image(); im.src = url;
    await new Promise((res, rej) => { im.onload = res; im.onerror = () => rej(new Error("사진을 읽지 못함")); });
    return im;
  } finally { setTimeout(() => URL.revokeObjectURL(url), 5000); }
}

$("goBtn").addEventListener("click", async () => {
  $("goBtn").disabled = true;
  $("stat").textContent = "곳간의 장부를 긷는 중…";
  let paths = [];
  try {
    const media = await fetchAll("media", "kind, storage_path");
    paths = [...new Set(media.filter((m) => m.kind === "photo" && m.storage_path).map((m) => m.storage_path))];
  } catch (e) { $("stat").textContent = "장부를 긷지 못했다 — " + (e.message || e); $("goBtn").disabled = false; return; }

  // 이미 뜬 사본은 건너뛴다
  $("stat").textContent = "이미 있는 사본을 세는 중…";
  const have = new Set();
  try {
    const dirs = [...new Set(paths.map((p) => "thumbs/" + p.split("/").slice(0, -1).join("/")))];
    for (const dir of dirs) {
      const { data } = await sb.storage.from("gotgan").list(dir, { limit: 1000 });
      (data || []).forEach((f) => have.add(dir + "/" + f.name));
    }
  } catch { }

  const todo = paths.filter((p) => !have.has("thumbs/" + p));
  log(`사진 ${paths.length}장 — 이미 사본 있음 ${paths.length - todo.length} · 뜰 것 ${todo.length}`);

  let done = 0, made = 0, failed = 0;
  for (const p of todo) {
    done++;
    $("fill").style.width = (done / todo.length * 100) + "%";
    $("stat").textContent = `${done} / ${todo.length} — 뜸 ${made} · 실패 ${failed}`;
    try {
      const { data: file, error: dlErr } = await sb.storage.from("gotgan").download(p);
      if (dlErr) throw dlErr;
      const src = await loadBitmap(file);
      let w = src.width || src.naturalWidth, h = src.height || src.naturalHeight;
      const MAX = 400, k = Math.max(w, h) > MAX ? MAX / Math.max(w, h) : 1;
      const cw = Math.round(w * k), ch = Math.round(h * k);
      const c = document.createElement("canvas"); c.width = cw; c.height = ch;
      c.getContext("2d").drawImage(src, 0, 0, cw, ch);
      const blob = await new Promise((r) => c.toBlob(r, "image/jpeg", 0.72));
      if (!blob) throw new Error("사본 뜨기 실패");
      const { error } = await sb.storage.from("gotgan")
        .upload("thumbs/" + p, blob, { upsert: true, contentType: "image/jpeg" });
      if (error) throw error;
      made++;
    } catch (e) {
      failed++;
      log(`실패 — ${p}: ${e.message || e}`, "bad");
    }
  }
  $("stat").textContent = `끝 — 새로 뜬 사본 ${made} · 실패 ${failed}. 이제 열람실과 조판소가 가벼워진다.`;
  log(`사본 마감 — ${made}장 (실패 ${failed})`);
  $("goBtn").disabled = false;
});
</script>
</body>
</html>
