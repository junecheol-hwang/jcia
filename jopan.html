<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>談藏齋 — 조판소</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#1A1815; --ink-soft:#242019; --clay:#C25E3F;
    --paper:#F5F2EC; --mist:#8a877f; --paper-ink:#2A2721;
    --rule:#c9c2b4; --fade:#8a8478;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--ink); font-family:'Noto Serif KR',serif; }

  .ui { position:sticky; top:0; z-index:5; background:var(--ink);
    padding:18px 20px 14px; border-bottom:1px solid rgba(194,94,63,.3);
    display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:center; color:var(--paper); }
  .ui h1 { font-size:17px; color:var(--clay); margin:0 12px 0 0; font-weight:600; }
  .ui select, .ui input[type=text] { background:var(--ink-soft); color:var(--paper);
    border:1px solid #3a3630; border-radius:8px; padding:8px 10px; font-family:inherit; font-size:13.5px; }
  .ui button { padding:9px 16px; border-radius:9px; font-family:inherit; font-size:14px; cursor:pointer;
    background:var(--clay); color:var(--paper); border:none; }
  .ui button.ghost { background:none; border:1px solid #3a3630; color:var(--mist); }
  .ui .stat { width:100%; text-align:center; color:var(--mist); font-size:12.5px; }

  #loginBox { max-width:380px; margin:60px auto; background:var(--ink-soft);
    border:1px solid rgba(194,94,63,.35); border-radius:14px; padding:24px; color:var(--paper); }
  #loginBox input { width:100%; padding:11px 12px; margin-bottom:10px; font-size:15px;
    background:var(--ink); color:var(--paper); border:1px solid #3a3630; border-radius:9px; font-family:inherit; }
  #loginBox button { width:100%; padding:12px 0; font-size:15.5px; border-radius:10px;
    background:var(--clay); color:var(--paper); border:none; cursor:pointer; font-family:inherit; }
  .hidden { display:none; }

  /* ── 책: A4 절판 148×210 · 한 사초 한 페이지 ── */
  .pg { position:relative; width:148mm; height:210mm; overflow:hidden;
    margin:0 auto 26px; background:white; color:var(--paper-ink);
    box-shadow:0 8px 40px rgba(0,0,0,.5); break-after:page; page-break-after:always; }
  .pg.flow { height:auto; min-height:210mm; overflow:visible; }
  .inbox { position:absolute; inset:16mm 14mm 14mm 18mm; }
  .pg.even .inbox { inset:16mm 18mm 14mm 14mm; }
  .pg.flow .inbox { position:static; margin:16mm 14mm 14mm 18mm; }
  .pg.flow.even .inbox { margin:16mm 18mm 14mm 14mm; }

  .no { position:absolute; top:9mm; left:18mm; font-size:8pt; color:var(--fade); letter-spacing:.06em; }
  .pg.even .no { left:14mm; }
  .ptxt { font-size:10.5pt; line-height:2.0; white-space:pre-wrap; word-break:break-word; }
  .dt { font-weight:600; }
  .med { position:absolute; bottom:0; left:0; font-size:8pt; color:var(--fade); white-space:pre-wrap; }
  img.pimg { display:block; cursor:pointer; }

  /* 가3 · 중대형 — 가로 장면이 판허리를 재단선까지 두른다 */
  .g3 .band { position:absolute; left:0; right:0; top:54mm; }
  .g3 .band img.pimg { width:100%; height:100%; object-fit:cover; }

  /* 가5 · 시집형 — 중앙축 대칭 */
  .g5 .inbox { text-align:center; }
  .g5 img.pimg { max-height:70mm; object-fit:contain; margin:16mm auto 12mm; }
  .g5 .ptxt { font-size:11pt; line-height:2.25; }
  .g5.nopic .inbox { display:flex; flex-direction:column; justify-content:center; }
  .g5.nopic .ptxt { font-size:12.5pt; line-height:2.4; }

  /* 세2 · 대면형 — 괘선을 사이에 두고, 사진 윗모서리는 날짜 줄과 나란히 */
  .s2 .cols { display:grid; column-gap:5mm; align-items:start; }
  .s2 .vr { width:1px; height:100%; background:var(--rule); }
  .s2 img.pimg { width:100%; object-fit:contain; object-position:top; margin-top:1.2mm; }

  /* 세3 · 극여백형 — 말 몇 줄, 우표 한 장, 나머지는 하늘 */
  .s3 .ptxt { max-width:80mm; }
  .s3 img.pimg { position:absolute; right:0; bottom:0; object-fit:contain; }
  .s3 .med { max-width:68mm; }
  .s3.nopic .ptxt { max-width:86mm; margin-top:4mm; }

  /* 세5 · 창문형 — 위쪽의 작은 창으로 장면을 내다본다 */
  .s5 .inbox { display:flex; flex-direction:column; align-items:center; text-align:center; }
  .s5 .frame { border:0.5pt solid var(--rule); padding:2mm; margin-top:12mm; }
  .s5 .frame img.pimg { display:block; object-fit:contain; }
  .s5 .sky { flex:1; }
  .s5 .ptxt { margin-bottom:10mm; }

  /* 장문 실무복 — 긴 글은 흐른다 (다섯 벌 밖의 필요복) */
  .lg .ptxt { font-size:10pt; line-height:1.9; }
  .lg img.pimg { width:34mm; max-height:46mm; object-fit:contain; margin-top:6mm; }
  .lg .med { position:static; margin-top:3mm; }

  .cover .inbox { display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
  .cover .hanja { font-size:30pt; letter-spacing:.35em; font-weight:600; }
  .cover.vert .hanja { writing-mode:vertical-rl; letter-spacing:.3em; }
  .cover .yr { margin-top:10mm; font-size:12pt; color:#7a7468; }
  .cover .sub { margin-top:3mm; font-size:9.5pt; color:#9a948a; }
  .colophon .inbox { display:flex; flex-direction:column; justify-content:flex-end; text-align:center; }
  .colophon .inbox div { font-size:8.5pt; color:#9a948a; border-top:0.5pt solid var(--rule); padding-top:4mm; }

  /* 손잡이 — 판마다의 덧옷 */
  .pg.al-l .ptxt { text-align:left !important; }
  .pg.al-c .ptxt { text-align:center !important; }
  .pg.al-r .ptxt { text-align:right !important; }
  .pg.sz-s .ptxt { font-size:9.5pt !important; line-height:1.9 !important; }
  .pg.sz-l .ptxt { font-size:12pt !important; line-height:2.2 !important; }
  .ctl { width:148mm; margin:-18px auto 26px; display:flex; flex-wrap:wrap; gap:6px;
    align-items:center; justify-content:center; }
  .ctl select, .ctl button { background:var(--ink-soft); color:var(--mist);
    border:1px solid #3a3630; border-radius:7px; padding:5px 8px;
    font-family:inherit; font-size:11.5px; cursor:pointer; }
  .ctl .tag { color:var(--fade); font-size:11px; margin-right:2px; }
  .ctl.touched select, .ctl.touched button { border-color:rgba(194,94,63,.6); color:var(--paper); }
  #book { padding:26px 0 80px; }

  @media print {
    @page { size:148mm 210mm; margin:0; }
    html, body { background:white !important; }
    .ui, #loginBox, .ctl { display:none !important; }
    #book { padding:0; }
    .pg { margin:0; box-shadow:none; }
    img.pimg, .g3 .band { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  }
</style>
</head>
<body>

<div id="loginBox">
  <input type="email" id="email" placeholder="이메일" autocomplete="username">
  <input type="password" id="pw" placeholder="비밀번호" autocomplete="current-password">
  <button id="loginBtn">서고에 들다</button>
</div>

<div class="ui hidden" id="deskBox">
  <h1>조판소</h1>
  <select id="selYear"></select>
  <select id="selCat">
    <option value="">모든 갈래</option>
    <option>업무</option><option>가족</option><option>책</option><option>영화</option>
    <option value="여백">여백만</option>
  </select>
  <input type="text" id="title" placeholder="표제 (비우면 談藏齋)" size="12">
  <select id="titleDir"><option value="h">표제 가로</option><option value="v">표제 세로</option></select>
  <button id="setBtn">조판한다</button>
  <button id="printBtn" class="ghost">굽는다 — PDF</button>
  <button id="dlCull" class="ghost hidden">검은 장 명단</button>
  <div class="stat" id="stat">거르기를 정하고 「조판한다」를 누른다. 미리보기의 사진을 탭하면 90도씩 돌아 곳간에 바로 눕는다.</div>
</div>

<div id="book"></div>

<script>
const sb = supabase.createClient(
  "https://plwljyoouxyzsnyszcxw.supabase.co",
  "sb_publishable_m5k-ycq86oX7MEtUq_fFHA_03lEbuSa"
);
const $ = (id) => document.getElementById(id);

async function checkDoor() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) { $("loginBox").classList.add("hidden"); $("deskBox").classList.remove("hidden"); loadYears(); }
}
$("loginBtn").addEventListener("click", async () => {
  const { error } = await sb.auth.signInWithPassword({ email: $("email").value.trim(), password: $("pw").value });
  if (error) { alert("서고가 거절했다 — " + error.message); return; }
  checkDoor();
});
checkDoor();

async function fetchAll(t, cols, shape) {
  const STEP = 1000, all = [];
  for (let from = 0; ; from += STEP) {
    let q = sb.from(t).select(cols);
    if (shape) q = shape(q);
    const { data, error } = await q.order("id", { ascending: true }).range(from, from + STEP - 1);
    if (error) throw error;
    all.push(...(data || []));
    if (!data || data.length < STEP) return all;
  }
}

async function loadYears() {
  try {
    const rows = await fetchAll("entries", "occurred_on");
    const years = [...new Set(rows.map((r) => String(r.occurred_on).slice(0, 4)))].sort();
    $("selYear").innerHTML = `<option value="">전체</option>` + years.map((y) => `<option>${y}</option>`).join("");
    $("selYear").value = years[years.length - 1] || "";
    $("stat").textContent = `서고에 사초 ${rows.length}편 — 구분을 골라 조판한다.`;
  } catch (e) { $("stat").textContent = "서고를 읽지 못했다 — " + (e.message || e); }
}

function esc(t) { const d = document.createElement("div"); d.textContent = t; return d.innerHTML; }
function seeded(n) { let x = (n * 2654435761) % 4294967296; x = (x ^ (x >>> 13)) * 1274126177; return ((x ^ (x >>> 16)) >>> 0) / 4294967296; }
function pick(id, arr) { return arr[Math.floor(seeded(id) * arr.length) % arr.length]; }
function pickHo(id, min, max) { return min + Math.floor(seeded(id + 101) * (max - min + 1)) % (max - min + 1); }
const HO = { 1:44, 2:53, 3:62, 4:71, 5:80, 6:90 };       // 세로 도판 폭(mm)
const BAND = { 3:52, 4:62, 5:74, 6:86 };                  // 가3 띠 높이(mm)

// 사진의 결과 어둠을 한 번에 잰다
function probeMeta(url) {
  return new Promise((res) => {
    const im = new Image(); im.crossOrigin = "anonymous";
    im.onload = () => {
      let dark = false;
      try {
        const c = document.createElement("canvas"); c.width = 64; c.height = 64;
        const x = c.getContext("2d"); x.drawImage(im, 0, 0, 64, 64);
        const d = x.getImageData(0, 0, 64, 64).data;
        let n = 0; for (let i = 0; i < d.length; i += 4) if (d[i] + d[i+1] + d[i+2] < 45) n++;
        dark = n / 4096 >= 0.92;
      } catch { }
      res({ o: im.naturalWidth > im.naturalHeight * 1.05 ? "l" : "p", dark });
    };
    im.onerror = () => res({ o: "p", dark: false });
    im.src = url;
  });
}

let culled = [];
let PLAN = [], OV = {};

// 한 판을 그린다 — 옷장이 정한 것 위에 손잡이의 덧옷을 입혀서
function renderPage(p) {
  const extra = (p.align !== "auto" ? " al-" + p.align : "") + (p.size !== "auto" ? " sz-" + p.size : "");
  const no = `<div class="no">사초 제${p.id}호</div>`;
  const txt = `<div class="ptxt"><span class="dt">${p.dateStr}</span>&#8195;&#8194;${esc(p.body)}</div>`;
  const med = p.medTxt ? `<div class="med">${p.medTxt}</div>` : "";
  const im = (style) => p.hasPic
    ? `<img class="pimg" crossorigin="anonymous" data-path="${esc(p.path)}" src="${p.img}" alt="" ${style ? `style="${style}"` : ""}>`
    : "";
  const S = p.suit;
  if (S === "lg") {
    return `<div class="pg flow lg${p.side}${extra}" data-i="${p.id}">${no}<div class="inbox">${txt}${im("")}${med}</div></div>`;
  }
  if (S === "g3") {
    const H = BAND[p.ho && p.ho >= 3 ? p.ho : pickHo(p.id, 3, 6)];
    return `<div class="pg g3${p.side}${extra}" data-i="${p.id}">${no}
      <div class="band" style="height:${H}mm">${im("")}</div>
      <div class="inbox"><div style="margin-top:${45 + H}mm">${txt}</div>${med}</div></div>`;
  }
  if (S === "g5" || S === "g5n") {
    const W = S === "g5" ? Math.min(HO[p.ho || pickHo(p.id, 3, 6)] + 20, 116) : 0;
    return `<div class="pg g5${S === "g5n" ? " nopic" : ""}${p.side}${extra}" data-i="${p.id}">${no}
      <div class="inbox">${S === "g5" ? im(`max-width:${W}mm;margin-left:auto;margin-right:auto`) : ""}${txt}${med}</div></div>`;
  }
  if (S === "s2") {
    const W = HO[p.ho || pickHo(p.id, 1, 4)];
    return `<div class="pg s2${p.side}${extra}" data-i="${p.id}">${no}
      <div class="inbox"><div class="cols" style="grid-template-columns:1fr 1px ${W}mm">${txt}<div class="vr"></div>${im("")}</div>${med}</div></div>`;
  }
  if (S === "s3" || S === "s3n") {
    const W = HO[p.ho || pickHo(p.id, 1, 3)];
    return `<div class="pg s3${S === "s3n" ? " nopic" : ""}${p.side}${extra}" data-i="${p.id}">${no}
      <div class="inbox">${txt}${S === "s3" ? im(`width:${W}mm;max-height:${Math.round(W * 1.5)}mm`) : ""}${med}</div></div>`;
  }
  const W = HO[p.ho || pickHo(p.id, 1, 2)];
  return `<div class="pg s5${p.side}${extra}" data-i="${p.id}">${no}
    <div class="inbox"><div class="frame">${im(`width:${W}mm;max-height:${Math.round(W * 1.4)}mm`)}</div><div class="sky"></div>${txt}${med}</div></div>`;
}

const SUITS = { g3:"가3 중대형", g5:"가5 시집형", s2:"세2 대면형", s3:"세3 극여백형", s5:"세5 창문형", lg:"장문형", g5n:"가5 시집형", s3n:"세3 극여백형" };
function renderCtl(p, i) {
  const opt = (v, t, cur) => `<option value="${v}"${cur === v ? " selected" : ""}>${t}</option>`;
  const suitNow = p.suit === "g5n" ? "g5" : p.suit === "s3n" ? "s3" : p.suit;
  return `<div class="ctl${p.touched ? " touched" : ""}" data-i="${i}">
    <span class="tag">제${p.id}호</span>
    <select data-k="suit">${Object.keys(SUITS).filter((k)=>!k.endsWith("n")).map((k)=>opt(k, SUITS[k], suitNow)).join("")}</select>
    <select data-k="ho">${[["","호수 자동"],[1,"1호"],[2,"2호"],[3,"3호"],[4,"4호"],[5,"5호"],[6,"6호"]].map(([v,t])=>opt(String(v), t, String(p.ho || ""))).join("")}</select>
    <select data-k="align">${[["auto","정렬 기본"],["l","왼쪽"],["c","가운데"],["r","오른쪽"]].map(([v,t])=>opt(v,t,p.align)).join("")}</select>
    <select data-k="size">${[["auto","글자 보통"],["s","작게"],["l","크게"]].map(([v,t])=>opt(v,t,p.size)).join("")}</select>
    <button data-k="reset">옷장에</button>
  </div>`;
}

// 손잡이를 돌리면 그 판만 다시 그리고, 장부에 한 층 얹는다
$("book").addEventListener("change", async (e) => {
  const ctl = e.target.closest(".ctl"); if (!ctl) return;
  const p = PLAN[+ctl.dataset.i]; const k = e.target.dataset.k;
  if (k === "suit") { p.suit = p.hasPic ? e.target.value : (e.target.value === "g5" ? "g5n" : e.target.value === "lg" ? "lg" : "s3n"); }
  if (k === "ho") p.ho = e.target.value ? +e.target.value : null;
  if (k === "align") p.align = e.target.value;
  if (k === "size") p.size = e.target.value;
  p.touched = true;
  await saveLayout(p);
  redrawPage(ctl, p);
});
$("book").addEventListener("click", async (e) => {
  const b = e.target.closest('.ctl button[data-k="reset"]'); if (!b) return;
  const ctl = b.closest(".ctl"); const p = PLAN[+ctl.dataset.i];
  await saveLayout({ id: p.id, suit: "auto", ho: null, align: "auto", size: "auto" });
  $("stat").textContent = `사초 제${p.id}호를 옷장에 돌려보냈다 — 다음 「조판한다」에서 옷장이 다시 입힌다.`;
  ctl.classList.remove("touched");
});
function redrawPage(ctl, p) {
  const pg = ctl.previousElementSibling;
  if (pg && pg.classList.contains("pg")) pg.outerHTML = renderPage(p);
  ctl.classList.add("touched");
}
async function saveLayout(p) {
  try {
    const { error } = await sb.from("layout").insert({
      entry_id: p.id, suit: p.suit === "g5n" ? "g5" : p.suit === "s3n" ? "s3" : p.suit,
      ho: p.ho, align: p.align, size: p.size
    });
    if (error) throw error;
  } catch (err) {
    $("stat").textContent = "손잡이를 장부에 적지 못했다 — " + (err.message || err);
  }
}
$("dlCull").addEventListener("click", () => {
  const blob = new Blob([culled.join("\n")], { type: "text/plain;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "검은장_명단.txt"; a.click();
});

$("setBtn").addEventListener("click", typeset);
$("printBtn").addEventListener("click", async () => {
  // 굽는 순간에만 원본을 부른다 — 미리보기는 작은 사본으로 가볍게
  const imgs = [...$("book").querySelectorAll("img.pimg[data-path]")];
  if (!imgs.length) { window.print(); return; }
  $("printBtn").disabled = true;
  $("stat").textContent = `원본을 부르는 중\u2026 0 / ${imgs.length}`;
  try {
    const paths = [...new Set(imgs.map((im) => im.dataset.path))];
    const map = {};
    for (let i = 0; i < paths.length; i += 100) {
      const { data: signed } = await sb.storage.from("gotgan").createSignedUrls(paths.slice(i, i + 100), 3600);
      (signed || []).forEach((s) => { if (s.signedUrl) map[s.path] = s.signedUrl; });
    }
    for (let i = 0; i < imgs.length; i += 8) {
      await Promise.all(imgs.slice(i, i + 8).map((im) => new Promise((res) => {
        const u = map[im.dataset.path];
        if (!u) { res(); return; }
        im.onload = im.onerror = () => { im.onload = im.onerror = null; res(); };
        im.src = u;
      })));
      $("stat").textContent = `원본을 부르는 중\u2026 ${Math.min(i + 8, imgs.length)} / ${imgs.length}`;
    }
    $("stat").textContent = "원본을 다 불렀다 — 인쇄창에서 PDF로 저장, 용지 A5, 여백 없음, 배율 100%.";
  } catch (e) {
    $("stat").textContent = "원본을 다 부르지 못했다 — " + (e.message || e);
  }
  $("printBtn").disabled = false;
  window.print();
});

async function typeset() {
  const year = $("selYear").value, cat = $("selCat").value;
  $("stat").textContent = "긷는 중…";
  $("setBtn").disabled = true;
  try {
    let rows = await fetchAll("entries", "*", (q) =>
      year ? q.gte("occurred_on", year + "-01-01").lte("occurred_on", year + "-12-31") : q);
    rows.sort((a, b) => String(a.occurred_on).localeCompare(String(b.occurred_on)) || a.id - b.id);

    const catMap = {};
    try {
      const cats = await fetchAll("categories", "entry_id, category, decided_at");
      cats.sort((a, b) => String(a.decided_at).localeCompare(String(b.decided_at)));
      cats.forEach((c) => { catMap[c.entry_id] = c.category; });
    } catch { }
    if (cat) rows = rows.filter((r) => (catMap[r.id] || "여백") === cat);
    if (!rows.length) { $("book").innerHTML = ""; $("stat").textContent = "이 거르기에는 사초가 없다."; $("setBtn").disabled = false; return; }

    const ids = new Set(rows.map((r) => r.id));
    let media = [];
    try { media = (await fetchAll("media", "*")).filter((m) => ids.has(m.entry_id)); } catch { }
    const photoPaths = media.filter((m) => m.kind === "photo" && m.storage_path).map((m) => m.storage_path);
    const urlMap = {};
    // 미리보기는 작은 사본으로 — 굽는 순간에만 원본을 부른다
    for (let i = 0; i < photoPaths.length; i += 100) {
      try {
        const { data: th } = await sb.storage.from("gotgan")
          .createSignedUrls(photoPaths.slice(i, i + 100).map((p) => "thumbs/" + p), 3600);
        (th || []).forEach((s) => {
          if (s.signedUrl && s.path) urlMap[String(s.path).replace(/^thumbs\//, "")] = s.signedUrl;
        });
      } catch { }
    }
    const restPaths = photoPaths.filter((p) => !urlMap[p]);
    for (let i = 0; i < restPaths.length; i += 100) {
      try {
        const { data: signed } = await sb.storage.from("gotgan").createSignedUrls(restPaths.slice(i, i + 100), 3600);
        (signed || []).forEach((s) => { if (s.signedUrl) urlMap[s.path] = s.signedUrl; });
      } catch { }
    }

    // 사초별 첫 사진: 주소·경로, 그리고 결과 어둠
    const firstPhoto = {}, firstPath = {};
    rows.forEach((r) => {
      const p = media.find((m) => m.entry_id === r.id && m.kind === "photo" && urlMap[m.storage_path]);
      if (p) { firstPhoto[r.id] = urlMap[p.storage_path]; firstPath[r.id] = p.storage_path; }
    });
    const meta = {};
    culled = [];
    const probeIds = Object.keys(firstPhoto);
    for (let i = 0; i < probeIds.length; i += 12) {
      $("stat").textContent = `사진의 결을 재는 중… ${Math.min(i + 12, probeIds.length)} / ${probeIds.length}`;
      await Promise.all(probeIds.slice(i, i + 12).map(async (id) => { meta[id] = await probeMeta(firstPhoto[id]); }));
    }
    probeIds.forEach((id) => { if (meta[id].dark) culled.push(`사초 제${id}호 — ${firstPath[id]}`); });

    const title = $("title").value.trim() || "談藏齋";
    const vert = $("titleDir").value === "v" ? " vert" : "";
    const span = year || "전체";

    // ── 손잡이 장부: 손댄 판의 기억 (최근 층이 이긴다) ──
    OV = {};
    try {
      const ls = await fetchAll("layout", "entry_id, suit, ho, align, size, decided_at");
      ls.sort((a, b) => String(a.decided_at).localeCompare(String(b.decided_at)));
      ls.forEach((l) => { OV[l.entry_id] = l; });
    } catch { }

    // ── 판 짜기 ──
    PLAN = [];
    let pageNo = 2;
    for (const r of rows) {
      const body = (r.body || "").replace(/^\s+/, "");
      const d = new Date(String(r.occurred_on) + "T00:00:00");
      const hasPic = !!firstPhoto[r.id] && !meta[r.id]?.dark;
      const o = hasPic ? meta[r.id].o : null;
      const mine = media.filter((m) => m.entry_id === r.id);
      const medTxt = mine.filter((m) => m.kind === "song")
        .map((m) => `\u266A ${m.song_title || ""} \u2014 ${m.song_artist || ""}`)
        .concat(mine.filter((m) => m.kind === "movie")
        .map((m) => `\u25A3 ${m.movie_title || ""}${m.movie_year ? " (" + m.movie_year + ")" : ""}${m.movie_director ? " \u2014 " + m.movie_director : ""}`))
        .map(esc).join("\n");

      // 옷장이 입히는 기본 옷
      const len = body.length;
      let suit;
      if (len > 300)      suit = "lg";
      else if (!hasPic)   suit = pick(r.id, ["g5n", "s3n"]);
      else if (o === "l") suit = pick(r.id, ["g3", "g5"]);
      else                suit = pick(r.id, ["s2", "s3", "s5"]);
      let ho = null;

      // 손댄 판이면 그 기억을 입힌다
      const ov = OV[r.id];
      const touched = !!(ov && (ov.suit && ov.suit !== "auto" || ov.ho || (ov.align && ov.align !== "auto") || (ov.size && ov.size !== "auto")));
      if (ov && ov.suit && ov.suit !== "auto") {
        suit = ov.suit;
        if (!hasPic && ["g3","g5","s2","s3","s5"].includes(suit)) suit = suit === "g5" ? "g5n" : "s3n";
      }
      if (ov && ov.ho) ho = ov.ho;

      PLAN.push({
        id: r.id, body, hasPic, o, medTxt, suit, ho, side: pageNo % 2 === 1 ? "" : " even",
        align: (ov && ov.align) || "auto", size: (ov && ov.size) || "auto", touched,
        dateStr: `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일`,
        img: hasPic ? firstPhoto[r.id] : "", path: hasPic ? firstPath[r.id] : ""
      });
      pageNo++;
    }

    let html = `<div class="pg cover${vert}"><div class="inbox"><div class="hanja">${esc(title)}</div>
      <div class="yr">${esc(span)}</div>
      <div class="sub">${cat ? esc(cat) + " 갈래 · " : ""}사초 ${rows.length}편</div></div></div>`;
    PLAN.forEach((p, i) => { html += renderPage(p) + renderCtl(p, i); });
    const side2 = pageNo % 2 === 1 ? "" : " even";
    html += `<div class="pg colophon${side2}"><div class="inbox"><div>談藏齋 · ${esc(span)} · ${new Date().toLocaleDateString("ko-KR")} 조판</div></div></div>`;

    $("book").innerHTML = html;
    $("dlCull").classList.toggle("hidden", culled.length === 0);
    $("stat").textContent = `조판 완료 — 사초 ${rows.length}편 · 도판 ${probeIds.length - culled.length}장 · 검은 장 물림 ${culled.length}. `
      + `사진을 탭하면 90도씩 돌아 곳간에 눕는다. 굽기: 대상 「PDF로 저장」, 용지 A5, 여백 없음, 배율 100%.`;
  } catch (e) {
    $("stat").textContent = "조판 실패 — " + (e.message || e);
  }
  $("setBtn").disabled = false;
}

// ── 탭 회전: 곳간의 원본을 실제로 돌려 다시 눕힌다 ──
let rotating = false;
const freshBlobs = new Map();   // 방금 돌려 올린 그림
$("book").addEventListener("click", async (e) => {
  const img = e.target.closest("img.pimg");
  if (!img || !img.dataset.path || rotating) return;
  rotating = true;
  const path = img.dataset.path;
  img.style.opacity = ".35";
  $("stat").textContent = "돌려 눕히는 중… " + path;
  try {
    let file = freshBlobs.get(path);
    if (!file) {
      const { data: dl, error: dlErr } = await sb.storage.from("gotgan").download(path);
      if (dlErr) throw dlErr;
      file = dl;
    }
    let src;
    if (window.createImageBitmap) { try { src = await createImageBitmap(file); } catch { } }
    if (!src) {
      const u = URL.createObjectURL(file);
      src = new Image(); src.src = u;
      await new Promise((res, rej) => { src.onload = res; src.onerror = () => rej(new Error("사진을 읽지 못함")); });
      setTimeout(() => URL.revokeObjectURL(u), 5000);
    }
    let w = src.width || src.naturalWidth, h = src.height || src.naturalHeight;
    const MAX = 2000, k = Math.max(w, h) > MAX ? MAX / Math.max(w, h) : 1;
    w = Math.round(w * k); h = Math.round(h * k);
    const c = document.createElement("canvas"); c.width = h; c.height = w;
    const x = c.getContext("2d");
    x.translate(h, 0); x.rotate(Math.PI / 2);
    x.drawImage(src, 0, 0, w, h);
    const blob = await new Promise((r) => c.toBlob(r, "image/jpeg", 0.82));
    if (!blob) throw new Error("인화 실패");
    const { error } = await sb.storage.from("gotgan").upload(path, blob, { upsert: true, contentType: "image/jpeg", cacheControl: "0" });
    if (error) throw error;
    freshBlobs.set(path, blob);
    // 작은 사본도 같은 각도로 다시 뜬다
    try {
      const M = 400, kk = Math.max(c.width, c.height) > M ? M / Math.max(c.width, c.height) : 1;
      const t = document.createElement("canvas");
      t.width = Math.round(c.width * kk); t.height = Math.round(c.height * kk);
      t.getContext("2d").drawImage(c, 0, 0, t.width, t.height);
      const tb = await new Promise((r) => t.toBlob(r, "image/jpeg", 0.72));
      if (tb) await sb.storage.from("gotgan").upload("thumbs/" + path, tb, { upsert: true, contentType: "image/jpeg", cacheControl: "0" });
    } catch { }
    // 돌린 뒤에도 몸집을 지킨다 — 서 있던 키(길이)를 그대로 높이로
    const prevH = img.getBoundingClientRect().height;
    const { data: s2 } = await sb.storage.from("gotgan").createSignedUrl("thumbs/" + path, 3600);
    await new Promise((res) => {
      img.onload = () => { img.onload = null; res(); };
      img.src = (s2 && s2.signedUrl ? s2.signedUrl : img.src.split("#")[0]) + "#r" + Date.now();
      setTimeout(res, 4000);
    });
    img.style.width = "auto";
    img.style.maxWidth = "100%";
    img.style.height = prevH + "px";
    img.style.maxHeight = "none";
    $("stat").textContent = "돌려 눕혔다 — 키를 지킨 채 가로로 눕는다. 담장재·포쇄·책 어디서든 이 각도다. (제 옷을 입는 것은 다음 「조판한다」에서)";
  } catch (err) {
    $("stat").textContent = "돌리지 못했다 — " + (err.message || err);
  }
  img.style.opacity = "";
  rotating = false;
});
</script>
</body>
</html>
