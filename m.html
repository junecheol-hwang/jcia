// ── 입력 이벤트 — 정·동 호흡 항법 + 별 픽 ──
let isDragging=false, mdX=0, mdY=0, mdT=0, lastMX=0, lastMY=0;

tlCanvas.addEventListener('mousedown',e=>{
  if(window._nav.flying) return;
  isDragging=true; mdX=lastMX=e.clientX; mdY=lastMY=e.clientY; mdT=Date.now();
  const nav=window._nav; nav.dragging=true; nav.interactT=performance.now();
  nav.yawV=0; nav.pitchV=0;
  tlCanvas.style.cursor='grabbing';
});
window.addEventListener('mousemove',e=>{
  mouseX=e.clientX; mouseY=e.clientY;
  if(!isDragging){ checkHover(e.clientX,e.clientY); return; }
  const dx=e.clientX-lastMX, dy=e.clientY-lastMY;
  lastMX=e.clientX; lastMY=e.clientY;
  const nav=window._nav;
  nav.yaw   -= dx*0.005;
  nav.pitch += dy*0.005;
  nav.pitch = Math.max(-1.35,Math.min(1.35,nav.pitch));
  nav.yawV   = -dx*0.0016;   // 관성 저장 — 손을 떼면 미끄러지다 표류로
  nav.pitchV =  dy*0.0016;
  nav.interactT=performance.now();
});
window.addEventListener('mouseup',e=>{
  if(!isDragging) return;
  isDragging=false;
  const nav=window._nav; nav.dragging=false; nav.interactT=performance.now();
  tlCanvas.style.cursor='default';
  const dx=e.clientX-mdX, dy=e.clientY-mdY;
  if(Math.sqrt(dx*dx+dy*dy)<6 && Date.now()-mdT<300) handleClick(e.clientX,e.clientY);
});
tlCanvas.addEventListener('wheel',e=>{
  e.preventDefault();
  if(window._nav.flying) return;
  const nav=window._nav;
  const dx=Math.cos(nav.pitch)*Math.sin(nav.yaw), dy=Math.sin(nav.pitch), dz=Math.cos(nav.pitch)*Math.cos(nav.yaw);
  const step=-e.deltaY*0.06;          // 휠 위로 = 시선 방향으로 전진
  nav.pos.x+=dx*step; nav.pos.y+=dy*step; nav.pos.z+=dz*step;
  nav.interactT=performance.now();
},{passive:false});

// 터치 — 한 손가락 회전, 탭으로 픽
let tDX=0,tDY=0,tDT=0,tLX=0,tLY=0;
let pinchD0=0, pinching=false, pinchLock=false, oneStarted=false;   // [모바일] 핀치/두리번 상태
tlCanvas.addEventListener('touchstart',e=>{
  if(window._nav.flying) return;
  const nav=window._nav; nav.interactT=performance.now();
  if(e.touches.length>=2){                        // 핀치 시작 — 두 손가락
    const a=e.touches[0], b=e.touches[1];
    pinchD0=Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
    pinching=true; pinchLock=true; oneStarted=false;
    nav.dragging=true; nav.yawV=0; nav.pitchV=0; nav.zoomV=0;
    return;
  }
  if(pinchLock) return;                           // 핀치가 끝나기 전엔 한 손가락 입력 무시
  const tch=e.touches[0];
  tDX=tLX=tch.clientX; tDY=tLY=tch.clientY; tDT=Date.now();
  oneStarted=true; pinching=false;
  nav.dragging=true; nav.yawV=0; nav.pitchV=0; nav.zoomV=0;
},{passive:true});
tlCanvas.addEventListener('touchmove',e=>{
  const nav=window._nav;
  if(pinching && e.touches.length>=2){            // 두 손가락: 벌리면 전진, 좁히면 후진
    const a=e.touches[0], b=e.touches[1];
    const d=Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
    const delta=d-pinchD0; pinchD0=d;
    const dirx=Math.cos(nav.pitch)*Math.sin(nav.yaw), diry=Math.sin(nav.pitch), dirz=Math.cos(nav.pitch)*Math.cos(nav.yaw);
    const step=delta*0.12;
    nav.pos.x+=dirx*step; nav.pos.y+=diry*step; nav.pos.z+=dirz*step;
    nav.zoomV=step;                               // [관성] 마지막 줌 속도 기억
    nav.interactT=performance.now();
    return;
  }
  if(pinchLock) return;                           // 핀치에서 손가락 하나 떼도 두리번으로 안 넘어감(튐 방지)
  if(!oneStarted || e.touches.length>1) return;   // 손가락 하나만 두리번
  const tch=e.touches[0];
  const dx=tch.clientX-tLX, dy=tch.clientY-tLY;
  tLX=tch.clientX; tLY=tch.clientY;
  nav.yaw-=dx*0.0035; nav.pitch+=dy*0.0035;       // 감도 ↓ (멀미 완화)
  nav.pitch=Math.max(-1.35,Math.min(1.35,nav.pitch));
  nav.yawV=-dx*0.0011; nav.pitchV=dy*0.0011;      // [관성] 손 뗀 뒤 잠깐 미끄러짐
  nav.interactT=performance.now();
},{passive:true});
tlCanvas.addEventListener('touchend',e=>{
  const nav=window._nav; nav.interactT=performance.now();
  if(e.touches.length>0){                          // 아직 손가락이 남음
    if(e.touches.length<2) pinching=false;         // 핀치 줌만 멈추고, pinchLock 은 유지(두리번 금지)
    return;
  }
  // 모든 손가락이 떨어짐 — 상태 정리
  const wasTap = oneStarted && !pinchLock;         // 핀치가 섞이지 않은 순수 한 손가락만 탭 후보
  nav.dragging=false; pinching=false; pinchLock=false; oneStarted=false;
  // yawV·pitchV·zoomV 는 남겨 둠 → 손 뗀 뒤 잠깐 미끄러지다 멈춤(관성)
  if(wasTap){
    const ch=e.changedTouches[0];
    const dx=ch.clientX-tDX, dy=ch.clientY-tDY;
    if(Math.sqrt(dx*dx+dy*dy)<8 && Date.now()-tDT<300) handleClick(ch.clientX,ch.clientY);
  }
});

function clamp(){targetOffset=Math.max(0,Math.min((PHASES.length-1)*PHASE_SPACING,targetOffset));}

// ── 중심 정렬(snap-to-center) ─────────────────────────
// 각 Phase가 화면 중심에 얼마나 가까운지: 정확히 중심=1, 반 칸 벗어나면 0
function centernessOf(i){
  return Math.max(0, 1 - Math.abs(currentOffset - i*PHASE_SPACING)/(PHASE_SPACING*0.5));
}
// 현재 중심 Phase가 충분히 정렬되었는가 (진입 허용 임계)
function isCentered(){
  return centernessOf(currentPhaseIndex) > 0.72;
}
// 가장 가까운 Phase로 즉시 스냅
function snapNow(){
  if(snapTimer){clearTimeout(snapTimer);snapTimer=null;}
  if(viewMode!=='timeline') return;
  targetOffset=Math.round(targetOffset/PHASE_SPACING)*PHASE_SPACING;
  clamp();
}
// 입력이 멈춘 뒤 디바운스로 스냅 (자유 스크롤 감각 유지)
let snapTimer=null;
function scheduleSnap(delay=140){
  if(snapTimer) clearTimeout(snapTimer);
  snapTimer=setTimeout(()=>{ snapTimer=null; snapNow(); },delay);
}

function handleClick(mx,my){
  const clicked=pickBook(mx,my);
  if(clicked){
    if(panelBook && panelBook!==clicked) flushPanel();
    pinnedBook=clicked; hoveredBook=clicked;
    if(typeof refreshFocus==='function') refreshFocus();
    openPanel(clicked);
  } else {
    // 빈 하늘 클릭 — 서랍만 접고, 잡은 별과의 연(緣)은 다른 별을 고르기 전까지 유지
    flushPanel();

// ── 주크박스 — Supabase Storage 'jukebox' 버킷의 mp3를 차례로 ──
(function jukebox(){
  var $=function(id){ return document.getElementById(id); };
  var box=$('jukebox'); if(!box) return;
  var audio=new Audio(); audio.preload='metadata'; audio.volume=0.5;
  var tracks=[], idx=-1, coverUrl=null;

  function fmt(s){ s=Math.max(0,Math.floor(s||0)); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }
  function nameMeta(fn){
    var b=fn.replace(/\.[^.]+$/,'').replace(/^\d+[\s._-]+/,'');
    var m=b.split(' - ');
    return m.length>=2 ? {artist:m[0].trim(), title:m.slice(1).join(' - ').trim()} : {artist:'', title:b.trim()};
  }

// parseId3(bytes:Uint8Array) → {title?, artist?, coverBytes?, coverMime?} | null
function parseId3(buf){
  try{
    if(buf[0]!==0x49||buf[1]!==0x44||buf[2]!==0x33) return null;   // 'ID3'
    var ver=buf[3];
    var syn=function(a,o){ return ((a[o]&0x7f)<<21)|((a[o+1]&0x7f)<<14)|((a[o+2]&0x7f)<<7)|(a[o+3]&0x7f); };
    var size=syn(buf,6)+10, off=10;
    if(buf[5]&0x40){ var ext=(ver===4)?syn(buf,10):(((buf[10]<<24)|(buf[11]<<16)|(buf[12]<<8)|buf[13])>>>0)+4; off+=ext; }
    var dec=function(enc,b){
      try{
        if(enc===0) return new TextDecoder('latin1').decode(b);
        if(enc===1) return new TextDecoder('utf-16').decode(b);
        if(enc===2) return new TextDecoder('utf-16be').decode(b);
        return new TextDecoder('utf-8').decode(b);
      }catch(e){ try{ return new TextDecoder('utf-8').decode(b); }catch(_){ return ''; } }
    };
    var out={}, end=Math.min(size, buf.length);
    while(off+10<=end){
      var id=String.fromCharCode(buf[off],buf[off+1],buf[off+2],buf[off+3]);
      if(!/^[A-Z0-9]{4}$/.test(id)) break;
      var fsz=(ver===4)?syn(buf,off+4):(((buf[off+4]<<24)|(buf[off+5]<<16)|(buf[off+6]<<8)|buf[off+7])>>>0);
      var st=off+10;
      if(fsz<=0 || st>buf.length) break;
      var data=buf.subarray(st, Math.min(st+fsz, buf.length));
      if(id==='TIT2'||id==='TPE1'){
        var s=dec(data[0], data.subarray(1)).replace(/\0+$/g,'').replace(/^\uFEFF/,'').trim();
        if(id==='TIT2') out.title=s; else out.artist=s;
      }else if(id==='APIC' && !out.coverBytes){
        var enc=data[0], p=1;
        while(p<data.length && data[p]!==0) p++;
        var mime=dec(0, data.subarray(1,p)); p++;
        p++;                                            // picture type
        if(enc===1||enc===2){ while(p+1<data.length && !(data[p]===0&&data[p+1]===0)) p+=2; p+=2; }
        else{ while(p<data.length && data[p]!==0) p++; p++; }
        var img=data.subarray(p);
        if(img.length>40){ out.coverBytes=img; out.coverMime=mime||'image/jpeg'; }
      }
      off=st+fsz;
      if(out.title && out.artist && out.coverBytes) break;
    }
    return out;
  }catch(e){ return null; }
}

  async function refineMeta(t){
    try{
      var res=await fetch(t.url,{headers:{Range:'bytes=0-262143'}});
      var tag=parseId3(new Uint8Array(await res.arrayBuffer()));
      if(!tag) return;
      if(tag.title) t.title=tag.title;
      if(tag.artist) t.artist=tag.artist;
      if(tag.coverBytes) t.cover=new Blob([tag.coverBytes],{type:tag.coverMime});
      if(tracks[idx]===t) paint(t);
    }catch(e){}
  }

  function paint(t){
    $('jb-title').textContent=t.title||'—';
    $('jb-artist').textContent=t.artist||'';
    var art=$('jb-art');
    if(coverUrl){ URL.revokeObjectURL(coverUrl); coverUrl=null; }
    if(t.cover){ coverUrl=URL.createObjectURL(t.cover); art.innerHTML='<img alt="" src="'+coverUrl+'">'; }
    else art.innerHTML='<span>♪</span>';
  }
  function paintBtn(){ $('jb-play').textContent=audio.paused?'▶':'❚❚'; }

  function playAt(i, autoplay){
    if(!tracks.length) return;
    idx=(i+tracks.length)%tracks.length;
    var t=tracks[idx];
    audio.src=t.url; paint(t);
    if(!t._refined){ t._refined=true; refineMeta(t); }
    if(autoplay!==false) audio.play().catch(function(){});
    paintBtn();
  }

  async function loadList(first){
    if(!window.sb){ setTimeout(function(){ loadList(first); },400); return; }
    try{
      var r=await window.sb.storage.from('jukebox').list('',{limit:300,sortBy:{column:'name',order:'asc'}});
      if(r.error) throw r.error;
      tracks=(r.data||[]).filter(function(f){ return /\.mp3$/i.test(f.name); })
        .map(function(f){
          var m=nameMeta(f.name);
          return { name:f.name, title:m.title, artist:m.artist,
                   url:window.sb.storage.from('jukebox').getPublicUrl(f.name).data.publicUrl };
        });
      if(tracks.length && first) playAt(0,false);          // 목록만 준비 — 소리는 첫 손짓 뒤
      if(!tracks.length){ $('jb-title').textContent='별밭의 노래'; $('jb-artist').textContent='아직 곡이 없어요'; }
    }catch(e){ console.warn('jukebox list', e); }
  }

  // ── 컨트롤 ──
  $('jb-toggle').addEventListener('click',function(){ box.classList.toggle('open'); });
  if(!window._MOBILE){                             // 데스크탑: 호버로 피고, 벗어나면 0.3초 뒤 스르륵
    var hoverT=null;
    box.addEventListener('mouseenter',function(){ clearTimeout(hoverT); box.classList.add('open'); });
    box.addEventListener('mouseleave',function(){ clearTimeout(hoverT);
      hoverT=setTimeout(function(){ box.classList.remove('open'); },300); });
  }
  $('jb-play').addEventListener('click',function(){
    if(idx<0){ playAt(0); return; }
    if(audio.paused) audio.play().catch(function(){}); else audio.pause();
  });
  $('jb-prev').addEventListener('click',function(){ playAt(idx-1); });
  $('jb-next').addEventListener('click',function(){ playAt(idx+1); });
  audio.addEventListener('play',paintBtn);
  audio.addEventListener('pause',paintBtn);
  audio.addEventListener('ended',function(){ playAt(idx+1); });
  audio.addEventListener('timeupdate',function(){
    var d=audio.duration||0, c=audio.currentTime||0;
    $('jb-fill').style.width=(d? (c/d*100):0)+'%';
    $('jb-t0').textContent=fmt(c);
    $('jb-t1').textContent='\u2212'+fmt(Math.max(0,d-c));
  });
  $('jb-bar').addEventListener('click',function(e){
    if(!audio.duration) return;
    var r=e.currentTarget.getBoundingClientRect();
    audio.currentTime=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*audio.duration;
  });

  // 첫 손짓에 흐르기 — 브라우저 자동재생 규칙(사용자 입력 이후에만) 준수
  function firstTouch(){
    document.removeEventListener('click',firstTouch);
    document.removeEventListener('keydown',firstTouch);
    if(tracks.length && audio.paused && idx>=0) audio.play().catch(function(){});
  }
  document.addEventListener('click',firstTouch);
  document.addEventListener('keydown',firstTouch);

  // ── 곡 올리기 — 주인에게만 (+). 붓글씨 올리듯 Storage에 ──
  setInterval(function(){
    var up=$('jb-up'); if(!up) return;
    var me=(typeof currentUser!=='undefined')?currentUser:null;
    up.classList.toggle('hidden', !me);
  },1500);
  $('jb-up').addEventListener('click',function(){ $('jb-file').click(); });
  $('jb-file').addEventListener('change',async function(){
    var files=Array.prototype.slice.call(this.files||[]); this.value='';
    if(!files.length || !window.sb) return;
    $('jb-artist').textContent='올리는 중\u2026 0/'+files.length;
    var done=0;
    for(var i=0;i<files.length;i++){
      try{
        var f=files[i];
        var safe=f.name.replace(/[^\w.\u3131-\uD79D\s()\[\]&+,'-]/g,'_');
        var r=await window.sb.storage.from('jukebox').upload(safe, f, {upsert:true, contentType:'audio/mpeg'});
        if(r.error) throw r.error;
        done++; $('jb-artist').textContent='올리는 중\u2026 '+done+'/'+files.length;
      }catch(e){ console.warn('jukebox upload', e); $('jb-artist').textContent='올리기 실패: '+(e.message||e); }
    }
    loadList(false);
  });

  loadList(true);
})();

function ytId(s){

const ytTitleCache=new Map();
async function ytTitle(vid){

// ── 붓글씨: 배경제거(흰 획) + Storage 저장 + 하늘 글로우 ──
let calliEdit=null;
function calliGlow(color){
  return 'drop-shadow(0 0 4px '+color+') drop-shadow(0 0 13px '+color+') drop-shadow(0 0 30px '+color+'88)';
}
function parseCalli(raw){
  if(!raw) return null;
  if(typeof raw==='object') return raw;
  try{ var o=JSON.parse(raw); if(o&&o.url) return o; }catch(e){}
  return {url:raw, color:'#ffd98a', size:44};
}
function calliExtract(img, thr, soft){
  var iw=img.naturalWidth||img.width, ih=img.naturalHeight||img.height;
  if(!iw||!ih) return null;
  var sc=Math.min(1,820/Math.max(iw,ih));
  var W=Math.max(1,Math.round(iw*sc)), H=Math.max(1,Math.round(ih*sc));
  var src=document.createElement('canvas'); src.width=W; src.height=H;
  var sctx=src.getContext('2d'); sctx.drawImage(img,0,0,W,H);
  var sd; try{ sd=sctx.getImageData(0,0,W,H); }catch(e){ console.warn('calli getImageData', e); return null; }
  var out=document.createElement('canvas'); out.width=W; out.height=H;
  var octx=out.getContext('2d'), od=octx.createImageData(W,H), s=sd.data, o=od.data;
  for(var i=0;i<s.length;i+=4){
    var lum=0.299*s[i]+0.587*s[i+1]+0.114*s[i+2];
    var ink=(thr-lum)/soft; ink=ink<0?0:(ink>1?1:ink);
    o[i]=255;o[i+1]=255;o[i+2]=255;o[i+3]=Math.round(ink*255);
  }
  octx.putImageData(od,0,0);
  return out;
}

async function homeCalliUpload(canvas){

async function calliUpload(book, canvas){

function pickCalli(book){

    var f=e.target.files&&e.target.files[0];

    var u=URL.createObjectURL(f), im=new Image();

function renderCalli(book){

      '<div class="bp-calli-prev"><canvas id="bp-calli-cv"></canvas></div>'

        d.calligraphy=meta;
        if(calliEdit.objurl)URL.revokeObjectURL(calliEdit.objurl);

      +(canEdit?'<div class="bp-calli-row"><button id="bp-calli-replace">다시 올리기</button><button id="bp-calli-del">지우기</button></div>':'');
    var shown=document.getElementById('bp-calli-shown');
    if(shown){ shown.style.maxWidth=(d.calligraphy.size||44)+'%'; shown.style.filter=calliGlow(d.calligraphy.color||'#ffd98a'); }

      document.getElementById('bp-calli-replace').addEventListener('click',function(){ pickCalli(book); });

        d.calligraphy=null; await saveBook(book.id, d); renderCalli(book); if(panelBook===book) hideCalli();
      });

  }
  if(currentUser){
    el.innerHTML='<label class="bp-calli-up">천문 띄우기</label>';
    el.querySelector('.bp-calli-up').addEventListener('click',function(){ pickCalli(book); });
  } else {

// 로그인 없이도 보인다(읽기는 public). 문장을 넣을 때마다 updated_at 순으로 갱신.
var _recentTimer=null;
async function loadRecentLines(){
  if(!window.sb) return;
  try{
    // lines가 빈 배열이 아닌 책들을, 최근 갱신순으로 (public read 정책으로 로그인 불필요)
    var q=await window.sb.from('books_notes')
      .select('book_id,lines,updated_at')
      .not('lines','is',null)
      .order('updated_at',{ascending:false})
      .limit(60);
    if(!q||!q.data){ renderRecentLines([]); return; }
    var picked=[];
    for(var i=0;i<q.data.length;i++){
      var r=q.data[i];
      var arr=r.lines;
      if(!Array.isArray(arr)||arr.length===0) continue;
      var book=BOOKS.find(function(b){return b.id===r.book_id;});
      if(!book) continue;                          // 삭제된 책 등은 건너뜀
      if(picked.some(function(p){return p.book.id===book.id;})) continue;  // 같은 책은 한 줄만
      var last=String(arr[arr.length-1]||'').trim(); // 가장 최근에 더한 문장
      if(!last) continue;
      picked.push({book:book, title:book.title, snip:last.slice(0,10)});
      var LIMIT = 20;                              // 스무 개 담고, 다섯 줄만 보이며 스크롤
      if(picked.length>=LIMIT) break;
    }
    renderRecentLines(picked);
  }catch(e){ console.warn('loadRecentLines', e); }
}
function renderRecentLines(items){
  var box=document.getElementById('recent-lines');
  if(!box) return;
  box.innerHTML='';
  items.forEach(function(it,idx){
    var el=document.createElement('div');
    el.className='rl-item';
    el.style.animationDelay=(idx*0.5)+'s';        // 줄마다 호흡 위상차 — 물결처럼
    el.innerHTML='<span class="rl-title">'+esc(it.title)+'</span>'
                +'<span class="rl-snip">'+esc(it.snip)+'</span>';
    el.addEventListener('click',function(ev){
      ev.stopPropagation();                        // 배경(캔버스)으로 클릭이 새지 않게
      window._pendingLinesFor=it.book.id;          // 도착하면 '마음속의 문장' 서랍이 곧장 열리도록
      if(window.selectBook) window.selectBook(it.book);  // 검색과 '동일한' 유성 비행 + 패널 오픈
    });
    box.appendChild(el);
  });
  refreshRecentVisible();
}

// ── 새 책 더하기 → books.json 내려받기 ──────────────────
function addBook(title,author,publisher,phase){
  if(!booksData) return null;
  var maxId=BOOKS.reduce(function(m,b){return Math.max(m,b.id);},0);
  var ph=PHASES[phase-1];
  var d=new Date(), dd=String(d.getDate()).padStart(2,'0'), mm=String(d.getMonth()+1).padStart(2,'0');
  var nb={id:maxId+1, title:title, author:author, publisher:publisher,
          phase:phase, phase_name:ph.name, subtitle:ph.desc,
          added:dd+'/'+mm+'/'+d.getFullYear()};   // 별이 달린 날 — dd/mm/yyyy
  BOOKS.push(nb);
  booksData.books=BOOKS;
  if(booksData.meta) booksData.meta.total=BOOKS.length;
  if(booksData.phases){
    var pp=booksData.phases.filter(function(p){return p.id===phase;})[0];
    if(pp) pp.count=(pp.count||0)+1;
  }
  assignStarColors();
  return nb;
}
function downloadBooksJson(){
  if(!booksData) return;
  var blob=new Blob([JSON.stringify(booksData,null,2)],{type:'application/json'});
  var u=URL.createObjectURL(blob), a=document.createElement('a');
  a.href=u; a.download='books.json'; document.body.appendChild(a); a.click();
  document.body.removeChild(a); setTimeout(function(){URL.revokeObjectURL(u);},1000);
}

  renderLists(book); renderDial(book); renderCalli(book); renderEssayMark(book);   // 우선 로컬(기존) 렌더
  // 최근문장 목록에서 온 방문이면 — 마음속의 문장 서랍을 곧장 펼친다
  // (표식은 어떤 별을 열든 소모: 도중에 다른 별로 새면 낡은 표식이 남지 않도록)

function updateDialFocus(){
  const dial=document.getElementById('bp-dial');
  const lines=dial.querySelectorAll('.bp-line');
  if(!lines.length) return;
  const rect=dial.getBoundingClientRect();
  const cy=rect.top+rect.height/2;
  lines.forEach(el=>{
    const r=el.getBoundingClientRect();
    const dist=Math.min(1,Math.abs((r.top+r.height/2)-cy)/(rect.height/2));
    el.style.opacity=(1-dist*0.82).toFixed(3);
    el.style.transform='scale('+(1-dist*0.22).toFixed(3)+')';
    el.style.filter='saturate('+(1-dist*0.65).toFixed(2)+')';
  });
}

async function loadBook(bookId){
  if(!window.sb) return null;
  try{
    const { data, error } = await window.sb
      .from('books_notes').select('music,movie,reading,lines,calligraphy,essay')
      .eq('book_id', bookId).maybeSingle();
    if(error){ console.warn('loadBook', error); return null; }
    if(!data) return {music:[],movie:[],reading:[],lines:[],calligraphy:null,essay:null};
    return {music:data.music||[], movie:data.movie||[], reading:data.reading||[], lines:data.lines||[], calligraphy:parseCalli(data.calligraphy), essay:parseEssay(data.essay)};
  }catch(e){ console.warn('loadBook 예외', e); return null; }
}

async function saveBook(bookId, d){
  if(!window.sb) return {ok:false, reason:'no-client'};
  if(!currentUser) return {ok:false, reason:'not-logged-in'};
  try{
    const payload={
      user_id: currentUser.id, book_id: bookId,
      music:d.music, movie:d.movie||[], reading:d.reading, lines:d.lines,
      calligraphy:d.calligraphy?JSON.stringify(d.calligraphy):null,
      essay:d.essay?JSON.stringify(d.essay):null,
      updated_at: new Date().toISOString()
    };
    // .select() 를 붙여야 upsert 결과(실제로 쓰인 행)가 돌아온다.
    // RLS 가 막으면 error 없이 data 가 빈 배열로 오므로 그것까지 실패로 판정.
    const { data, error } = await window.sb.from('books_notes')
      .upsert(payload, { onConflict:'user_id,book_id' })
      .select('book_id,lines');
    if(error){ console.error('[saveBook] 에러', {code:error.code, message:error.message, details:error.details, hint:error.hint}); return {ok:false, reason:'error', error}; }
    if(!data || data.length===0){
      console.error('[saveBook] 행이 쓰이지 않음 — RLS(WITH CHECK) 가 조용히 막았을 가능성. user_id=', currentUser.id);
      return {ok:false, reason:'rls-blocked'};
    }
    console.log('[saveBook] 저장 성공 — book_id=', bookId, '· lines=', (data[0].lines||[]).length);
    return {ok:true, data};
  }catch(e){ console.error('[saveBook] 예외', e); return {ok:false, reason:'error'}; }
}

}

// ── 책 검색 — 자동완성 · 초성 · 제안 · 별 반짝임 ──────
(function(){
  const CHO=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  function toCho(str){
    let out='';
    for(const ch of str){
      const code=ch.charCodeAt(0)-0xAC00;
      if(code>=0 && code<11172) out+=CHO[Math.floor(code/588)];
      else out+=ch;
    }
    return out;
  }
  const isCho=q=>/^[ㄱ-ㅎ\s]+$/.test(q) && q.trim().length>0;
  function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

  const box=document.getElementById('book-search');
  const input=document.getElementById('book-search-input');
  const results=document.getElementById('book-search-results');
  let activeIndex=-1, current=[];

  function filterBooks(q){
    q=q.trim();
    if(!q) return [];
    const lower=q.toLowerCase();
    const cho=isCho(q);
    const qc=q.replace(/\s/g,'');
    const res=[];
    for(const b of BOOKS){
      let hit=false;
      if(cho){
        if(toCho(b.title||'').replace(/\s/g,'').includes(qc)) hit=true;
      } else {
        if((b.title||'').toLowerCase().includes(lower) ||
           (b.author||'').toLowerCase().includes(lower) ||
           (b.subtitle||'').toLowerCase().includes(lower)) hit=true;
      }
      if(hit){ res.push(b); if(res.length>=8) break; }
    }
    return res;
  }
  function suggestBooks(){
    const pool=BOOKS.slice();
    for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
    return pool.slice(0,10);
  }

  function showAddForm(title){
    const phOpts=PHASES.map(p=>'<option value="'+p.id+'">'+p.id+' \u00b7 '+p.name+'</option>').join('');
    results.innerHTML='<div class="bs-addform">'
      +'<div class="bs-af-title">새 별 더하기</div>'
      +'<input class="bs-af-in" id="bs-af-title" placeholder="제목">'
      +'<input class="bs-af-in" id="bs-af-author" placeholder="저자">'
      +'<input class="bs-af-in" id="bs-af-pub" placeholder="출판사">'
      +'<select class="bs-af-in" id="bs-af-phase">'+phOpts+'</select>'
      +'<button class="bs-af-btn" id="bs-af-add">\uff0b 별밭에 더하기</button>'
      +'<div class="bs-af-done" id="bs-af-done"></div>'
      +'<button class="bs-af-dl" id="bs-af-dl">books.json 내려받기</button>'
      +'<div class="bs-af-note">내려받은 books.json을 GitHub에 올리면 영구히 반영돼요. 더한 책은 새로고침 뒤 별밭에 나타납니다.</div>'
      +'</div>';
    results.classList.add('open');
    const ti=document.getElementById('bs-af-title'); ti.value=title||'';
    document.getElementById('bs-af-add').addEventListener('click',()=>{
      const t=ti.value.trim(), au=document.getElementById('bs-af-author').value.trim(),
            pu=document.getElementById('bs-af-pub').value.trim(), ph=+document.getElementById('bs-af-phase').value;
      if(!t){ ti.focus(); return; }
      const nb=addBook(t,au,pu,ph);
      if(nb){
        if(window._refreshRecentBooks) window._refreshRecentBooks();   // 새 별이 목록 맨 위로
        document.getElementById('bs-af-done').textContent='\u2018'+nb.title+'\u2019 더해졌어요 (#'+nb.id+'). 내려받아 GitHub에 올리면 영구 반영됩니다.';
        ti.value=''; document.getElementById('bs-af-author').value=''; document.getElementById('bs-af-pub').value=''; ti.focus();
      }
    });
    document.getElementById('bs-af-dl').addEventListener('click',downloadBooksJson);
    ti.focus();
  }
  function render(list,isSuggest){
    current=list; activeIndex=-1;
    if(!list.length && !isSuggest){
      const q0=input.value.trim();
      results.innerHTML='<div class="bs-empty">그 이름의 별은 아직 없어요</div>'
        +'<div class="bs-add" id="bs-add-trigger">＋ \u2018'+esc(q0)+'\u2019 새 별로 더하기</div>';
      results.classList.add('open');
      const trig=document.getElementById('bs-add-trigger');
      if(trig) trig.addEventListener('click',()=>showAddForm(q0));
      return;
    }
    let html = isSuggest ? '<div class="bs-hint">이런 별은 어때요</div>' : '';
    html += list.map((b,i)=>{
      const meta=(b.author||'')+(b.phase_name?'   ·   '+b.phase_name:'');
      return '<div class="bs-item" data-i="'+i+'">'
        +'<div class="bs-item-title">'+esc(b.title)+'</div>'
        +'<div class="bs-item-meta">'+esc(meta)+'</div></div>';
    }).join('');
    results.innerHTML=html;
    results.classList.add('open');
    results.querySelectorAll('.bs-item').forEach(el=>{
      el.addEventListener('click',()=>selectBook(current[+el.dataset.i]));
    });
  }
  function close(){ results.classList.remove('open'); results.innerHTML=''; activeIndex=-1; }
  window.closeSearch=close;

  function selectBook(book){
    if(!book) return;
    input.value=''; close(); input.blur();
    if(panelBook && panelBook!==book) flushPanel();
    pinnedBook=book; hoveredBook=book;
    if(typeof refreshFocus==='function') refreshFocus();
    // 유성의 곡선 비행 — 그 별로 날아가 도착하면 패널이 열림
    if(book._p3 && window.flyTo){
      hideCalli();                       // 떠나는 순간, 떠 있던 천문은 스러진다
      window.flyTo(book, ()=>openPanel(book));
    } else {
      openPanel(book);
    }
  }
  window.selectBook=selectBook;

  function upd(items){
    items.forEach((el,i)=>el.classList.toggle('active',i===activeIndex));
    if(activeIndex>=0 && items[activeIndex]) items[activeIndex].scrollIntoView({block:'nearest'});
  }

  input.addEventListener('input',()=>{
    const q=input.value;
    if(!q.trim()){ render(suggestBooks(),true); return; }
    render(filterBooks(q),false);
  });
  input.addEventListener('focus',()=>{ if(!input.value.trim()) render(suggestBooks(),true); });
  input.addEventListener('keydown',e=>{
    const items=results.querySelectorAll('.bs-item');
    if(e.key==='ArrowDown'){ e.preventDefault(); activeIndex=Math.min(items.length-1,activeIndex+1); upd(items); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); activeIndex=Math.max(0,activeIndex-1); upd(items); }
    else if(e.key==='Enter'){ e.preventDefault();
      if(activeIndex>=0 && current[activeIndex]) selectBook(current[activeIndex]);
      else if(current.length) selectBook(current[0]);
    }
    else if(e.key==='Escape'){ input.value=''; close(); input.blur(); }
  });
  // 바깥 클릭 시 결과 닫기 (검색창 내부 클릭은 유지)
  document.addEventListener('mousedown',e=>{ if(!box.contains(e.target)) close(); });
})();

  var track=document.getElementById('gb-track');

  function esc(t){ return String(t||'').replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

  function render(){
    if(!track || !ticker) return;
    if(!notes.length){ ticker.classList.remove('on'); track.innerHTML=''; segW=0; return; }
    var me=(typeof currentUser!=='undefined' && currentUser);
    var seg='';
    notes.forEach(function(n){
      seg+='<span class="gbt-item" data-id="'+n.id+'">'
        +(n.nick?('<b>'+esc(n.nick)+'</b><i>\u2014</i>'):'')
        +esc(n.body)
        +(me?'<button class="gbt-x" title="삭제">\u00d7</button>':'')
        +'</span><span class="gbt-star">\u2736</span>';
    });
    track.innerHTML='<span class="gbt-seg">'+seg+'</span><span class="gbt-seg">'+seg+'</span>';
    ticker.classList.add('on');
    x=0; segW=0;
    requestAnimationFrame(function(){
      var sg=track.querySelector('.gbt-seg');
      segW=sg?sg.getBoundingClientRect().width:0;
    });
  }
  (function step(t){
    if(!lastT) lastT=t||0;
    var dt=Math.min(0.1,((t||0)-lastT)/1000); lastT=t||0;
    if(segW>0 && !paused){
      x-=SPEED*dt; if(-x>=segW) x+=segW;
      if(track) track.style.transform='translateX('+x+'px)';
    }
    requestAnimationFrame(step);
  })();
  if(ticker){
    ticker.addEventListener('mouseenter',function(){ paused=true; });   // 올리면 멈춰 읽기
    ticker.addEventListener('mouseleave',function(){ paused=false; });
    ticker.addEventListener('touchstart',function(){ paused=!paused; },{passive:true});
    ticker.addEventListener('click',async function(e){
      var btn=e.target.closest('.gbt-x'); if(!btn) return;
      var it=btn.closest('.gbt-item'); if(!it) return;
      try{
        var r=await window.sb.from('guestbook').update({hidden:true}).eq('id', it.getAttribute('data-id'));
        if(r.error) throw r.error;
        load();
      }catch(err){ alert('삭제 실패: '+(err.message||err)); }
    });
  }

  async function load(){
    if(!window.sb){ setTimeout(load,500); return; }
    try{
      var r=await window.sb.from('guestbook')
        .select('id,nick,body,created_at').eq('hidden',false)
        .order('created_at',{ascending:false}).limit(30);
      if(r.error) throw r.error;
      notes=r.data||[];
      console.info('[방명록] 흐르는 글', notes.length+'개');
      render();
    }catch(e){ console.warn('guestbook', e); }
  }
  // 로그인이 바뀌면 ×표 갱신
  var lastMe=null;
  setInterval(function(){
    var me=(typeof currentUser!=='undefined')?!!currentUser:false;
    if(me!==lastMe){ lastMe=me; render(); }
  },1500);

  // 쓰기 카드 — 말풍선 단추로 여닫음
  var btn=document.getElementById('cm-btn'), comp=document.getElementById('gb-compose');
  if(btn && comp){
    btn.addEventListener('click',function(){
      comp.classList.toggle('open');
      if(comp.classList.contains('open')) setTimeout(function(){
        var t=document.getElementById('gb-body'); if(t) t.focus(); },80);
    });
    document.getElementById('gb-cancel').addEventListener('click',function(){ comp.classList.remove('open'); });
    var ta=document.getElementById('gb-body'), cnt=document.getElementById('gb-count');
    ta.addEventListener('input',function(){
      if(ta.value.length>200) ta.value=ta.value.slice(0,200);
      cnt.textContent=ta.value.length+' / 200';
    });
    document.getElementById('gb-send').addEventListener('click',async function(){
      var msg=document.getElementById('gb-msg');
      var body=ta.value.trim();
      var nick=document.getElementById('gb-nick').value.trim().slice(0,20);
      if(!body){ msg.textContent='한 글자라도 남겨 주세요.'; return; }
      if(!window.sb){ msg.textContent='연결이 아직입니다 \u2014 잠시 후 다시.'; return; }
      msg.textContent='흘려보내는 중\u2026';
      try{
        var r=await window.sb.from('guestbook').insert({ body:body, nick:nick||null });
        if(r.error) throw r.error;
        ta.value=''; document.getElementById('gb-nick').value=''; cnt.textContent='0 / 200';
        msg.textContent='';
        comp.classList.remove('open');
        await load();                              // 방금 글이 곧장 헤드라인에 합류
      }catch(e){ msg.textContent='실패: '+(e.message||e); }
    });
  }

  load();
})();

// ── 상단 서랍 다섯 — 선택된 별의 것. 아이콘 재클릭 시 스르륵 닫힘, 별 미선택 시 잠김 ──
(function bindDrawers(){
  var body=document.getElementById('bp-body');
  var strip=document.getElementById('drawer-icons');
  if(!body || !strip) return;
  var secOf=function(id){ var el=document.getElementById(id); return el?el.closest('.bp-section'):null; };
  var SECS={ music:secOf('bp-music-list'), movie:secOf('bp-movie-list'),
             reading:secOf('bp-reading-list'), lines:document.querySelector('.bp-lines-section'),
             calli:secOf('bp-calli') };
  var cur=null;
  function show(sec){
    Object.keys(SECS).forEach(function(k){ if(SECS[k]) SECS[k].classList.toggle('active', k===sec); });
    Array.prototype.forEach.call(strip.querySelectorAll('button'),function(b){
      b.classList.toggle('on', b.getAttribute('data-sec')===sec);
    });
  }
  function openD(sec){ cur=sec; show(sec); body.classList.add('open'); }
  function closeD(){ cur=null; show(null); body.classList.remove('open'); }
  window._drawerClose=closeD;              // 빈 하늘 클릭이 서랍만 접을 수 있게
  window._drawerOpen=openD;                // 최근문장 목록 클릭 → 도착 시 문장 서랍 자동 펼침용
  strip.addEventListener('click',function(e){
    var b=e.target.closest('button'); if(!b) return;
    if(!panelBook) return;                       // 잠김 — 별을 먼저
    var s=b.getAttribute('data-sec');
    if(cur===s) closeD(); else openD(s);
  });
  // 별 선택 감시 — 별이 닫히면 서랍도 닫히고 아이콘이 잠김
  var last=null;
  (function watch(){
    var pb=(typeof panelBook!=='undefined')?panelBook:null;
    if(pb!==last){ last=pb; strip.classList.toggle('locked', !pb);
      if(!pb){ closeD(); var pn=document.getElementById('essay-pen'); if(pn) pn.classList.remove('pulse'); } }
    requestAnimationFrame(watch);
  })();
})();

window.addEventListener('resize',resize);
resize();
loop();
</script>
<script>
// ── 대문: 눈을 뜨다 — 첫 탭이 곧 첫 손짓이라, 하늘과 음악이 함께 옵니다 ──
(function(){
  document.body.classList.add('gated');
  var g=document.getElementById('gate');
  function openEye(){
    if(!g || g.classList.contains('gone') || document.body.classList.contains('eye-open')) return;
    document.body.classList.add('eye-open');
    setTimeout(function(){
      g.classList.add('gone');
      document.body.classList.remove('gated','eye-open');   // 필터 완전 해제 — GPU 원상복귀
    },3050);
  }
  if(g) g.addEventListener('click',openEye);
  window.addEventListener('keydown',openEye);
})();
</script>
