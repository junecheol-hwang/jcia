<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>도반의 여정 · 기록</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Cormorant:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script type="importmap">
{ "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
</script>
<style>
:root{
  --bg:#03060c; --bg2:#070b14;
  --orange:#D9A96E; --orange-pale:#E0CDB2; --orange-deep:#C8956A;
  --gray-light:#C8C5BE; --gray-mid:#948F85; --gray-dark:#6E6C66;
  --line:rgba(110,108,102,0.20);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:'Gowun Batang',serif;
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(217,169,110,0.06), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(110,120,160,0.05), transparent 60%),
    linear-gradient(180deg,#03060c,#060a12);
  color:var(--gray-light);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
#app{max-width:560px;margin:0 auto;padding:0 1.1rem 3rem;min-height:100%;}

/* 헤더 */
#top{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:1.3rem 0 0.9rem;position:sticky;top:0;z-index:5;
  background:linear-gradient(180deg,#04070d 70%,transparent);
}
#brand-title{font-size:1.05rem;font-weight:700;color:var(--orange-pale);letter-spacing:0.04em;}
#brand-sub{font-size:0.66rem;color:var(--gray-dark);letter-spacing:0.32em;margin-top:2px;}
#auth{text-align:right;}
#auth-status{display:none;font-size:0.66rem;color:var(--orange);letter-spacing:0.04em;}
#auth-login{display:flex;gap:5px;align-items:center;}
#auth-email{
  width:128px;background:rgba(2,5,10,0.6);border:0.5px solid var(--line);border-radius:3px;
  padding:0.42rem 0.55rem;color:var(--gray-light);font-size:16px;font-family:'Gowun Batang',serif;outline:none;
}
#auth-email:focus{border-color:rgba(217,169,110,0.55);}
#auth-email::placeholder{color:var(--gray-dark);font-size:0.78rem;}
#auth-send{
  width:30px;height:30px;flex:none;border:0.5px solid rgba(217,169,110,0.4);border-radius:3px;
  background:rgba(217,169,110,0.12);color:var(--orange-pale);font-size:0.95rem;cursor:pointer;
}
#auth-msg{font-size:0.62rem;color:var(--gray-dark);letter-spacing:0.03em;min-height:0.85rem;text-align:right;padding-right:2px;}

/* 검색 */
#search-wrap{margin:0.5rem 0 0.9rem;}
#search{
  width:100%;background:rgba(2,5,10,0.55);border:0.5px solid var(--line);border-radius:4px;
  padding:0.7rem 0.85rem;color:var(--gray-light);font-size:16px;font-family:'Gowun Batang',serif;outline:none;
}
#search:focus{border-color:rgba(217,169,110,0.45);}
#search::placeholder{color:var(--gray-dark);}

/* phase 칩 */
#chips{display:flex;gap:7px;overflow-x:auto;padding:2px 0 8px;scrollbar-width:none;}
#chips::-webkit-scrollbar{display:none;}
.chip{
  flex:none;padding:0.4rem 0.8rem;border:0.5px solid var(--line);border-radius:20px;
  background:transparent;color:var(--gray-mid);font-family:'Gowun Batang',serif;font-size:0.78rem;
  letter-spacing:0.02em;cursor:pointer;transition:all 0.15s;white-space:nowrap;
}
.chip.on{border-color:rgba(217,169,110,0.6);color:var(--orange-pale);background:rgba(217,169,110,0.08);}

#phase-head{padding:0.5rem 0.2rem 0.9rem;}
#phase-name{font-size:0.96rem;color:var(--gray-light);font-weight:700;letter-spacing:0.02em;}
#phase-sub{font-size:0.74rem;color:var(--orange-deep);font-style:italic;margin-top:3px;letter-spacing:0.02em;}

/* 책 리스트 */
#list{display:flex;flex-direction:column;}
.book{
  padding:0.85rem 0.3rem;border-bottom:0.5px solid var(--line);cursor:pointer;
  display:flex;justify-content:space-between;align-items:baseline;gap:10px;
}
.book:active{background:rgba(217,169,110,0.05);}
.book-main{min-width:0;}
.book-title{font-size:0.92rem;color:var(--gray-light);letter-spacing:0.01em;line-height:1.4;}
.book-meta{font-size:0.68rem;color:var(--gray-dark);margin-top:3px;letter-spacing:0.02em;}
.book-mark{flex:none;font-size:0.7rem;color:var(--orange-deep);opacity:0;transition:opacity 0.2s;}
.book.has-notes .book-mark{opacity:0.85;}
#list-empty{padding:2.5rem 1rem;text-align:center;color:var(--gray-dark);font-size:0.82rem;line-height:1.8;}

/* 입력 시트 */
#sheet{
  position:fixed;inset:0;z-index:40;background:linear-gradient(180deg,#04070e,#070b13);
  transform:translateY(100%);transition:transform 0.32s cubic-bezier(0.22,0.61,0.36,1);
  display:flex;flex-direction:column;overscroll-behavior:contain;
}
#sheet.open{transform:translateY(0);}
#sheet-top{
  display:flex;align-items:flex-start;gap:12px;padding:1.2rem 1.1rem 0.9rem;
  border-bottom:0.5px solid var(--line);
  max-width:560px;margin:0 auto;width:100%;
}
#sheet-back{
  flex:none;width:34px;height:34px;border:0.5px solid var(--line);border-radius:4px;background:transparent;
  color:var(--gray-light);font-size:1.05rem;cursor:pointer;line-height:1;
}
#sheet-title{font-size:1.0rem;color:var(--orange-pale);font-weight:700;letter-spacing:0.02em;line-height:1.35;}
#sheet-author{font-size:0.7rem;color:var(--gray-dark);margin-top:3px;}
#sheet-note{font-size:0.66rem;color:var(--orange-deep);margin-top:5px;letter-spacing:0.02em;display:none;}
#sheet-body{
  flex:1;overflow-y:auto;padding:1.1rem 1.1rem 3rem;max-width:560px;margin:0 auto;width:100%;
  -webkit-overflow-scrolling:touch;
}
.sec{margin-bottom:1.6rem;}
.sec-label{font-size:0.82rem;color:var(--gray-light);letter-spacing:0.04em;margin-bottom:0.6rem;}
.sec-add{display:flex;gap:7px;margin-bottom:0.5rem;}
.sec-input{
  flex:1;min-width:0;background:rgba(2,5,10,0.5);border:0.5px solid var(--line);border-radius:4px;
  padding:0.6rem 0.7rem;color:var(--gray-light);font-size:16px;font-family:'Gowun Batang',serif;outline:none;
}
.sec-input:focus{border-color:rgba(217,169,110,0.45);}
.sec-input::placeholder{color:var(--gray-dark);font-size:0.84rem;}
.sec-btn{
  flex:none;width:38px;border:0.5px solid rgba(217,169,110,0.4);border-radius:4px;
  background:rgba(217,169,110,0.1);color:var(--orange-pale);font-size:1.15rem;cursor:pointer;
}
.sec-list{display:flex;flex-direction:column;gap:2px;}
.item{
  display:flex;align-items:flex-start;gap:8px;padding:0.5rem 0.1rem;border-bottom:0.5px solid rgba(110,108,102,0.12);
}
.item-text{flex:1;font-size:0.86rem;color:var(--gray-light);line-height:1.55;word-break:break-word;}
.item-text a{color:var(--orange-deep);text-decoration:none;border-bottom:0.5px solid rgba(200,149,106,0.4);}
.item-btn{flex:none;cursor:pointer;color:var(--gray-dark);font-size:0.82rem;padding:2px 3px;}
.item-btn.edit{color:var(--gray-mid);}
.item-edit-input{
  flex:1;background:rgba(255,255,255,0.04);border:0.5px solid rgba(217,169,110,0.5);border-radius:3px;
  padding:0.45rem 0.6rem;color:var(--gray-light);font-size:16px;font-family:'Gowun Batang',serif;outline:none;
}
.sec-lines .item-text{font-weight:400;line-height:1.7;}

@media (prefers-reduced-motion: reduce){
  #sheet{transition:none;}
}
</style>
</head>
<body>
<div id="app">
  <header id="top">
    <div id="brand">
      <div id="brand-title">도반의 여정</div>
      <div id="brand-sub">기록</div>
    </div>
    <div id="auth">
      <div id="auth-status"></div>
      <div id="auth-login">
        <input id="auth-email" type="email" inputmode="email" autocomplete="email" placeholder="이메일로 로그인" spellcheck="false">
        <button id="auth-send" aria-label="로그인 링크 받기">→</button>
      </div>
    </div>
  </header>
  <div id="auth-msg"></div>

  <div id="search-wrap">
    <input id="search" type="search" placeholder="책 제목으로 찾기" autocomplete="off" spellcheck="false">
  </div>

  <div id="chips"></div>
  <div id="phase-head">
    <div id="phase-name"></div>
    <div id="phase-sub"></div>
  </div>

  <div id="list"></div>
</div>

<div id="sheet" aria-hidden="true">
  <header id="sheet-top">
    <button id="sheet-back" aria-label="목록으로">←</button>
    <div id="sheet-info">
      <div id="sheet-title"></div>
      <div id="sheet-author"></div>
      <div id="sheet-note">로그인하면 기록이 저장돼요</div>
    </div>
  </header>
  <div id="sheet-body">
    <section class="sec" data-kind="music">
      <div class="sec-label">♪ 같이 하면 좋을 음악</div>
      <div class="sec-add"><input class="sec-input" placeholder="곡 · 앨범 · 링크"><button class="sec-btn" aria-label="추가">+</button></div>
      <div class="sec-list"></div>
    </section>
    <section class="sec" data-kind="movie">
      <div class="sec-label">▷ 같이 보면 좋을 영화</div>
      <div class="sec-add"><input class="sec-input" placeholder="제목 · 감독 · 링크"><button class="sec-btn" aria-label="추가">+</button></div>
      <div class="sec-list"></div>
    </section>
    <section class="sec" data-kind="reading">
      <div class="sec-label">✶ 더 읽을거리들</div>
      <div class="sec-add"><input class="sec-input" placeholder="제목 · 링크"><button class="sec-btn" aria-label="추가">+</button></div>
      <div class="sec-list"></div>
    </section>
    <section class="sec sec-lines" data-kind="line">
      <div class="sec-label">&ldquo; 내 마음속의 문장들</div>
      <div class="sec-add"><input class="sec-input" placeholder="문장을 적고 추가"><button class="sec-btn" aria-label="추가">+</button></div>
      <div class="sec-list"></div>
    </section>
  </div>
</div>

<!-- Supabase 초기화 -->
<script type="module">
import { createClient } from '@supabase/supabase-js';
const SUPABASE_URL = 'https://ebxaaaxvpilouizujwgt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_g3UpSee8YCFDJWaVWmLpQg_HFvOG2-B';
try{
  window.sb = createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth:{ persistSession:true, autoRefreshToken:true, detectSessionInUrl:true }
  });
}catch(e){ console.error('Supabase init 실패', e); window.sb=null; }
window.dispatchEvent(new Event('sb-ready'));
</script>

<script>
// ── 상태 ──────────────────────────────────────────────
let BOOKS=[], PHASES=[], byId={};
let currentPhase=1;
const bookData={};         // id별 {music,movie,reading,lines}
let panelBook=null, panelDirty=false, currentUser=null, editingLine=-1;

const KINDS=['music','movie','reading','line'];
const $=s=>document.querySelector(s);
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function linkify(t){
  return esc(t).replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
}

// ── 데이터 로드 ───────────────────────────────────────
fetch('books.json').then(r=>r.json()).then(d=>{
  BOOKS=d.books; PHASES=d.phases;
  BOOKS.forEach(b=>byId[b.id]=b);
  renderChips();
  selectPhase(1);
}).catch(e=>{ $('#list').innerHTML='<div id="list-empty">책 목록을 불러오지 못했어요.<br>잠시 후 다시 열어주세요.</div>'; console.error(e); });

// ── phase 칩 + 리스트 ─────────────────────────────────
function renderChips(){
  $('#chips').innerHTML=PHASES.map(p=>
    `<button class="chip" data-id="${p.id}">${esc(p.name.split(' (')[0])}</button>`).join('');
  $('#chips').querySelectorAll('.chip').forEach(c=>
    c.addEventListener('click',()=>{ $('#search').value=''; selectPhase(+c.dataset.id); }));
}
function selectPhase(id){
  currentPhase=id;
  const p=PHASES.find(x=>x.id===id);
  $('#chips').querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',+c.dataset.id===id));
  $('#phase-head').style.display='block';
  $('#phase-name').textContent=p.name;
  $('#phase-sub').textContent=p.subtitle||'';
  renderList(BOOKS.filter(b=>b.phase===id));
}
function renderList(arr){
  const el=$('#list');
  if(!arr.length){ el.innerHTML='<div id="list-empty">찾는 책이 없어요.</div>'; return; }
  el.innerHTML=arr.map(b=>
    `<div class="book" data-id="${b.id}">
       <div class="book-main">
         <div class="book-title">${esc(b.title)}</div>
         <div class="book-meta">${esc(b.author||'')}${b.publisher?' · '+esc(b.publisher):''}</div>
       </div>
       <span class="book-mark">●</span>
     </div>`).join('');
  el.querySelectorAll('.book').forEach(x=>
    x.addEventListener('click',()=>openBook(byId[+x.dataset.id])));
  markNotes(arr);
}
// 이미 기록이 있는 책에 표식
async function markNotes(arr){
  if(!window.sb) return;
  try{
    const ids=arr.map(b=>b.id);
    const { data } = await window.sb.from('books_notes').select('book_id').in('book_id',ids);
    if(!data) return;
    const has=new Set(data.map(r=>r.book_id));
    $('#list').querySelectorAll('.book').forEach(x=>{
      if(has.has(+x.dataset.id)) x.classList.add('has-notes');
    });
  }catch(e){}
}

// ── 검색 ──────────────────────────────────────────────
$('#search').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();
  if(!q){ selectPhase(currentPhase); return; }
  $('#chips').querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  $('#phase-head').style.display='none';
  renderList(BOOKS.filter(b=>
    b.title.toLowerCase().includes(q) || (b.author||'').toLowerCase().includes(q)));
});

// ── Supabase 입출력 ───────────────────────────────────
function ensureData(id){
  if(!bookData[id]) bookData[id]={music:[],movie:[],reading:[],lines:[]};
  return bookData[id];
}
async function loadBook(id){
  if(!window.sb) return null;
  try{
    const { data, error } = await window.sb.from('books_notes')
      .select('music,movie,reading,lines').eq('book_id',id).maybeSingle();
    if(error){ console.warn(error); return null; }
    if(!data) return {music:[],movie:[],reading:[],lines:[]};
    return {music:data.music||[],movie:data.movie||[],reading:data.reading||[],lines:data.lines||[]};
  }catch(e){ console.warn(e); return null; }
}
async function saveBook(id,d){
  if(!window.sb||!currentUser) return false;
  try{
    const { error } = await window.sb.from('books_notes').upsert({
      user_id:currentUser.id, book_id:id,
      music:d.music, movie:d.movie, reading:d.reading, lines:d.lines,
      updated_at:new Date().toISOString()
    },{ onConflict:'user_id,book_id' });
    if(error){ console.warn(error); return false; }
    return true;
  }catch(e){ console.warn(e); return false; }
}
function flush(){
  if(!panelDirty||!panelBook) return;
  const id=panelBook.id, d=bookData[id]; panelDirty=false;
  if(d) saveBook(id,d);
}

// ── 입력 시트 ─────────────────────────────────────────
async function openBook(book){
  panelBook=book; panelDirty=false; editingLine=-1; ensureData(book.id);
  $('#sheet-title').textContent=book.title;
  $('#sheet-author').textContent=(book.author||'')+(book.publisher?' · '+book.publisher:'');
  $('#sheet-note').style.display=currentUser?'none':'block';
  renderSheet();
  const sheet=$('#sheet'); sheet.classList.add('open'); sheet.setAttribute('aria-hidden','false');
  $('#sheet-body').scrollTop=0;
  const remote=await loadBook(book.id);
  if(panelBook===book && remote){ bookData[book.id]=remote; renderSheet(); }
}
function closeBook(){
  flush();
  const sheet=$('#sheet'); sheet.classList.remove('open'); sheet.setAttribute('aria-hidden','true');
  panelBook=null; editingLine=-1;
  // 표식 갱신
  if(currentPhase) markNotes(BOOKS.filter(b=>b.phase===currentPhase));
}
$('#sheet-back').addEventListener('click',closeBook);

function renderSheet(){
  if(!panelBook) return;
  const d=ensureData(panelBook.id);
  document.querySelectorAll('.sec').forEach(sec=>{
    const kind=sec.dataset.kind;
    const list=sec.querySelector('.sec-list');
    if(kind==='line'){
      list.innerHTML=d.lines.map((v,i)=>{
        if(i===editingLine){
          return `<div class="item"><input class="item-edit-input" value="${esc(v).replace(/"/g,'&quot;')}">
            <span class="item-btn" data-act="save" data-i="${i}">✓</span>
            <span class="item-btn" data-act="cancel">×</span></div>`;
        }
        return `<div class="item"><span class="item-text">${esc(v)}</span>
          <span class="item-btn edit" data-act="edit" data-i="${i}">✎</span>
          <span class="item-btn" data-act="del" data-i="${i}">×</span></div>`;
      }).join('');
    }else{
      list.innerHTML=d[kind].map((v,i)=>
        `<div class="item"><span class="item-text">${linkify(v)}</span>
          <span class="item-btn" data-act="del" data-i="${i}">×</span></div>`).join('');
    }
  });
  bindSheet();
}
function bindSheet(){
  document.querySelectorAll('.sec').forEach(sec=>{
    const kind=sec.dataset.kind;
    sec.querySelectorAll('[data-act]').forEach(el=>{
      el.onclick=e=>{
        e.stopPropagation();
        const act=el.dataset.act, i=+el.dataset.i, d=ensureData(panelBook.id);
        if(act==='del'){ (kind==='line'?d.lines:d[kind]).splice(i,1); panelDirty=true; editingLine=-1; renderSheet(); }
        else if(act==='edit'){ editingLine=i; renderSheet(); const inp=$('.item-edit-input'); if(inp) inp.focus(); }
        else if(act==='cancel'){ editingLine=-1; renderSheet(); }
        else if(act==='save'){ saveLine(); }
      };
    });
    const inp=sec.querySelector('.item-edit-input');
    if(inp) inp.onkeydown=e=>{ if(e.key==='Enter') saveLine(); else if(e.key==='Escape'){ editingLine=-1; renderSheet(); } };
  });
}
function saveLine(){
  const inp=$('.item-edit-input'); const d=ensureData(panelBook.id);
  if(inp && editingLine>=0){ const v=inp.value.trim(); if(v){ d.lines[editingLine]=v; panelDirty=true; } }
  editingLine=-1; renderSheet();
}
// 각 섹션 추가
document.querySelectorAll('.sec').forEach(sec=>{
  const kind=sec.dataset.kind, inp=sec.querySelector('.sec-input'), btn=sec.querySelector('.sec-btn');
  const add=()=>{
    const v=inp.value.trim(); if(!v||!panelBook) return;
    const d=ensureData(panelBook.id);
    (kind==='line'?d.lines:d[kind]).push(v); panelDirty=true; inp.value=''; renderSheet();
    if(!currentUser) $('#sheet-note').style.display='block';
  };
  btn.addEventListener('click',add);
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') add(); });
});

// 백그라운드 전환 시 저장
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='hidden') flush(); });
window.addEventListener('pagehide',flush);

// ── 로그인 (magic link) ───────────────────────────────
function whenSB(cb){ if(typeof window.sb!=='undefined') cb(); else window.addEventListener('sb-ready',cb,{once:true}); }
function setUser(u){
  currentUser=u;
  const st=$('#auth-status'), lg=$('#auth-login');
  if(u){ st.textContent='✓ 기록할 수 있어요'; st.style.display='block'; lg.style.display='none'; $('#auth-msg').textContent=''; if(panelBook) $('#sheet-note').style.display='none'; }
  else{ st.style.display='none'; lg.style.display='flex'; }
}
async function initAuth(){
  if(!window.sb){ $('#auth').style.display='none'; return; }
  try{
    const { data:{ session } } = await window.sb.auth.getSession();
    setUser(session?session.user:null);
    window.sb.auth.onAuthStateChange((_e,s)=>setUser(s?s.user:null));
  }catch(e){ console.warn(e); }
}
async function sendLink(){
  const email=$('#auth-email').value.trim(), msg=$('#auth-msg');
  if(!email){ msg.textContent='이메일을 입력하세요'; return; }
  if(!window.sb){ msg.textContent='연결되지 않았어요'; return; }
  msg.textContent='메일 보내는 중…';
  try{
    const { error } = await window.sb.auth.signInWithOtp({
      email, options:{ emailRedirectTo:'https://jcia-five.vercel.app/m.html' }
    });
    msg.textContent = error ? ('오류: '+error.message) : '메일함에서 링크를 눌러주세요';
  }catch(e){ msg.textContent='오류가 났어요'; }
}
$('#auth-send').addEventListener('click',sendLink);
$('#auth-email').addEventListener('keydown',e=>{ if(e.key==='Enter') sendLink(); });
whenSB(initAuth);
</script>
</body>
</html>
